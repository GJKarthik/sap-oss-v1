# =============================================================================
# World Monitor Service Data Product (ODPS 4.1)
# =============================================================================

dataProduct:
  id: "world-monitor-service-v1"
  version: "1.0.0"
  name: "World Monitor Service Data Product"
  description: "Global event monitoring, news aggregation, and trend analysis"
  
  # ODPS 4.1 Standard Fields - Internal analysis data
  dataSecurityClass: "internal"
  dataGovernanceClass: "analytics"
  
  # Data Owner
  owner:
    name: "Intelligence Platform Team"
    team: "Data Analytics"
    contact: "intelligence-platform@company.com"
  
  # Extension: LLM Routing Policy - Hybrid based on content
  x-llm-policy:
    routing: "content-based"
    defaultBackend: "vllm"
    confidentialBackend: "vllm"
    auditLevel: "full"
    
    routingRules:
      - condition: "public_news"
        backend: "aicore"
        reason: "Public news can use external LLM"
      - condition: "internal_analysis"
        backend: "vllm"
        reason: "Internal analysis must stay on-premise"
      - condition: "company_mentions"
        backend: "vllm"
        reason: "Company-related analysis is confidential"
  
  # Extension: Prompting Policy
  x-prompting-policy:
    systemPrompt: |
      You are a global events analyst.
      Monitor and analyze world events, news, and trends.
      Provide balanced, factual analysis.
      Flag potential business impacts for internal review.
      Never share internal analysis with external systems.
    maxTokens: 4096
    temperature: 0.4
    responseFormat: "structured"
    
  # Extension: Regulatory Compliance
  x-regulatory-compliance:
    frameworks:
      - "MGF-Agentic-AI"
      - "AI-Agent-Index"
    autonomyLevel: "L2"
    requiresHumanOversight: true
    safetyControls:
      - "guardrails"
      - "monitoring"
      - "audit-logging"
      - "content-filtering"
  
  # Output Ports
  outputPort:
    - id: "news-summary"
      name: "News Summary API"
      description: "Summarize global news"
      dataSecurityClass: "public"
      x-llm-policy:
        routing: "aicore-ok"
    
    - id: "trend-analysis"
      name: "Trend Analysis API"
      description: "Analyze trends and patterns"
      dataSecurityClass: "internal"
      x-llm-policy:
        routing: "vllm-only"
    
    - id: "impact-assessment"
      name: "Impact Assessment API"
      description: "Assess business impact of events"
      dataSecurityClass: "confidential"
      x-llm-policy:
        routing: "vllm-only"
  
  # Input Ports
  inputPort:
    - id: "news-feeds"
      name: "News Feeds"
      description: "External news sources"
      dataSecurityClass: "public"
      x-llm-policy:
        routing: "aicore-ok"
    
    - id: "internal-data"
      name: "Internal Data"
      description: "Internal business context"
      dataSecurityClass: "confidential"
      x-llm-policy:
        routing: "vllm-only"
  
  # Quality Metrics
  quality:
    availability: "99.5%"
    latencyP95: "3000ms"
    throughput: "150 req/min"