# vLLM Kubernetes Deployment
# Production-ready deployment with health checks, resources, and scaling
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-server
  labels:
    app: vllm
    component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
      component: server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: vllm
        component: server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 60
      
      containers:
      - name: vllm
        image: vllm-zig:latest
        imagePullPolicy: IfNotPresent
        
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        - name: grpc
          containerPort: 8001
          protocol: TCP
        
        env:
        - name: VLLM_HOST
          value: "0.0.0.0"
        - name: VLLM_PORT
          value: "8000"
        - name: VLLM_LOG_LEVEL
          value: "info"
        - name: VLLM_MODEL_PATH
          value: "/models"
        - name: VLLM_GPU_MEMORY_FRACTION
          value: "0.9"
        - name: VLLM_MAX_CONCURRENT_REQUESTS
          value: "100"
        
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
            nvidia.com/gpu: "1"
          limits:
            memory: "32Gi"
            cpu: "8"
            nvidia.com/gpu: "1"
        
        # Liveness probe - is the process alive?
        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Readiness probe - is it ready for traffic?
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Startup probe - allow time for model loading
        startupProbe:
          httpGet:
            path: /health/startup
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 60  # 10 minutes for model loading
        
        volumeMounts:
        - name: models
          mountPath: /models
          readOnly: true
        - name: cache
          mountPath: /cache
        - name: config
          mountPath: /config
          readOnly: true
      
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: vllm-models-pvc
      - name: cache
        emptyDir:
          sizeLimit: 50Gi
      - name: config
        configMap:
          name: vllm-config
      
      nodeSelector:
        nvidia.com/gpu.present: "true"
      
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule

---
apiVersion: v1
kind: Service
metadata:
  name: vllm-server
  labels:
    app: vllm
    component: server
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8000
    targetPort: http
    protocol: TCP
  - name: grpc
    port: 8001
    targetPort: grpc
    protocol: TCP
  selector:
    app: vllm
    component: server

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-config
data:
  config.json: |
    {
      "server": {
        "host": "0.0.0.0",
        "port": 8000,
        "workers": 4
      },
      "model": {
        "max_model_len": 4096,
        "gpu_memory_utilization": 0.9,
        "enforce_eager": false
      },
      "scheduler": {
        "max_num_seqs": 256,
        "max_num_batched_tokens": 8192
      },
      "cache": {
        "block_size": 16,
        "enable_prefix_caching": true
      },
      "logging": {
        "level": "info",
        "format": "json"
      }
    }

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vllm-server-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vllm-server
  minReplicas: 1
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Pods
    pods:
      metric:
        name: vllm_active_requests
      target:
        type: AverageValue
        averageValue: "50"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 1
        periodSeconds: 120

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vllm-server-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: vllm
      component: server