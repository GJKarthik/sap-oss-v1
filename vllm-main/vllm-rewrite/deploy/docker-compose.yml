# vLLM Development Environment
# Use: docker-compose up -d
version: '3.8'

services:
  # Main vLLM Server
  vllm-server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: vllm-zig:dev
    container_name: vllm-server
    ports:
      - "8000:8000"  # HTTP API
      - "8001:8001"  # gRPC API
    environment:
      - VLLM_HOST=0.0.0.0
      - VLLM_PORT=8000
      - VLLM_LOG_LEVEL=debug
      - VLLM_MODEL_PATH=/models
      - VLLM_CONFIG_PATH=/config/config.json
    volumes:
      - ./models:/models:ro
      - ./config:/config:ro
      - vllm-cache:/cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - vllm-network
    depends_on:
      - prometheus
      - grafana

  # Prometheus for Metrics
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: vllm-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - vllm-network

  # Grafana for Dashboards
  grafana:
    image: grafana/grafana:10.1.0
    container_name: vllm-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - vllm-network

  # Load Balancer (for multi-replica)
  nginx:
    image: nginx:1.25-alpine
    container_name: vllm-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - vllm-server
    restart: unless-stopped
    networks:
      - vllm-network

  # Redis for request caching (optional)
  redis:
    image: redis:7-alpine
    container_name: vllm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - vllm-network

networks:
  vllm-network:
    driver: bridge

volumes:
  vllm-cache:
  prometheus-data:
  grafana-data:
  redis-data: