# vLLM Rewrite - Mojo Project Configuration
# This file configures the Mojo components of the vLLM rewrite project

[project]
name = "vllm-mojo"
version = "0.1.0"
description = "High-performance ML model layer for vLLM inference engine"
authors = ["vLLM Team"]
license = "Apache-2.0"
readme = "README.md"
repository = "https://github.com/vllm-project/vllm-rewrite"

# Minimum Mojo version required
requires-mojo = ">=24.0"

[dependencies]
# Core dependencies
# max = ">=24.0"  # Modular's MAX for tensor operations

[dev-dependencies]
# Testing and development tools

[build]
# Build configuration
target = "native"
optimization = "speed"

# Enable SIMD optimizations
simd = true

# Enable GPU support
gpu = true

[features]
# Optional features
cuda = true
rocm = false
metal = false

# Quantization support
fp8 = true
int8 = true
int4 = true
awq = true
gptq = true

# Model families to include
llama = true
mistral = true
qwen = true
phi = true
gemma = true

[paths]
# Source directories
src = "src"
tests = "tests"
benchmarks = "benchmarks"

[test]
# Test configuration
timeout = 300
parallel = true