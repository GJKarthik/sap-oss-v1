# =============================================================================
# vLLM - Data Product Registry (ODPS 4.1)
# Infrastructure Service - On-Premise LLM Backend
# =============================================================================

version: "4.1"
catalog:
  id: "vllm-catalog"
  name: "vLLM Infrastructure Data Product Catalog"
  description: "On-premise LLM inference infrastructure - handles confidential data"

products:
  - ref: "vllm_inference_service.yaml"

# Global policies - This IS the confidential backend
globalPolicies:
  defaultSecurityClass: "restricted"
  defaultLLMRouting: "local-only"
  auditEnabled: true
  
# LLM Backend Configuration - vLLM is itself a backend
llmBackends:
  local:
    endpoint: "http://localhost:9180/mcp"
    models:
      - "llama-3.1-70b"
      - "codellama-34b"
      - "mistral-7b"
    forSecurityClass: ["internal", "confidential", "restricted"]