# =============================================================================
# vLLM Inference Service Data Product (ODPS 4.1)
# Infrastructure - On-Premise Confidential LLM Backend
# =============================================================================

dataProduct:
  id: "vllm-inference-service-v1"
  version: "1.0.0"
  name: "vLLM Inference Service Data Product"
  description: "On-premise LLM inference for confidential data - this IS the vLLM backend"
  
  # ODPS 4.1 Standard Fields - Restricted infrastructure
  dataSecurityClass: "restricted"
  dataGovernanceClass: "infrastructure"
  
  # Data Owner
  owner:
    name: "ML Infrastructure Team"
    team: "Platform Engineering"
    contact: "ml-infra@company.com"
  
  # Extension: LLM Routing Policy - Local only
  x-llm-policy:
    routing: "local-only"
    defaultBackend: "local"
    confidentialBackend: "local"
    auditLevel: "full"
    retentionPolicy: "no-storage"
    
    routingRules:
      - condition: "all_requests"
        backend: "local"
        reason: "vLLM IS the confidential backend"
  
  # Extension: Prompting Policy
  x-prompting-policy:
    systemPrompt: |
      You are a secure on-premise AI assistant running on vLLM.
      All data processed here stays on-premise.
      Never send data to external systems.
      Process confidential and restricted data securely.
    maxTokens: 8192
    temperature: 0.7
    responseFormat: "text"
    
  # Extension: Regulatory Compliance - Highest restrictions
  x-regulatory-compliance:
    frameworks:
      - "MGF-Agentic-AI"
      - "AI-Agent-Index"
      - "GDPR-Data-Processing"
      - "Infrastructure-Security"
    autonomyLevel: "L1"
    requiresHumanOversight: true
    safetyControls:
      - "guardrails"
      - "monitoring"
      - "audit-logging"
      - "access-control"
      - "encryption"
  
  # Output Ports
  outputPort:
    - id: "inference"
      name: "Inference API"
      description: "Process inference requests"
      dataSecurityClass: "restricted"
      x-llm-policy:
        routing: "local-only"
    
    - id: "health"
      name: "Health API"
      description: "Service health checks"
      dataSecurityClass: "internal"
      x-llm-policy:
        routing: "local-only"
  
  # Input Ports
  inputPort:
    - id: "prompts"
      name: "Prompt Input"
      description: "Confidential prompts from other services"
      dataSecurityClass: "restricted"
      x-llm-policy:
        routing: "local-only"
        allowExternalRouting: false
  
  # Infrastructure Specs
  x-infrastructure:
    gpuRequired: true
    gpuType: "A100"
    gpuCount: 4
    memoryGB: 256
    replicas: 2
  
  # Quality Metrics
  quality:
    availability: "99.9%"
    latencyP95: "2000ms"
    throughput: "500 req/min"