# ============================================================================
# SAP AI Fabric - TIER 0: Infrastructure Services
# ============================================================================
# Deploy first - these are the foundational services all other tiers depend on
# Usage: docker-compose -f docker-compose.tier0.yml up -d
# ============================================================================

services:
  # ─────────────────────────────────────────────────────────────────────────
  # Redis - Caching and Message Queue
  # ─────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sap-ai-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    labels:
      sap.ai.tier: "tier0-infrastructure"
      sap.ai.service: "redis"
      sap.ai.data_security: "cache"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sap-ai-fabric-network
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # API Gateway (Nginx)
  # ─────────────────────────────────────────────────────────────────────────
  api-gateway:
    image: nginx:alpine
    container_name: sap-ai-gateway
    ports:
      - "8000:80"
      - "8443:443"
    volumes:
      - ../nginx.conf:/etc/nginx/nginx.conf:ro
    labels:
      sap.ai.tier: "tier0-infrastructure"
      sap.ai.service: "api-gateway"
      sap.ai.data_security: "gateway"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sap-ai-fabric-network
    restart: unless-stopped

volumes:
  redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${REDIS_DATA_PATH:-./volumes/redis-data}

networks:
  sap-ai-fabric-network:
    name: ${NETWORK_NAME:-sap-ai-fabric-network}
    driver: ${NETWORK_DRIVER:-bridge}
