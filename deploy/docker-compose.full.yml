# ============================================================================
# SAP AI Fabric - FULL STACK DEPLOYMENT
# ============================================================================
# Complete deployment of all tiers in dependency order
# Usage: docker-compose -f docker-compose.full.yml up -d
# ============================================================================

version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # TIER 0: INFRASTRUCTURE
  # ═══════════════════════════════════════════════════════════════════════════

  redis:
    image: redis:7-alpine
    container_name: sap-ai-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    labels:
      sap.ai.tier: "tier0-infrastructure"
      sap.ai.service: "redis"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sap-ai-fabric-network
    restart: unless-stopped

  api-gateway:
    image: nginx:alpine
    container_name: sap-ai-gateway
    ports:
      - "8000:80"
      - "8443:443"
    volumes:
      - ../nginx.conf:/etc/nginx/nginx.conf:ro
    labels:
      sap.ai.tier: "tier0-infrastructure"
      sap.ai.service: "api-gateway"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - agent-router
      - odata-schema
      - vllm
    networks:
      - sap-ai-fabric-network
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════════
  # TIER 1: MCP SERVERS
  # ═══════════════════════════════════════════════════════════════════════════

  odata-vocabularies-mcp:
    build:
      context: ../src/data/odata-vocabularies-main
      dockerfile: Dockerfile
    container_name: sap-ai-odata-mcp
    ports:
      - "${ODATA_MCP_PORT:-9150}:9150"
    environment:
      - PORT=9150
      - HOST=${ODATA_MCP_HOST:-0.0.0.0}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ../src/data/odata-vocabularies-main/vocabularies:/app/vocabularies:ro
    labels:
      sap.ai.tier: "tier1-mcp-servers"
      sap.ai.service: "odata-vocabularies-mcp"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9150/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - sap-ai-fabric-network
    restart: unless-stopped

  odata-schema:
    build:
      context: ../src/data/odata-vocabularies-main
      dockerfile: Dockerfile
    container_name: sap-ai-odata-schema
    ports:
      - "${ODATA_SCHEMA_PORT:-8003}:8003"
    environment:
      - PORT=8003
    volumes:
      - ../src/data/odata-vocabularies-main/vocabularies:/app/vocabularies:ro
    labels:
      sap.ai.tier: "tier1-mcp-servers"
      sap.ai.service: "odata-schema"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sap-ai-fabric-network
    restart: unless-stopped

  langchain-hana-mcp:
    build:
      context: ../src/data/langchain-integration-for-sap-hana-cloud-main
      dockerfile: Dockerfile
    container_name: sap-ai-langchain-hana-mcp
    ports:
      - "${LANGCHAIN_HANA_MCP_PORT:-9160}:9160"
    environment:
      - PORT=9160
      - HOST=${LANGCHAIN_HANA_MCP_HOST:-0.0.0.0}
      - HANA_HOST=${HANA_HOST}
      - HANA_PORT=${HANA_PORT:-443}
      - HANA_USER=${HANA_USER}
      - HANA_PASSWORD=${HANA_PASSWORD}
      - HANA_SCHEMA=${HANA_SCHEMA:-PAL_STORE}
      - AICORE_CLIENT_ID=${AICORE_CLIENT_ID}
      - AICORE_CLIENT_SECRET=${AICORE_CLIENT_SECRET}
      - AICORE_AUTH_URL=${AICORE_AUTH_URL}
      - AICORE_BASE_URL=${AICORE_BASE_URL}
      - AICORE_RESOURCE_GROUP=${AICORE_RESOURCE_GROUP:-default}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    labels:
      sap.ai.tier: "tier1-mcp-servers"
      sap.ai.service: "langchain-hana-mcp"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9160/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - sap-ai-fabric-network
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════════
  # TIER 2: INTELLIGENCE LAYER
  # ═══════════════════════════════════════════════════════════════════════════

  vllm:
    build:
      context: ../src/intelligence/vllm-main
      dockerfile: Dockerfile.qwen3-q8
    container_name: sap-ai-vllm
    ports:
      - "${VLLM_PORT:-8080}:8080"
    environment:
      - PORT=8080
      - HOST=${VLLM_HOST:-0.0.0.0}
      - MODEL_PATH=${VLLM_MODEL_PATH:-/app/models}
      - MODEL_NAME=${VLLM_MODEL_NAME:-Qwen/Qwen2.5-7B-Instruct-GGUF}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - model-cache:/app/models
    labels:
      sap.ai.tier: "tier2-intelligence"
      sap.ai.service: "vllm-inference"
      sap.ai.gpu: "required"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    networks:
      - sap-ai-fabric-network
    restart: unless-stopped

  genai-toolkit:
    build:
      context: ../src/intelligence/generative-ai-toolkit-for-sap-hana-cloud-main
      dockerfile: Dockerfile
    container_name: sap-ai-genai-toolkit
    ports:
      - "${GENAI_TOOLKIT_PORT:-8084}:8084"
    environment:
      - PORT=8084
      - HOST=${GENAI_TOOLKIT_HOST:-0.0.0.0}
      - HANA_HOST=${HANA_HOST}
      - HANA_PORT=${HANA_PORT:-443}
      - HANA_USER=${HANA_USER}
      - HANA_PASSWORD=${HANA_PASSWORD}
      - HANA_URL=${HANA_URL}
      - VLLM_URL=http://vllm:8080
      - MANGLE_ROUTER_URL=http://agent-router:8010
      - AICORE_CLIENT_ID=${AICORE_CLIENT_ID}
      - AICORE_CLIENT_SECRET=${AICORE_CLIENT_SECRET}
      - AICORE_AUTH_URL=${AICORE_AUTH_URL}
      - AICORE_BASE_URL=${AICORE_BASE_URL}
      - AICORE_RESOURCE_GROUP=${AICORE_RESOURCE_GROUP:-default}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    labels:
      sap.ai.tier: "tier2-intelligence"
      sap.ai.service: "genai-toolkit"
    depends_on:
      vllm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8084/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - sap-ai-fabric-network
    restart: unless-stopped

  embedded-hana:
    build:
      context: ../src/data/langchain-integration-for-sap-hana-cloud-main
      dockerfile: Dockerfile
    container_name: sap-ai-embedded-hana
    ports:
      - "${EMBEDDED_HANA_PORT:-8050}:8050"
    environment:
      - PORT=8050
      - HANA_URL=${HANA_URL}
      - VLLM_URL=http://vllm:8080
      - MANGLE_ROUTER_URL=http://agent-router:8010
      - AICORE_CLIENT_ID=${AICORE_CLIENT_ID}
      - AICORE_CLIENT_SECRET=${AICORE_CLIENT_SECRET}
      - AICORE_AUTH_URL=${AICORE_AUTH_URL}
      - AICORE_BASE_URL=${AICORE_BASE_URL}
      - AICORE_RESOURCE_GROUP=${AICORE_RESOURCE_GROUP:-default}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    labels:
      sap.ai.tier: "tier2-intelligence"
      sap.ai.service: "embedded-hana"
    depends_on:
      vllm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8050/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - sap-ai-fabric-network
    restart: unless-stopped

  # ═══════════════════════════════════════════════════════════════════════════
  # TIER 3: TRAINING (Optional - uncomment to include)
  # ═══════════════════════════════════════════════════════════════════════════

