volumes:
  redis-data:
    driver: local
  model-cache:
    driver: local
  # modelopt-outputs:
  #   driver: local

networks:
  sap-ai-fabric-network:
    name: ${NETWORK_NAME:-sap-ai-fabric-network}
    driver: ${NETWORK_DRIVER:-bridge}