# OData Vocabularies Universal Dictionary - CI Pipeline
# Runs tests, linting, security checks, and builds on every push/PR

name: CI Pipeline

on:
  push:
    branches: [main, develop, 'feat/*']
    paths:
      - 'odata-vocabularies-main/**'
  pull_request:
    branches: [main]
    paths:
      - 'odata-vocabularies-main/**'

defaults:
  run:
    working-directory: odata-vocabularies-main

jobs:
  # ==========================================================================
  # Test Job - Run pytest with coverage
  # ==========================================================================
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio aiohttp
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Run tests
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=html
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: ./odata-vocabularies-main/coverage.xml
          flags: unittests
          name: odata-vocabularies
          fail_ci_if_error: false
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: odata-vocabularies-main/htmlcov/

  # ==========================================================================
  # Lint Job - Code quality checks
  # ==========================================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy black
      
      - name: Run Ruff linter
        run: |
          ruff check . --output-format=github || true
      
      - name: Run Black format check
        run: |
          black --check --diff . || true
      
      - name: Run MyPy type check
        run: |
          mypy . --ignore-missing-imports || true

  # ==========================================================================
  # Security Job - Vulnerability scanning
  # ==========================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety pip-audit
      
      - name: Run Bandit security linter
        run: |
          bandit -r . -ll -ii --format json --output bandit-report.json || true
      
      - name: Run Safety check
        run: |
          safety check --full-report || true
      
      - name: Run pip-audit
        run: |
          pip-audit || true
      
      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: odata-vocabularies-main/bandit-report.json

  # ==========================================================================
  # Build Job - Docker image build
  # ==========================================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./odata-vocabularies-main
          file: ./odata-vocabularies-main/Dockerfile
          push: false
          tags: odata-vocabularies:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Test Docker image
        run: |
          docker run --rm -d --name test-vocab -p 9150:9150 odata-vocabularies:${{ github.sha }}
          sleep 5
          curl -f http://localhost:9150/health || exit 1
          docker stop test-vocab

  # ==========================================================================
  # Vocabulary Validation Job
  # ==========================================================================
  validate-vocabularies:
    name: Validate Vocabularies
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Validate XML vocabularies
        run: |
          python -c "
          from pathlib import Path
          from xml.etree import ElementTree as ET
          
          vocab_dir = Path('vocabularies')
          errors = []
          
          for xml_file in vocab_dir.glob('*.xml'):
              try:
                  ET.parse(xml_file)
                  print(f'✓ {xml_file.name}')
              except Exception as e:
                  errors.append(f'{xml_file.name}: {e}')
                  print(f'✗ {xml_file.name}: {e}')
          
          if errors:
              exit(1)
          print(f'\n✓ All {len(list(vocab_dir.glob(\"*.xml\")))} vocabularies valid')
          "

  # ==========================================================================
  # Release Job - Only on main branch
  # ==========================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [test, lint, security, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Get version
        id: version
        run: |
          VERSION=$(grep -m1 'version' mcp_server/server.py 2>/dev/null | grep -oP '\d+\.\d+\.\d+' || echo "3.0.0")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Create Release Tag
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const tag = `v${version}`;
            
            try {
              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/tags/${tag}`,
                sha: context.sha
              });
              console.log(`Created tag: ${tag}`);
            } catch (e) {
              console.log(`Tag ${tag} may already exist: ${e.message}`);
            }