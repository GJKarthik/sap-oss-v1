# =============================================================================
# AI Core Inference Data Product (ODPS 4.1)
# =============================================================================

dataProduct:
  id: "ai-core-inference-v1"
  version: "1.0.0"
  name: "AI Core Inference Data Product"
  description: "LLM inference services via SAP AI Core with governance controls"
  
  # ODPS 4.1 Standard Fields
  dataSecurityClass: "internal"
  dataGovernanceClass: "enterprise-ai"
  
  # Data Owner
  owner:
    name: "AI Platform Team"
    team: "Enterprise AI"
    contact: "ai-platform@company.com"
  
  # Extension: LLM Routing Policy
  x-llm-policy:
    routing: "hybrid"
    defaultBackend: "aicore"
    confidentialBackend: "vllm"
    auditLevel: "full"
    retentionPolicy: "no-storage"
    
    # Routing rules
    routingRules:
      - condition: "contains_financial_data"
        backend: "vllm"
        reason: "Financial data must stay on-premise"
      - condition: "contains_trading_data"
        backend: "vllm"
        reason: "Trading data is confidential"
      - condition: "general_query"
        backend: "aicore"
        reason: "General queries can use external LLM"
  
  # Extension: Prompting Policy
  x-prompting-policy:
    systemPrompt: |
      You are an AI assistant operating within SAP enterprise guidelines.
      Follow all governance requirements from the Model Governance Framework.
      Never disclose confidential financial information externally.
      Always apply safety controls and guardrails.
    maxTokens: 2048
    temperature: 0.7
    responseFormat: "text"
    
  # Extension: Regulatory Compliance
  x-regulatory-compliance:
    frameworks:
      - "MGF-Agentic-AI"
      - "AI-Agent-Index"
    autonomyLevel: "L2"
    requiresHumanOversight: false
    safetyControls:
      - "guardrails"
      - "monitoring"
      - "audit-logging"
  
  # Output Ports (API endpoints)
  outputPort:
    - id: "chat-completion"
      name: "Chat Completion API"
      description: "Multi-turn chat with AI models"
      dataAddress:
        type: "api"
        endpoint: "/v1/chat/completions"
      dataSecurityClass: "internal"
      x-llm-policy:
        routing: "hybrid"
        allowTokenization: true
    
    - id: "text-completion"
      name: "Text Completion API"
      description: "Single-turn text generation"
      dataAddress:
        type: "api"
        endpoint: "/v1/completions"
      dataSecurityClass: "internal"
      x-llm-policy:
        routing: "hybrid"
    
    - id: "embeddings"
      name: "Embeddings API"
      description: "Text embeddings generation"
      dataAddress:
        type: "api"
        endpoint: "/v1/embeddings"
      dataSecurityClass: "public"
      x-llm-policy:
        routing: "aicore-ok"
  
  # Input Ports (data sources)
  inputPort:
    - id: "user-prompts"
      name: "User Prompts"
      description: "User-provided prompts for inference"
      dataSecurityClass: "variable"
      x-llm-policy:
        requiresClassification: true
    
    - id: "context-data"
      name: "Context Data"
      description: "Additional context from enterprise systems"
      dataSecurityClass: "confidential"
      x-llm-policy:
        routing: "vllm-only"
        allowTokenization: false
  
  # Quality Metrics
  quality:
    availability: "99.9%"
    latencyP95: "2000ms"
    throughput: "1000 req/min"
  
  # Lineage
  lineage:
    upstream:
      - "sap-ai-core-deployments"
      - "model-registry"
    downstream:
      - "enterprise-applications"
      - "analytics-dashboards"