# =============================================================================
# Trial Balance Domain Glossary
# For GlossaryService integration (pair_type: "alias", category per term)
# =============================================================================

domain: "trial_balance"
version: "1.0.0"

terms:
  # Core accounting terms
  - term: "Trial Balance"
    abbreviation: "TB"
    definition: "A report listing all general ledger account balances (debits and credits) at a specific point in time, used to verify that total debits equal total credits"
    category: "balance_sheet"

  - term: "General Ledger"
    abbreviation: "GL"
    definition: "The master set of accounts that summarize all transactions occurring within an entity"
    category: "balance_sheet"

  - term: "Variance Analysis"
    definition: "Comparison of current period balances against prior period to identify and explain material differences"
    category: "general"

  - term: "Commentary"
    definition: "Written explanation documenting the business reasons behind material balance movements between periods"
    category: "general"

  - term: "Materiality Threshold"
    definition: "The monetary value above which a variance is considered significant enough to require investigation and commentary"
    category: "general"

  # Process-specific terms
  - term: "FORTM Pack"
    abbreviation: "FORTM"
    definition: "Financial Operations Review and Tracking Monthly - the reporting package submitted to Group team summarizing TB review findings"
    category: "regulatory"

  - term: "PSGL"
    definition: "Primary Subledger/General Ledger - the master account file system from which TB data is extracted"
    category: "balance_sheet"

  - term: "SC Bridge"
    definition: "System interface used for extracting Trial Balance data from PSGL/S4 into the working file"
    category: "general"

  - term: "Finance Caption"
    definition: "High-level financial reporting category grouping GL accounts (e.g., Revenue, Cost of Sales, Operating Expenses)"
    category: "income_statement"

  # Timing terms
  - term: "M-3"
    definition: "3 working days before month-end close; preparation phase begins"
    category: "general"

  - term: "M-2"
    definition: "2 working days before month-end close; analysis phase begins"
    category: "general"

  - term: "M+1"
    definition: "1 working day after month-end close"
    category: "general"

  - term: "M+4"
    definition: "4 working days after month-end close; deadline for entry confirmation"
    category: "general"

  - term: "M+5"
    definition: "5 working days after month-end close; internal review and FORTM submission"
    category: "general"

  - term: "M+7"
    definition: "7 working days after month-end close; TB review cycle completion"
    category: "general"

  # Control terms
  - term: "EUC"
    abbreviation: "EUC"
    definition: "End User Computing - control reference for spreadsheet-based tools subject to governance requirements"
    category: "regulatory"

  - term: "UK ACG"
    abbreviation: "ACG"
    definition: "UK Automated Controls Governance - regulatory framework governing automated controls"
    category: "regulatory"

  - term: "FCA"
    abbreviation: "FCA"
    definition: "Financial Conduct Authority - UK regulatory body; FCA cutoff refers to the deadline for financial submissions"
    category: "regulatory"

  # Organizational terms
  - term: "GFS"
    abbreviation: "GFS"
    definition: "Global Financial Services - the organizational unit performing TB review"
    category: "general"

  - term: "Legal Entity"
    abbreviation: "LE"
    definition: "A distinct legal organization within the group; 234 LEs across the enterprise"
    category: "general"

  - term: "GCFO"
    abbreviation: "GCFO"
    definition: "Group Chief Financial Officer - teams consume TB narrative summaries"
    category: "general"

  # BSS Risk Assessment terms
  - term: "BSS Risk Assessment"
    abbreviation: "BSS RA"
    definition: "Business Support Services Risk Assessment - process for evaluating and categorizing GL account risks for CFO attestation"
    category: "regulatory"

  - term: "Substantiated at Risk"
    definition: "BSS risk category for items with identified risk and supporting evidence"
    category: "regulatory"

  - term: "Unsubstantiated Unowned"
    definition: "BSS risk category for items without supporting evidence and no clear owner"
    category: "regulatory"

  - term: "Unsubstantiated Owned"
    definition: "BSS risk category for items without supporting evidence but with an identified owner"
    category: "regulatory"

  # Technical terms
  - term: "S4"
    definition: "SAP S/4HANA - next-generation ERP system; some entities migrating from PSGL to S4"
    category: "general"

  - term: "Fast Close"
    definition: "Initiative to accelerate month-end close timelines through automation and process optimization"
    category: "general"

  - term: "Daily Controls"
    definition: "Future operating model enabling real-time financial monitoring instead of monthly batch processing"
    category: "general"
