# -----------------------------------------------------------------------------

locale_variants:
  en-SG:
    locale: "en-SG"
    terms:
      - canonical: "GST"
        variations: ["goods and services tax", "consumption tax"]
        context: "taxation"
        training_forms: ["GST"]
    overrides:
      - global_canonical: "VAT"
        local_preferred: "GST"
        
  ar-SA:
    locale: "ar-SA"
    terms:
      - canonical: "ضريبة القيمة المضافة"
        variations: ["VAT", "value added tax"]
        context: "taxation"
        training_forms: ["ضريبة القيمة المضافة", "VAT"]
        human_friendly: "ضريبة القيمة المضافة"
        
      - canonical: "فاتورة"
        variations: ["invoice", "bill"]
        context: "accounts_payable"
        training_forms: ["فاتورة", "invoice"]

  zh-CN:
    locale: "zh-CN"
    terms:
      - canonical: "试算平衡表"
        variations: ["Trial Balance", "TB", "余额试算"]
        context: "financial"
        training_forms: ["试算平衡表", "Trial Balance"]
        
      - canonical: "总账"
        variations: ["General Ledger", "GL", "总分类账"]
        context: "financial"
        training_forms: ["总账", "General Ledger"]

# -----------------------------------------------------------------------------
# METADATA
# -----------------------------------------------------------------------------

metadata:
  maintainer: "spec-owner"
  last_reviewed: "2026-04-23"
  review_frequency: "monthly"
  
  # Drift detection thresholds
  drift_thresholds:
    vocabulary_divergence_warning: 0.20  # 20% divergence triggers warning
    vocabulary_divergence_alert: 0.30    # 30% divergence triggers alert
    oov_rate_warning: 0.10               # 10% out-of-vocabulary rate triggers warning
    oov_rate_alert: 0.20                 # 20% OOV rate triggers alert
    
  # Retraining triggers
  retraining_triggers:
    new_terms_threshold: 50              # Retrain when 50+ new terms detected
    deprecated_terms_usage: 100          # Retrain when deprecated term used 100+ times
    locale_coverage_gap: 0.30            # Retrain when locale coverage < 70%