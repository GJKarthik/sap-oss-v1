# -----------------------------------------------------------------------------
# Requirement ID Patterns
# -----------------------------------------------------------------------------
# Defines the format for requirement IDs used in traceability
requirement_id_patterns:
  description: Regex patterns for requirement IDs by domain
  patterns:
    arabic:
      pattern: "^ARA-[A-Z]{2,4}-\\d+\\.\\d+(\\.\\d+)?-\\d{3}$"
      example: "ARA-OCR-2.1.1-001"
      description: "Arabic domain requirement ID"
    tb:
      pattern: "^TB-[A-Z]{2,4}-\\d+\\.\\d+(\\.\\d+)?-\\d{3}$"
      example: "TB-VAR-3.2.1-001"
      description: "Trial Balance domain requirement ID"
    simula:
      pattern: "^SIM-[A-Z]{2,4}-\\d+\\.\\d+(\\.\\d+)?-\\d{3}$"
      example: "SIM-TAX-4.1.1-001"
      description: "Simula domain requirement ID"
    regulations:
      pattern: "^REG-[A-Z]{2,4}-\\d+\\.\\d+(\\.\\d+)?-\\d{3}$"
      example: "REG-MGF-2.1.2-002"
      description: "Regulations domain requirement ID"

# -----------------------------------------------------------------------------
# Roadmap Version
# -----------------------------------------------------------------------------
roadmap_version:
  description: Version of the roadmap these milestones align with
