# =============================================================================
# MoSCoW Priorities and Per-Domain Milestone IDs
# =============================================================================
# Single source of truth for roadmap traceability.
# Mirrors the "Project Roadmap" chapters added to each LaTeX spec in
# April 2026 (TB Ch 11, Arabic AP Ch 11, Simula Ch 10, Regulations Ch 11).
#
# Every data record that participates in a milestone should set:
#   roadmap:
#     milestones: [M01, M02]
#     priority: Must
#     requirement_ids: [REG-MGF-2.1.2-002]
#
# Schema: common/base-types.schema.json#/definitions/RoadmapReference
# =============================================================================

moscow_priority:
  description: MoSCoW prioritisation per critical-path analysis
  values:
    - Must      # Critical path; no release without it
    - Should    # Important; slip tolerable but undesirable
    - Could     # Desirable; drop without scope damage
    - "Won't"   # Explicitly out of scope for this release line

