# MoSCoW Priority Classification
# -----------------------------------------------------------------------------
# Standard MoSCoW prioritization for requirements traceability
# Reference: LaTeX specs use these in roadmap tables
moscow_priority:
  description: MoSCoW prioritization for requirements
  values:
    - Must      # Non-negotiable for release; blocking if absent
    - Should    # Important but not blocking; workaround possible
    - Could     # Desirable enhancement; implement if time permits
    - Won't     # Explicitly excluded from current scope

