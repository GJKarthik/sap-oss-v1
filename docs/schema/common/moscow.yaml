# -----------------------------------------------------------------------------
# Status markers — extends enums.yaml#/requirement_status
# -----------------------------------------------------------------------------
status_markers:
  description: Special markers on requirement_status
  values:
    "*":
      meaning: Downgraded from implemented (regression tracked in status_note)
    "**":
      meaning: Upgraded from partial/gap (e.g., REG-MGF-2.1.2-002 after S01 flip)
    "†":
      meaning: Completely absent (no implementation yet)
