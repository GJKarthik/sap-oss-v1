# =============================================================================
# Spec-Code-Schema Traceability Mapping Registry
# Path: docs/schema/spec-code-mapping.yaml
# =============================================================================
# This file defines the authoritative mapping between:
# - LaTeX specifications (normative business/technical requirements)
# - JSON/YAML schemas (data contracts)
# - Implementation code (runtime behavior)
#
# The spec-drift auditor uses this registry to detect when changes to any
# artifact may require updates to related artifacts.
# =============================================================================

$schema: https://sap-oss.github.io/schema/spec-code-mapping.schema.json
