# -----------------------------------------------------------------------------
# AUDIT CONFIGURATION
# -----------------------------------------------------------------------------

audit_config:
  # Files to watch for changes that trigger spec-drift audit
  watch_patterns:
    specifications:
      - "docs/latex/specs/**/*.tex"
      - "docs/latex/specs/**/chapters/*.tex"
    schemas:
      - "docs/schema/**/*.schema.json"
      - "docs/schema/**/*.yaml"
    code:
      - "src/training/pipeline/*.py"
      - "src/training/scripts/*.py"
      - "src/intelligence/**/*.py"
      - "src/generativeUI/**/*.ts"
      - "src/generativeUI/**/*.py"
    clinerules:
      - "**/.clinerules*"
      
  # Severity levels for drift detection
  severity_levels:
    critical:
      - "Schema field removed without spec deprecation notice"
      - "Implementation behavior contradicts spec requirement"
      - "Breaking change without version bump"
    high:
      - "Schema field added without spec documentation"
      - "New code feature without spec coverage"
      - "Threshold change without spec update"
    medium:
      - "Spec update without implementation"
      - "Documentation drift from current behavior"
    low:
      - "Comment/description inconsistency"
      - "Example data outdated"
      
  # Actions required by severity
  required_actions:
    critical:
      - "Block merge until resolved"
      - "Require spec owner sign-off"
      - "Update CHANGELOG.md"
    high:
      - "Request spec update in same PR"
      - "Add TODO with tracking issue"
    medium:
      - "Create follow-up issue"
      - "Add to tech debt backlog"
    low:
      - "Note in PR description"
      - "Optional fix"

# -----------------------------------------------------------------------------
# VALIDATION RULES
# -----------------------------------------------------------------------------

validation_rules:
  # Schema-first rule: schemas must exist before code references them
  schema_first:
    enabled: true
    exceptions:
      - "prototype/"
      - "experiments/"
      
  # Spec-code sync: code changes to mapped files trigger spec review
  spec_code_sync:
    enabled: true
    auto_label_pr: true
    required_reviewers:
      - "spec-owner"
      
  # Version consistency: schema versions must match spec versions
  version_consistency:
    enabled: true
    version_files:
      - docs/schema/registry.json
      - docs/latex/specs/*/chapters/00-frontmatter.tex
      
  # Cross-domain impact: changes to shared artifacts require multi-domain review
  cross_domain_impact:
    enabled: true
    shared_artifact_paths:
      - docs/schema/common/
      - docs/latex/specs/00-*.tex
      - docs/latex/specs/fragment-*.tex

