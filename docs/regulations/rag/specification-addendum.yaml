      original_pointer: "TB EUC-001.003 + workflow participants"
      original_issue: "EUC-001 is spreadsheet being eliminated"
      corrected_pointer:
        primary: "src/training/pipeline/data_pipeline.py"
        code_files:
          - "src/training/pipeline/data_pipeline.py#DataPipeline.validate_input"
          - "src/training/schema_pipeline/validators.py#SchemaValidator"
        spec_sections: ["TB Spec §3.2", "Simula Spec §4.1"]
        is_concrete: true
        
    - requirement_id: "REG-MGF-2.1.1-001"
      original_pointer: "Data governance policy document"
      original_issue: "Points to policy, not implementation"
      corrected_pointer:
        primary: "src/intelligence/ai-core-pal/mcp_server.py"
        code_files:
          - "src/intelligence/ai-core-pal/mcp_server.py#validate_schema_access"
          - "docs/hana-cloud/HANA_CLOUD_TABLES.md"
        spec_sections: ["Simula Spec §3"]
        is_concrete: true
        
    - requirement_id: "REG-MGF-2.3.2-001"
      original_pointer: "Orchestration documentation"
      original_issue: "Points to documentation, not code"
      corrected_pointer:
        primary: "src/generativeUI/gateway/orchestrator.py"
        code_files:
          - "src/generativeUI/gateway/orchestrator.py"
          - "docs/hana-cloud/ORCHESTRATION_FLOW.md"
        spec_sections: ["Arabic Spec §3.4"]
        is_concrete: true
        note: "Orchestrator exists but not production-validated"
        
  unresolvable_pointers:
    - requirement_id: "REG-MGF-2.3.1-001"
      reason: "Agent handoff not yet implemented"
      remediation: "Create agent handoff module - tracked as GAP"
    - requirement_id: "REG-MGF-2.3.3-001"
      reason: "Emergent capability monitoring not implemented"
      remediation: "Design monitoring hooks - tracked as GAP"

# =============================================================================
# Section 5.4: Status Legend with Special Markers
# Review Issue: "Multiple requirements marked 'partial*' but asterisk not defined"
# =============================================================================

status_legend:
  description: |
    Complete status legend including special markers used in the requirements table.
    
  base_statuses:
    implemented:
      definition: "Fully implemented and validated in production"
      color_code: "green"
      criteria:
        - "Code exists and is deployed"
        - "Production validation completed"
        - "Evidence of successful operation"
        
    partial:
      definition: "Partially implemented - code exists but gaps remain"
      color_code: "yellow"
      criteria:
        - "Code exists"
        - "Some functionality working"
        - "Not all aspects of requirement addressed"
        
    gap:
      definition: "Identified gap with remediation plan"
      color_code: "orange"
      criteria:
        - "Requirement understood"
        - "Implementation not started or incomplete"
        - "Remediation plan exists"
        
    na:
      definition: "Not applicable to current use cases"
      color_code: "gray"
      criteria:
        - "Requirement does not apply to any current domain"
        - "Documented reason for non-applicability"
        
    missing:
      definition: "Requirement not addressed"
      color_code: "red"
      criteria:
        - "No implementation exists"
        - "No remediation plan"
        - "Action required"
        
  special_markers:
    asterisk:
      symbol: "*"
      definition: "Downgraded from 'implemented' to 'partial' during review"
      explanation: |
        Original assessment claimed 'implemented' based on code existence.
        Corrected to 'partial' because production validation is pending.
      examples:
        - "REG-MGF-2.2.1-002*: Trajectory evaluator code exists but not production-tested"
        - "REG-MGF-2.1.1-001*: Schema validation exists but not all schemas migrated"
        
    dagger:
      symbol: "†"
      definition: "Completely absent - no implementation or plan exists"
      explanation: |
        Used to highlight requirements that require immediate attention.
        More severe than 'missing' - indicates no work has begun.
      examples:
        - "REG-MGF-2.3.3-001†: Emergent capability monitoring"
        
    double_asterisk:
      symbol: "**"
      definition: "Upgraded from 'gap' to 'partial' due to recent work"
      explanation: |
        Used to highlight positive progress since last review.
      examples:
        - "REG-MGF-2.2.3-001**: Human override - decision points now specified"

# =============================================================================
# Section 5.5: GFAIC Charter Summary
# Review Issue: "GFAIC charter is cited but not included"
# =============================================================================

gfaic_charter_summary:
  description: |
    Redacted summary of the GFAIC (Global Finance AI Council) charter.
    Full charter is maintained in internal governance repository.
    This summary provides auditor-accessible information.
    
  charter_metadata:
    document_title: "Global Finance AI Council Charter"
    version: "2.1"
    effective_date: "2025-09-01"
    review_cycle: "Annual"
    classification: "Internal - Confidential"
    repository_path: "[REDACTED]/governance/gfaic-charter-v2.1.pdf"
    
  purpose:
    summary: |
      The GFAIC provides governance oversight for AI systems used in
      finance operations across the organization. It ensures compliance
      with regulatory requirements and internal risk policies.
      
  composition:
    chair: "CFO or delegate"
    members:
      - role: "Chief Risk Officer representative"
        voting: true
      - role: "Chief Data Officer representative"
        voting: true
      - role: "Head of GFS"
        voting: true
      - role: "Head of Internal Audit"
        voting: false  # observer
      - role: "Legal/Compliance representative"
        voting: true
      - role: "Technology representative"
        voting: true
    quorum: "4 voting members"
    
  responsibilities:
    - category: "Model Approval"
      description: "Approve AI models before production deployment"
      frequency: "As needed"
    - category: "Risk Assessment"
      description: "Review AI risk assessments annually"
      frequency: "Annual"
    - category: "Incident Review"
      description: "Review AI-related incidents"
      frequency: "Within 5 business days of incident"
    - category: "Policy Updates"
      description: "Approve updates to AI governance policies"
      frequency: "As needed"
      
  decision_authority:
    tier_1:
      threshold: "Low risk AI (advisory only, human decision)"
      authority: "GFS Head"
    tier_2:
      threshold: "Medium risk AI (human-in-loop with override)"
      authority: "GFAIC subcommittee"
    tier_3:
      threshold: "High risk AI (autonomous financial decisions)"
      authority: "Full GFAIC"
      
  meeting_cadence:
    regular: "Monthly"
    emergency: "Within 48 hours of trigger event"
    
  attestation:
    statement: |
      This summary accurately reflects the GFAIC charter as of the
      effective date. For audit purposes, the full charter is available
      upon request through the governance repository with appropriate
      access controls.
    attested_by: "Governance & Controls Lead"
    attestation_date: "2026-04-18"
    
  audit_access:
    process: |
      External auditors may request access to the full GFAIC charter
      through the Internal Audit liaison. Access is granted on a
      need-to-know basis with standard NDA requirements.