# ════════════════════════════════════════════════════════════════════════════
# SAP AI Experience – Service Map
# 1:1 mapping of every codebase service to its AI experience tier.
# ════════════════════════════════════════════════════════════════════════════

tiers:

  # ── Tier 1 ─ SAP Analytics Cloud : Gen UI Experiences ────────────────────
  sap_analytics_cloud:
    label: "SAP Analytics Cloud – Generative UI Experiences"
    services:

      world-monitor:
        path: src/generativeUI/world-monitor-main
        description: >
          Real-time global intelligence dashboard that aggregates 19 domain feeds
          including geopolitical conflict, market data, seismology, aviation, and
          cyber-threat intelligence into a unified AI-powered monitoring surface.
          Content-based routing classifies each feed by sensitivity and dispatches
          queries to either AI Core (public news) or vLLM (internal analysis).
          The Kuzu graph layer maintains entity relationships across events while
          Redis provides 24-hour TTL caching for high-frequency feed polling.
        data_product: world-monitor-service-v1
        port: 3000
        data_security: internal/confidential
        autonomy_level: L2
        inputs:
          - service: agent-router
            port: 8010
            purpose: Mangle-based query routing and data classification
          - service: enterprise-sovereign-llm
            port: 8080
            purpose: LLM inference for confidential analysis
          - service: search
            port: 9200
            purpose: Full-text and vector search across indexed events
          - service: redis
            port: 6379
            purpose: Feed caching (24h TTL)
          - external: [GDELT, RSS, EONET, ACLED, USGS, FAA, MarineTraffic]
            purpose: Raw intelligence feeds
        outputs:
          - "REST API: 19 endpoints (earthquakes, news, markets, conflicts, climate, aviation, maritime, cyber, infrastructure, displacement, wildfire, unrest, military, predictions, research, intelligence, economic, audit)"
          - "Data product: world-monitor-service-v1"
          - "Kuzu graph: entity relationship updates"

      ui5-webcomponents-ngx:
        path: src/generativeUI/ui5-webcomponents-ngx-main
        description: >
          Angular wrapper library for SAP UI5 Web Components providing type-safe
          bindings, code generation, and AI-assisted component development.
          The agent routes all requests through Mangle classification — public
          documentation and code snippets go to AI Core while any detected user
          data falls back to vLLM for sovereign processing.
          Operates at autonomy level L3 since it primarily handles public
          component metadata and open-source documentation.
        data_product: ui5-angular-service-v1
        port: 4200
        data_security: public
        autonomy_level: L3
        inputs:
          - service: agent-router
            port: 8010
            purpose: Query routing with user-data detection fallback to vLLM
        outputs:
          - "REST API: component generation, code completion, template generation, documentation lookup"
          - "Data product: ui5-angular-service-v1"
          - "NPM packages: Angular component wrappers"

      data-cleaning-copilot:
        path: src/generativeUI/data-cleaning-copilot-main
        description: >
          AI-assisted data cleaning copilot that profiles, validates, and transforms
          raw enterprise datasets using schema-aware intelligence from OData
          Vocabularies and field classification from the Mangle Query Service.
          Processes confidential financial data exclusively through vLLM with
          data masking and a no-storage retention policy enforced by Mangle rules.
          Elasticsearch caches field mapping results to avoid repeated classification
          lookups across cleaning sessions.
        data_product: data-cleaning-service-v1
        port: 8002
        data_security: confidential
        autonomy_level: L2
        inputs:
          - service: agent-router
            port: 8010
            purpose: Field classification via Mangle rules
          - service: odata-schema
            port: 8003
            purpose: OData vocabulary discovery for schema understanding
          - service: search
            port: 9200
            purpose: Cached field mappings and data profiling indices
          - external: [SAP AI Core]
            purpose: LLM backend via AICORE credentials
        outputs:
          - "REST API: data profiling, validation rules, transformation code, PII detection"
          - "Data product: data-cleaning-service-v1"
          - "Elasticsearch indices: field mapping cache"

  # ── Tier 2 ─ SAP CAP : Custom AI App & Agentic Governance Control Tower ─
  sap_cap:
    label: "SAP CAP – Custom AI App & Agentic Governance Control Tower"
    services:

      cap-llm-plugin:
        path: src/data/cap-llm-plugin-main
        description: >
          CDS plugin that wires LLM capabilities directly into SAP CAP applications,
          providing chat completions, RAG search, and embedding generation through
          the HANA vector engine.
          Implements three anonymisation strategies — k-Anonymity, l-Diversity, and
          Differential Privacy — to protect sensitive business data before it reaches
          any LLM endpoint.
          Mangle rules classify each request so confidential HANA data routes to
          vLLM while general queries use external AI Core.
        data_product: cap-llm-service-v1
        port: 4004
        data_security: internal/confidential
        autonomy_level: L2
        inputs:
          - service: agent-router
            port: 8010
            purpose: Mangle-based data classification and routing
          - service: enterprise-sovereign-llm
            port: 8080
            purpose: LLM inference for confidential HANA data
          - service: embedded-hana
            port: 8050
            purpose: HANA vector similarity search for RAG
          - external: [SAP AI Core]
            purpose: External LLM for non-confidential queries
        outputs:
          - "REST API: /chat/completions, /embeddings, /rag/search, /anonymize"
          - "Data product: cap-llm-service-v1"
          - "CDS plugin: auto-registered in CAP application context"

      ai-sdk-js:
        path: src/data/ai-sdk-js-main
        description: >
          Official TypeScript SDK for SAP AI Core that provides programmatic access
          to foundation models, orchestration workflows, document grounding, and
          prompt registry management.
          Ships six NPM packages covering the full AI Core API surface from
          scenario management (@sap-ai-sdk/ai-api) through to LangChain bindings
          (@sap-ai-sdk/langchain).
          Hybrid routing sends confidential financial data to vLLM while general
          inference uses the external AI Core endpoint.
          OData Vocabularies integration enables automatic type generation from
          annotated service metadata.
        data_product: ai-core-inference-v1
        port: null
        data_security: hybrid
        autonomy_level: L2
        packages:
          - "@sap-ai-sdk/ai-api"
          - "@sap-ai-sdk/foundation-models"
          - "@sap-ai-sdk/langchain"
          - "@sap-ai-sdk/orchestration"
          - "@sap-ai-sdk/document-grounding"
          - "@sap-ai-sdk/prompt-registry"
        inputs:
          - external: [SAP AI Core, SAP Generative AI Hub, SAP Orchestration Service, SAP Document Grounding, SAP Prompt Registry]
            purpose: Foundation model inference, orchestration, grounding
          - service: odata-schema
            port: 8003
            purpose: OData type generation and annotation lookup
        outputs:
          - "NPM packages: 6 SDK modules for AI Core integration"
          - "Data product: ai-core-inference-v1"
          - "TypeScript types: auto-generated from OData vocabularies"

  # ── Tier 3 ─ AI Core ────────────────────────────────────────────────────
  ai_core:
    label: "AI Core"
    services:

      enterprise-sovereign-llm:
        path: src/intelligence/vllm-main
        description: >
          On-premise sovereign LLM serving engine that runs LLaMA 3.1 (70B/8B),
          Mistral 7B, Codellama 34B, Mixtral 8x7B, Gemma, and Phi-3 models in
          GGUF quantised format with Metal and CUDA GPU acceleration.
          Exposes a fully OpenAI-compatible API so every upstream service can
          swap between vLLM and external AI Core without code changes.
          Zig and Mojo performance layers handle tokenisation and batch scheduling
          for low-latency inference on air-gapped deployments.
          All confidential enterprise data is routed here by the agent-router —
          no data ever leaves the on-premise boundary.
        port: 8080
        data_security: on-premise-only
        inputs:
          - service: object-store-for-model
            purpose: GGUF model files and embedding binaries from S3 or local storage
          - hardware: "NVIDIA GPU (T4/A100/H100) or Apple Metal"
            purpose: GPU-accelerated inference
        outputs:
          - "OpenAI-compatible API: POST /v1/chat/completions, /v1/completions, /v1/embeddings, GET /v1/models"
          - "Supported models: LLaMA 3.1 70B, LLaMA 3.1 8B, Mistral 7B, Codellama 34B, Mixtral 8x7B, Gemma, Phi-3"

      search:
        path: src/intelligence/elasticsearch-main
        description: >
          Enterprise search and analytics engine providing full-text search, vector
          similarity search, and log aggregation with index-based governance routing.
          Mangle rules classify each index as public, internal, or confidential so
          queries against sensitive indices are automatically routed to vLLM rather
          than external AI Core.
          The middleware layer implements circuit breakers and rate limiters to
          protect cluster stability under high query load.
          Kuzu metadata tracks index lineage and cross-service field relationships.
        data_product: elasticsearch-search-v1
        port: 9200
        data_security: index-based
        autonomy_level: L2
        inputs:
          - "Index data from all services (world-monitor events, field mappings, vocabulary embeddings)"
          - "Query requests from agent-router, data-cleaning-copilot, odata-schema"
        outputs:
          - "REST API: full-text search, vector search, aggregations, cluster health"
          - "Data product: elasticsearch-search-v1"
          - "Index metadata: field mappings, governance classifications"

      external-news-engine:
        path: src/generativeUI/world-monitor-main/server
        description: >
          Backend news aggregation service that polls 19 external intelligence feeds
          including GDELT documents, RSS news, EONET natural events, ACLED conflict
          data, USGS seismology, FAA aviation delays, and MarineTraffic vessel data.
          Each feed handler normalises raw data into a common event schema and
          publishes it to Elasticsearch for indexing and to Redis for short-term
          caching.
          Mangle classification tags each event by sensitivity level before it
          reaches any downstream consumer.
          Serves as the raw intelligence ingestion layer for the entire platform.
        data_product: world-monitor-service-v1
        port: 3001
        data_security: public/internal
        inputs:
          - external: [GDELT, RSS, EONET, ACLED, UCDP, USGS, FAA, MarineTraffic, CoinGecko, Polymarket, ArXiv, HackerNews, GitHub]
            purpose: Raw intelligence feeds
          - service: redis
            port: 6379
            purpose: Feed polling cache
        outputs:
          - "REST API: 19 domain endpoints (conflict, market, seismology, aviation, maritime, cyber, climate, etc.)"
          - "Elasticsearch indices: normalised event documents"
          - "Redis cache: feed polling state"

      agent-router:
        path: src/data/mangle-query-service
        description: >
          Central governance hub that evaluates Mangle Datalog rules to classify
          every field and query by data sensitivity, then routes to the appropriate
          LLM backend — AI Core for public/internal data, vLLM for confidential,
          blocked for restricted.
          Implements semantic caching via Elasticsearch to avoid redundant
          classification lookups and adaptive model routing that selects the
          optimal model based on query complexity and latency requirements.
          Connects to HANA for direct data access, OData Vocabularies for schema
          discovery, and LangChain for RAG pattern support.
          Exposes OpenAI-compatible endpoints plus admin controls including
          emergency-stop, emergency-reset, and emergency-status.
        port: 8010
        data_security: governance-hub
        inputs:
          - service: search
            port: 9200
            purpose: Semantic caching and metadata indices
          - service: enterprise-sovereign-llm
            port: 8080
            purpose: LLM inference for confidential data
          - service: odata-schema
            port: 8003
            purpose: OData vocabulary and schema discovery
          - external: [SAP HANA, SAP AI Core]
            purpose: Direct data access and external LLM fallback
        outputs:
          - "OpenAI-compatible API: /v1/chat/completions, /v1/completions, /v1/embeddings, /v1/models"
          - "Admin API: /admin/emergency-stop, /admin/emergency-reset, /admin/emergency-status"
          - "Data products: mangle-query-completion, mangle-embeddings, mangle-model-router, mangle-vocabulary-service"
          - "Routing decisions: public→AI Core, confidential→vLLM, restricted→blocked"

      odata-schema:
        path: src/data/odata-vocabularies-main
        description: >
          Semantic schema service hosting 18+ SAP OData vocabularies including
          Analytics, UI, Common, Session, Communication, PersonalData, and Graph
          with full term lookup, annotation generation, and validation.
          Provides CDS and GraphQL generators that produce typed schemas from
          vocabulary annotations for downstream services like ai-sdk-js and
          cap-llm-plugin.
          Elasticsearch indexes vocabulary embeddings for semantic term search
          across the entire vocabulary corpus.
          Operates at autonomy level L3 since vocabularies are public documentation,
          falling back to vLLM only when actual entity data is detected.
        data_product: odata-vocabulary-service-v1
        port: 8003
        data_security: public
        autonomy_level: L3
        inputs:
          - service: search
            port: 9200
            purpose: Vocabulary embedding index for semantic term search
          - "OpenAI-compatible API (via agent-router) for annotation generation"
        outputs:
          - "REST API: vocabulary listing, term search, annotation generation, validation"
          - "18+ vocabularies: Analytics, UI, Common, Session, Communication, DataIntegration, DirectEdit, EntityRelationship, Graph, HTML5, Hierarchy, ILM, ODM, Offline, PDF, PersonalData, Support"
          - "Generators: CDS schema generator, GraphQL schema generator"
          - "Data product: odata-vocabulary-service-v1"

      mcp-pal-deep-learning:
        path: src/intelligence/ai-core-pal
        description: >
          MCP server that exposes SAP HANA Predictive Analysis Library algorithms
          as tool-invocable resources — classification, regression, clustering,
          time-series forecasting (ARIMA), and anomaly detection.
          Consumes training data products (treasury, ESG, performance BPC) from
          the FinSight tier and annotates results with OData Analytics vocabulary
          terms for downstream consumption.
          Kuzu graph metadata tracks model lineage and feature relationships
          across PAL algorithm executions.
          All HANA data is classified as confidential and routed exclusively
          through vLLM — no PAL data reaches external endpoints.
        data_product: aicore-pal-service-v1
        port: 8020
        data_security: confidential
        autonomy_level: L2
        inputs:
          - service: agent-router
            port: 8010
            purpose: Mangle-based data classification
          - service: enterprise-sovereign-llm
            port: 8080
            purpose: LLM inference for confidential HANA data
          - service: odata-schema
            port: 8003
            purpose: Analytics vocabulary annotations for PAL results
          - external: [SAP HANA PAL]
            purpose: Predictive algorithms (classification, regression, clustering, ARIMA, anomaly detection)
          - service: sap-datasphere
            purpose: Training data products (treasury, ESG, performance BPC)
        outputs:
          - "MCP tools: pal_classification, pal_regression, pal_clustering, pal_forecasting, pal_anomaly_detection"
          - "MCP tools: analytics_annotation, kpi_annotation, vocabulary_lookup"
          - "Data product: aicore-pal-service-v1"
          - "Kuzu graph: model lineage and feature relationship updates"

      ai-shared-fabric:
        path: src/data/ai-core-streaming
        description: >
          Streaming AI fabric that provides Server-Sent Events (SSE) for real-time
          prompt processing, mesh-based multi-agent coordination, and XSUAA-
          authenticated access to all AI Core services.
          The mesh layer (routing_rules.mg + registry.yaml) defines agent routing
          topology so requests flow through governance checks before reaching any
          LLM endpoint.
          Connects to HANA for context retrieval and supports both AI Core
          (public/internal) and vLLM (confidential) backends via Mangle
          classification.
          Serves as the shared transport layer that all Tier 1 and Tier 2
          services use for streaming inference.
        data_product: aicore-streaming-service-v1
        port: 8030
        data_security: public/internal
        autonomy_level: L2
        inputs:
          - service: agent-router
            port: 8010
            purpose: Mangle-based routing and governance enforcement
          - service: enterprise-sovereign-llm
            port: 8080
            purpose: Streaming LLM inference for confidential data
          - external: [SAP HANA, XSUAA, SAP AI Core]
            purpose: Context retrieval, authentication, external LLM fallback
        outputs:
          - "OpenAI-compatible streaming API: SSE /v1/chat/completions, /v1/completions, /v1/embeddings"
          - "MCP protocol: agent coordination and tool invocation"
          - "Data product: aicore-streaming-service-v1"
          - "Mesh registry: agent routing topology"

      ai-prompt-agent:
        path: src/intelligence/generative-ai-toolkit-for-sap-hana-cloud-main
        description: >
          RAG and prompt engineering agent that combines HANA vector store
          retrieval with LLM text generation to produce grounded, context-aware
          responses from enterprise data.
          Generates and stores embeddings in HANA Cloud's vector engine, then
          uses LangChain retrieval patterns to find relevant context before
          prompting vLLM for generation.
          Kuzu metadata tracks prompt templates, retrieval chains, and generation
          quality metrics across agent executions.
          All data is classified as confidential since it accesses raw HANA
          enterprise content — exclusively routed through vLLM.
        data_product: gen-ai-hana-service-v1
        port: 8040
        data_security: confidential
        autonomy_level: L2
        inputs:
          - service: agent-router
            port: 8010
            purpose: Mangle-based data classification
          - service: enterprise-sovereign-llm
            port: 8080
            purpose: Text generation from retrieved context
          - service: embedded-hana
            port: 8050
            purpose: HANA vector store retrieval for RAG
          - external: [SAP HANA Cloud]
            purpose: Vector embedding storage and retrieval
        outputs:
          - "REST API: /chat (RAG), /embeddings, /rag/search, /agent/execute"
          - "Data product: gen-ai-hana-service-v1"
          - "HANA vector store: embedding writes"
          - "Kuzu graph: prompt lineage and quality metrics"

      embedded-hana:
        path: src/data/langchain-integration-for-sap-hana-cloud-main
        description: >
          LangChain integration layer that provides vector similarity search,
          knowledge graph traversal (RDF/SPARQL-QA), and schema-aware query
          execution against SAP HANA Cloud.
          Implements HanaDB as a LangChain VectorStore with cosine, L2, and
          inner-product distance metrics for embedding-based retrieval.
          The knowledge graph component supports RDF triple stores and SPARQL
          question-answering for structured enterprise knowledge extraction.
          All HANA data access is classified as confidential — Mangle rules
          ensure queries route exclusively through vLLM with no external leakage.
        data_product: hana-vector-store-v1
        port: 8050
        data_security: confidential
        autonomy_level: L2
        inputs:
          - service: agent-router
            port: 8010
            purpose: Mangle-based schema classification
          - service: enterprise-sovereign-llm
            port: 8080
            purpose: LLM inference for SPARQL-QA and query generation
          - external: [SAP HANA Cloud]
            purpose: Vector engine, knowledge graph (RDF), SQL execution
        outputs:
          - "REST API: /vector/search, /vector/similarity, /sparql/qa, /schema/info, /tables/list"
          - "LangChain VectorStore: HanaDB with cosine/L2/inner-product metrics"
          - "Data product: hana-vector-store-v1"
          - "Knowledge graph: RDF triple traversal and SPARQL results"


  # ── Tier 4 ─ FinSight SAP BTP/BDC ──────────────────────────────────────
  finsight_btp_bdc:
    label: "FinSight SAP BTP / Business Data Cloud"
    services:

      sap-datasphere:
        path: src/training
        description: >
          Multi-component data preparation platform that runs a 7-stage Text-to-SQL
          generation pipeline against banking schemas covering treasury capital
          markets, ESG sustainability metrics, and performance BPC fact tables.
          HippoCPP (a Zig+Mojo port of Kuzu) provides the graph engine for schema
          relationship traversal during SQL generation, while Mangle rules validate
          each generated query against governance constraints.
          NVIDIA ModelOpt handles post-training quantisation (4-bit, 8-bit GGUF)
          and optimisation before models are deployed to the vLLM serving layer.
          Produces four core data products consumed by mcp-pal and ai-prompt-agent
          for downstream analytics and RAG.
        data_products:
          - treasury-capital-markets-v1
          - esg-sustainability-v1
          - performance-bpc-v1
          - staging-schema-v1
        components:
          pipeline: src/training/pipeline
          hippocpp: src/training/hippocpp
          nvidia-modelopt: src/training/nvidia-modelopt
          mangle-rules: src/training/mangle
        data_security: confidential
        inputs:
          - external: [SAP HANA]
            purpose: Source banking schemas (treasury, ESG, performance BPC)
          - service: enterprise-sovereign-llm
            purpose: Base models for fine-tuning and quantisation
          - hardware: "NVIDIA GPU (T4/A100)"
            purpose: Model optimisation and quantisation
        outputs:
          - "Data products: treasury-capital-markets-v1, esg-sustainability-v1, performance-bpc-v1, staging-schema-v1"
          - "Enrichment overlays: 11 enrichment YAMLs in data_products/enriched/"
          - "Quantised models: GGUF checkpoints for vLLM deployment"
          - "Text-to-SQL training pairs: validated by Mangle governance rules"

      data-products:
        description: >
          Federated data product registry spanning all 13 services, each exposing
          an ODPS 4.1-compliant registry.yaml with structured contracts, SLAs,
          ownership, and lineage metadata.
          Enrichment overlays in src/training/data_products/enriched/ layer
          additional context (treasury, ESG, performance dimensions) onto base
          data products for downstream analytics.
          Every registry now carries an sap_ai_experience tier reference linking
          it back to this manifest for full traceability.
          The SBOM pipeline (Makefile) audits all data products for licence
          compliance, vulnerability exposure, and Mangle policy conformance.
        registries:
          - src/generativeUI/world-monitor-main/data_products
          - src/generativeUI/ui5-webcomponents-ngx-main/data_products
          - src/generativeUI/data-cleaning-copilot-main/data_products
          - src/intelligence/ai-core-pal/data_products
          - src/intelligence/elasticsearch-main/data_products
          - src/intelligence/generative-ai-toolkit-for-sap-hana-cloud-main/data_products
          - src/data/ai-core-streaming/data_products
          - src/data/ai-sdk-js-main/data_products
          - src/data/cap-llm-plugin-main/data_products
          - src/data/langchain-integration-for-sap-hana-cloud-main/data_products
          - src/data/mangle-query-service/data_products
          - src/data/odata-vocabularies-main/data_products
          - src/training/data_products
        enrichment_overlays: src/training/data_products/enriched
        inputs:
          - "All 13 service data_products/registry.yaml files"
          - "SBOM pipeline: CycloneDX BOMs, SPDX exports, Mangle audit results"
        outputs:
          - "13 ODPS 4.1 registry contracts with tier references"
          - "11 enrichment overlay YAMLs"
          - "SBOM artefacts: CycloneDX, SPDX, SARIF, SLSA provenance"

      hana-vector-and-ke:
        description: >
          Composite capability combining HANA Cloud's vector engine for embedding-
          based similarity search with the Kuzu knowledge engine for graph-based
          entity relationship traversal and RDF/SPARQL question-answering.
          The vector store (via embedded-hana) supports cosine, L2, and inner-
          product distance metrics for high-dimensional retrieval.
          The knowledge engine (via ai-core-pal/kuzu) maintains entity lineage
          graphs that connect PAL algorithm outputs to their source schemas and
          training data products.
          All access is classified as confidential — Mangle rules enforce vLLM-
          only routing for any query touching HANA vector or knowledge data.
        components:
          vector-store: src/data/langchain-integration-for-sap-hana-cloud-main
          knowledge-graph: src/intelligence/ai-core-pal/kuzu
          pal-algorithms: src/intelligence/ai-core-pal/src
        data_security: confidential
        inputs:
          - service: embedded-hana
            port: 8050
            purpose: HANA vector similarity search
          - service: mcp-pal-deep-learning
            port: 8020
            purpose: PAL algorithm execution and Kuzu graph queries
          - external: [SAP HANA Cloud]
            purpose: Vector engine and knowledge graph storage
        outputs:
          - "Vector search: cosine/L2/inner-product similarity results"
          - "Knowledge graph: RDF triple traversal, SPARQL-QA answers"
          - "Entity lineage: Kuzu graph relationships across PAL outputs"

      object-store-for-model:
        description: >
          Model artefact storage layer managing GGUF model files, embedding
          binaries, and quantised checkpoints with S3 upload/download and local
          volume caching.
          NVIDIA ModelOpt produces optimised checkpoints (4-bit/8-bit GGUF) from
          base models, which are then stored in S3 and pulled by vLLM at serving
          time.
          The upload-model-to-s3.sh script handles model lifecycle — uploading
          new checkpoints and managing model inventory across deployments.
          Docker volume model-cache provides local persistence so vLLM can serve
          models without network dependency in air-gapped environments.
        components:
          model-storage: src/intelligence/vllm-main/models
          model-optimiser: src/training/nvidia-modelopt
          upload-scripts: src/intelligence/vllm-main/upload-model-to-s3.sh
        data_security: confidential
        inputs:
          - service: sap-datasphere
            purpose: Base models and fine-tuned checkpoints from training pipeline
          - hardware: "NVIDIA GPU"
            purpose: Quantisation and optimisation via ModelOpt
        outputs:
          - "GGUF model files: quantised LLaMA, Mistral, Phi-3 checkpoints"
          - "Embedding binaries: all-MiniLM-L6-v2 and similar"
          - "S3 artefacts: versioned model uploads"
          - "Docker volume: model-cache for air-gapped serving"

# ════════════════════════════════════════════════════════════════════════════
# Cross-Cutting Governance Fabric
# ════════════════════════════════════════════════════════════════════════════
governance:
  mangle:
    description: Datalog rules engine – data classification & routing decisions
    locations: "*/mangle/ directories across all services"
    central_hub: src/data/mangle-query-service

  kuzu:
    description: Graph database for entity lineage & metadata relationships
    locations: "*/kuzu/ directories across all services"

  mcp_agents:
    description: Model Context Protocol – standardised agent interface (autonomy L1–L3)
    locations: "*/agent/ and */mcp_server/ directories across all services"

  routing_policy: |
    confidential → vLLM only (on-premise)
    internal     → AI Core with restrictions
    public       → AI Core (external)
    restricted   → blocked entirely

