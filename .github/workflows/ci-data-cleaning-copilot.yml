# Data Cleaning Copilot - CI: lint, tests, coverage
# Runs on changes under data-cleaning-copilot-main/

name: CI (Data Cleaning Copilot)

on:
  push:
    branches: [main, develop]
    paths: ['data-cleaning-copilot-main/**']
  pull_request:
    branches: [main]
    paths: ['data-cleaning-copilot-main/**']

defaults:
  run:
    working-directory: data-cleaning-copilot-main

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov ruff

      - name: Lint (Ruff)
        run: ruff check . --output-format=github || true

      - name: Run tests with coverage
        run: |
          pytest definition/odata/tests/ -v --cov=definition/odata --cov-report=xml --cov-report=term --cov-fail-under=30
        continue-on-error: true

      - name: Dependency audit
        run: pip install pip-audit && pip-audit --desc || true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-cleaning-copilot
          path: data-cleaning-copilot-main/coverage.xml
          retention-days: 14
        if: always()
