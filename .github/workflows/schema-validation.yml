# Schema Validation CI Workflow
# Validates all JSON schemas on PR and push to main
# Addresses review issue: "No CI hook — validate.py exists but nothing triggers it on PR"

name: Schema Validation

on:
  push:
    branches: [main]
    paths:
      - 'docs/schema/**'
  pull_request:
    branches: [main]
    paths:
      - 'docs/schema/**'
  workflow_dispatch:  # Allow manual trigger

jobs:
  validate-schemas:
    name: Validate JSON Schemas
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'docs/schema/requirements.txt'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/schema/requirements.txt
      
      - name: Check registry status
        run: |
          python docs/schema/validate.py --registry-status
      
      - name: Validate all schemas
        run: |
          python docs/schema/validate.py --registry-check
      
      - name: Validate schema conventions
        run: |
          python docs/schema/validate.py --validate-all
      
      - name: JSON syntax check
        run: |
          find docs/schema -name "*.json" -type f | while read f; do
            echo "Checking $f"
            python -c "import json; json.load(open('$f'))" || exit 1
          done
      
      - name: YAML syntax check
        run: |
          pip install pyyaml
          find docs/schema -name "*.yaml" -type f | while read f; do
            echo "Checking $f"
            python -c "import yaml; yaml.safe_load(open('$f'))" || exit 1
          done

  validate-training-data:
    name: Validate Training Data
    runs-on: ubuntu-latest
    needs: validate-schemas
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'docs/schema/requirements.txt'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/schema/requirements.txt
      
      - name: Validate training data (simple schema)
        working-directory: src/training
        run: |
          python -m schema_pipeline.schema_validator --all --json-output > validation_results.json || true
          cat validation_results.json
          
      - name: Upload validation results
        uses: actions/upload-artifact@v4
        with:
          name: training-data-validation
          path: src/training/validation_results.json
          retention-days: 7

  validate-fixtures:
    name: Validate Test Fixtures
    runs-on: ubuntu-latest
    needs: validate-schemas
    if: ${{ hashFiles('tests/fixtures/schema/**') != '' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'docs/schema/requirements.txt'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docs/schema/requirements.txt
      
      - name: Validate fixtures against schemas
        run: |
          echo "Validating test fixtures..."
          # Arabic domain fixtures
          if [ -d "tests/fixtures/schema/arabic" ]; then
            for fixture in tests/fixtures/schema/arabic/valid/*.json; do
              if [ -f "$fixture" ]; then
                schema_name=$(basename "$fixture" | sed 's/_.*/.schema.json/')
                echo "Validating $fixture against $schema_name"
                python docs/schema/validate.py --domain arabic --schema "$schema_name" --file "$fixture" || true
              fi
            done
          fi
          
          # TB domain fixtures
          if [ -d "tests/fixtures/schema/tb" ]; then
            for fixture in tests/fixtures/schema/tb/valid/*.json; do
              if [ -f "$fixture" ]; then
                schema_name=$(basename "$fixture" | sed 's/_.*/.schema.json/')
                echo "Validating $fixture against $schema_name"
                python docs/schema/validate.py --domain tb --schema "$schema_name" --file "$fixture" || true
              fi
            done
          fi
          
          echo "Fixture validation complete"