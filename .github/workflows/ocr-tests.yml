name: OCR Module Tests

on:
  push:
    paths:
      - 'src/intelligence/ocr/**'
  pull_request:
    paths:
      - 'src/intelligence/ocr/**'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-ara poppler-utils

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install tesseract poppler
          brew install tesseract-lang

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r src/intelligence/ocr/requirements.txt

      - name: Verify Tesseract
        run: |
          tesseract --version
          tesseract --list-langs | head -10

      - name: Run OCR tests
        run: |
          python -m pytest src/intelligence/ocr/tests/ -v --tb=short

      - name: Run OCR tests with warnings as errors
        run: |
          python -m pytest src/intelligence/ocr/tests/ -v --tb=short -W error::DeprecationWarning

