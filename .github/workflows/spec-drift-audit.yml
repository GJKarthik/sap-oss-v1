# =============================================================================
# Spec-Drift Audit GitHub Actions Workflow
# =============================================================================
# This workflow runs the spec-drift auditor on every PR and push to main.
# It ensures that specifications, schemas, and code remain synchronized.
# =============================================================================

name: Spec-Drift Audit

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'docs/latex/specs/**'
      - 'docs/schema/**'
      - 'src/**'
      - '**/.clinerules*'
      - '.github/workflows/spec-drift-audit.yml'

  push:
    branches:
      - main
    paths:
      - 'docs/latex/specs/**'
      - 'docs/schema/**'
      - 'src/**'
      - '**/.clinerules*'

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      audit_mode:
        description: 'Audit mode'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - pr
      domain:
        description: 'Specific domain to audit (optional)'
        required: false
        type: string

# Ensure only one audit runs at a time per PR
concurrency:
  group: spec-drift-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  spec-drift-audit:
    name: Spec-Drift Audit
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write
      issues: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git diff

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jsonschema

      - name: Run Spec-Drift Audit (PR)
        if: github.event_name == 'pull_request'
        id: audit_pr
        run: |
          python3 scripts/spec-drift/audit.py \
            --mode pr \
            --base-ref origin/${{ github.base_ref }} \
            --head-ref ${{ github.sha }} \
            --output-format github-actions \
            --output-file audit-report.md \
            --no-fail-on-blocking
          
          # Store exit code for later
          echo "audit_exit_code=$?" >> $GITHUB_OUTPUT
          
          # Read report for PR comment
          echo "report<<EOF" >> $GITHUB_OUTPUT
          cat audit-report.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run Spec-Drift Audit (Push to Main)
        if: github.event_name == 'push'
        id: audit_push
        run: |
          python3 scripts/spec-drift/audit.py \
            --mode full \
            --output-format yaml \
            --output-file audit-report-full.yaml
          
          echo "audit_exit_code=$?" >> $GITHUB_OUTPUT

      - name: Run Spec-Drift Audit (Manual)
        if: github.event_name == 'workflow_dispatch'
        id: audit_manual
        run: |
          DOMAIN_FLAG=""
          if [ -n "${{ github.event.inputs.domain }}" ]; then
            DOMAIN_FLAG="--domain ${{ github.event.inputs.domain }}"
          fi
          
          python3 scripts/spec-drift/audit.py \
            --mode ${{ github.event.inputs.audit_mode }} \
            $DOMAIN_FLAG \
            --output-format console \
            --output-file audit-report-manual.txt

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.audit_pr.outputs.report }}`;
            
            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('## Spec-Drift Audit Summary')
            );
            
            const body = `## 🔍 Spec-Drift Audit Results\n\n${report}\n\n---\n*Generated by [spec-drift-audit](.github/workflows/spec-drift-audit.yml)*`;
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

      - name: Upload Audit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spec-drift-audit-report
          path: |
            audit-report*.md
            audit-report*.yaml
            audit-report*.txt
          retention-days: 30

      - name: Check for Blocking Issues (PR)
        if: github.event_name == 'pull_request'
        run: |
          # Re-run with fail-on-blocking to get proper exit code
          python3 scripts/spec-drift/audit.py \
            --mode pr \
            --base-ref origin/${{ github.base_ref }} \
            --head-ref ${{ github.sha }} \
            --output-format console \
            --fail-on-blocking

      - name: Create Issue for Critical Drift (Push)
        if: github.event_name == 'push' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 Spec-Drift Detected on Main Branch`;
            const body = `## Spec-Drift Audit Failed
            
            A spec-drift audit detected critical issues on the main branch.
            
            **Commit:** ${{ github.sha }}
            **Workflow Run:** [View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            Please review the audit report and resolve the drift issues immediately.
            
            ---
            *This issue was automatically created by the spec-drift-audit workflow.*`;
            
            // Check if similar issue already exists
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'spec-drift,critical'
            });
            
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['spec-drift', 'critical', 'automated']
              });
            }

  # Scheduled full audit (weekly)
  scheduled-audit:
    name: Weekly Full Audit
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml jsonschema

      - name: Run Full Audit
        run: |
          python3 scripts/spec-drift/audit.py \
            --mode full \
            --output-format yaml \
            --output-file weekly-audit-report.yaml

      - name: Upload Weekly Report
        uses: actions/upload-artifact@v4
        with:
          name: weekly-spec-drift-audit
          path: weekly-audit-report.yaml
          retention-days: 90