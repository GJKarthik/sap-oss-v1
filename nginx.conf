# API Gateway Configuration
# Routes requests to appropriate microservices
#
# Scalability fixes applied (see docs/SCALABILITY-AUDIT.md P0-1, P0-2, P1-6):
#   - worker_processes auto  (uses all CPU cores)
#   - keepalive 32 on every upstream  (reuse TCP connections, avoid per-request handshake)
#   - proxy_read_timeout 300s  (LLM inference can run 120-300s; was nginx default 60s)
#   - gzip on for JSON/text  (reduces bandwidth ~60-70%)
#   - Added vllm (8080) and agent-router (8010) upstreams + routes
#   - CORS: restrict to known origins in production (currently wildcard for dev)

worker_processes auto;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # --- Connection keepalive to upstreams ---
    # Eliminates per-request TCP handshake overhead at high RPS.

    upstream model_optimizer {
        server model-optimizer:8001;
        keepalive 32;
    }

    upstream data_copilot {
        server data-copilot:8002;
        keepalive 32;
    }

    upstream odata_service {
        server odata-service:8003;
        keepalive 32;
    }

    # --- LLM inference gateway (highest-load service) ---
    upstream vllm {
        server vllm:8080;
        keepalive 64;
    }

    # --- Mangle / Agent Router (governance hub for 6 services) ---
    upstream agent_router {
        server agent-router:8010;
        keepalive 32;
    }

    # --- MCP PAL gateway ---
    upstream mcp_pal {
        server mcp-pal:8020;
        keepalive 32;
    }

    # --- AI Shared Fabric (streaming broker) ---
    upstream ai_shared_fabric {
        server ai-shared-fabric:8030;
        keepalive 32;
    }

    # --- Arabic OCR service ---
    upstream arabic_ocr {
        server arabic-ocr:8060;
        keepalive 32;
    }

    # --- Compression ---
    gzip on;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        application/json
        application/javascript
        text/plain
        text/event-stream
        text/html;

    # --- Default proxy timeouts ---
    # LLM inference takes up to 300s; override per-location where needed.
    proxy_connect_timeout   10s;
    proxy_send_timeout     300s;
    proxy_read_timeout     300s;
    send_timeout           300s;

    # --- Keep upstream connections alive ---
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # --- Logging ---
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;

    server {
        listen 80;
        server_name localhost;

        # CORS headers — restrict to known origins in production
        # TODO: replace '*' with explicit origin list before going to production
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

        # Handle preflight
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # Health check endpoint
        location /health {
            return 200 '{"status":"healthy","gateway":"nginx"}';
            add_header Content-Type application/json;
        }

        # ── LLM Inference (vllm) ─────────────────────────────────────────────

        location /v1/ {
            proxy_pass http://vllm;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # SSE streaming support
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
        }

        # ── Agent Router / Mangle governance ────────────────────────────────

        location /api/route/ {
            proxy_pass http://agent_router;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── MCP PAL gateway ──────────────────────────────────────────────────

        location /mcp/ {
            proxy_pass http://mcp_pal;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # MCP SSE endpoint
            proxy_buffering off;
            proxy_cache off;
        }

        # ── AI Shared Fabric (streaming broker) ─────────────────────────────

        location /api/fabric/ {
            proxy_pass http://ai_shared_fabric;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
        }

        # ── Model Optimizer API ──────────────────────────────────────────────

        location /api/models {
            proxy_pass http://model_optimizer;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/jobs {
            proxy_pass http://model_optimizer;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/gpu {
            proxy_pass http://model_optimizer;
            proxy_set_header Host $host;
        }

        # ── Data Copilot API ─────────────────────────────────────────────────

        location /api/copilot {
            proxy_pass http://data_copilot;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/checks {
            proxy_pass http://data_copilot;
            proxy_set_header Host $host;
        }

        # ── OData Vocabularies API ───────────────────────────────────────────

        location /api/odata {
            proxy_pass http://odata_service;
            proxy_set_header Host $host;
        }

        location /api/vocabularies {
            proxy_pass http://odata_service;
            proxy_set_header Host $host;
        }

        # ── Arabic OCR API ───────────────────────────────────────────────────

        location /ocr/ {
            proxy_pass http://arabic_ocr;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Service discovery ────────────────────────────────────────────────

        location /api/services {
            return 200 '{
                "services": {
                    "vllm":            {"url": "/v1/",        "port": 8080},
                    "agent-router":    {"url": "/api/route/", "port": 8010},
                    "mcp-pal":         {"url": "/mcp/",       "port": 8020},
                    "ai-shared-fabric":{"url": "/api/fabric/","port": 8030},
                    "model-optimizer": {"url": "/api/models", "port": 8001},
                    "data-copilot":    {"url": "/api/copilot","port": 8002},
                    "odata-service":   {"url": "/api/odata",  "port": 8003},
                    "arabic-ocr":      {"url": "/ocr/",       "port": 8060}
                }
            }';
            add_header Content-Type application/json;
        }
    }
}
