# API Gateway Configuration
# Routes requests to appropriate microservices

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # --- LLM inference gateway ---
    upstream vllm {
        server vllm:8080;
        keepalive 64;
    }

    # --- Arabic OCR service ---
    upstream arabic_ocr {
        server arabic-ocr:8060;
        keepalive 32;
    }

    # --- Data Copilot / Training API ---
    upstream data_copilot {
        server data-copilot:8002;
        keepalive 32;
    }

    # --- OData Schema service ---
    upstream odata_schema {
        server odata-schema:8003;
        keepalive 32;
    }

    # --- Model Optimizer API ---
    upstream model_optimizer {
        server model-optimizer:8001;
        keepalive 32;
    }

    server {
        listen 80;
        server_name localhost;

        # ── LLM Proxy (v1 API) ──────────────────────────────────────────────
        location /v1/ {
            proxy_pass http://vllm;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
        }

        # ── Training / Data Copilot API ──────────────────────────────────────
        location /api/ {
            proxy_pass http://data_copilot;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── OData Schema ────────────────────────────────────────────────────
        location /api/odata/ {
            proxy_pass http://odata_schema;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Arabic OCR ──────────────────────────────────────────────────────
        location /ocr/ {
            proxy_pass http://arabic_ocr;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Model Optimizer ─────────────────────────────────────────────────
        location /api/models {
            proxy_pass http://model_optimizer;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Service Discovery ───────────────────────────────────────────────
        location /api/services {
            return 200 '{
                "services": {
                    "vllm":            {"url": "/v1/",        "port": 8080},
                    "training-api":    {"url": "/api/",       "port": 8002},
                    "model-optimizer": {"url": "/api/models", "port": 8001},
                    "odata-schema":    {"url": "/api/odata",  "port": 8003},
                    "arabic-ocr":      {"url": "/ocr/",       "port": 8060}
                }
            }';
            add_header Content-Type application/json;
        }

        # ── Health Aggregator ──────────────────────────────────────────────
        location /health {
            default_type application/json;
            return 200 '{"status":"ok","gateway":"healthy"}';
        }
    }
}
