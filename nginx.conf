# API Gateway Configuration (100% Python Production)
# Routes requests to Horizon Cinematic UI and Orchestration Hub

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Use Docker's internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;
        server_name localhost;

        # ── Frontend (Horizon Cinematic) ───────────────────────────────────
        location / {
            set $upstream_shell http://angular-shell:80;
            proxy_pass $upstream_shell;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── LLM Proxy & Router (Migrated to API Server) ─────────────────────
        location /v1/ {
            set $upstream_api http://api-server:8002;
            proxy_pass $upstream_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
        }

        # ── PAL Algorithm Gateway (Migrated from Zig) ──────────────────────
        location /pal/ {
            set $upstream_api http://api-server:8002;
            proxy_pass $upstream_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── MCP JSON-RPC Gateway ───────────────────────────────────────────
        location /mcp {
            set $upstream_api http://api-server:8002;
            proxy_pass $upstream_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── API (General) ──────────────────────────────────────────────────
        location /api/health {
            set $upstream_api http://api-server:8002;
            proxy_pass $upstream_api/health;
            proxy_set_header Host $host;
        }

        location /api/gpu/status {
            set $upstream_api http://api-server:8002;
            proxy_pass $upstream_api/gpu/status;
            proxy_set_header Host $host;
        }

        location /api/ {
            set $upstream_api http://api-server:8002;
            proxy_pass $upstream_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Model Optimizer ─────────────────────────────────────────────────
        location /api/models {
            set $upstream_opt http://model-optimizer:8001;
            proxy_pass $upstream_opt;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Arabic OCR ──────────────────────────────────────────────────────
        location /ocr/ {
            set $upstream_ocr http://arabic-ocr:8060;
            proxy_pass $upstream_ocr;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Health Aggregator ──────────────────────────────────────────────
        location /health {
            default_type application/json;
            return 200 '{"status":"ok","gateway":"healthy","mode":"python-production"}';
        }
    }
}
