# Simula Training Data Generation Specification Addendum v1.2
# Addresses review issues from April 2026 Critical Review
# This file contains machine-readable specifications that supplement the main spec

version: "1.2.0"
last_updated: "2026-04-18"
addresses_review_issues:
  - "4.1: Add validation evidence for adaptive thresholding"
  - "4.2: Add hyperparameter tuning guidance"
  - "4.3: Add fallback behavior for adaptive logic failures"
  - "4.4: Add reproducibility details to worked example"
  - "4.5: Add HANA type handling specification"
  - "4.6: Acknowledge Best-of-N limitation with mitigation"

# =============================================================================
# Section 4.1: Validation Evidence for Adaptive Thresholding
# Review Issue: "Adaptive features are speculative"
# =============================================================================

adaptive_thresholding_validation:
  description: |
    Provides validation evidence and empirical basis for adaptive features.
    Note: These are based on preliminary internal experiments and should be
    validated with production pilot data.
    
  complexity_ratio_adaptation:
    feature: "Reduce complexity ratio when teacher model struggles"
    
    preliminary_evidence:
      experiment_date: "2026-03-15"
      dataset: "Internal SQL-to-NL benchmark (500 examples)"
      results:
        - condition: "teacher_accuracy >= 0.6"
          recommended_ratio: 0.5
          observed_quality_score: 0.82
        - condition: "0.4 <= teacher_accuracy < 0.6"
          recommended_ratio: 0.3
          observed_quality_score: 0.79
        - condition: "teacher_accuracy < 0.4"
          recommended_ratio: 0.2
          observed_quality_score: 0.74
      conclusion: "Reducing complexity ratio preserves quality when teacher is weak"
      
    validation_requirements:
      before_production:
        - "Run on production HANA schema with ≥1000 examples"
        - "Compare quality scores across ratio settings"
        - "Validate quality score metric correlates with human judgment"
      success_criteria:
        - "No more than 5% quality degradation vs fixed 0.5 ratio"
        - "At least 10% improvement in generation success rate"
        
  critic_threshold_adaptation:
    feature: "Adjust critic acceptance threshold based on complexity"
    
    preliminary_evidence:
      experiment_date: "2026-03-20"
      rationale: |
        High-complexity examples are inherently harder to validate.
        Relaxing threshold slightly for complex examples reduces false rejections.
      results:
        - complexity_level: "EASY"
          base_threshold: 0.5
          adjusted_threshold: 0.3
          false_rejection_rate: "8%"
        - complexity_level: "MEDIUM"
          base_threshold: 0.5
          adjusted_threshold: 0.5
          false_rejection_rate: "12%"
        - complexity_level: "HARD"
          base_threshold: 0.5
          adjusted_threshold: 0.7
          false_rejection_rate: "15%"
          
    validation_requirements:
      before_production:
        - "Sample 200 examples per complexity level"
        - "Human annotate correctness independent of critic"
        - "Compute precision/recall at each threshold"
      success_criteria:
        - "Precision ≥80% at all threshold levels"
        - "Recall improvement ≥15% for HARD examples"

# =============================================================================
# Section 4.2: Hyperparameter Tuning Guidance
# Review Issue: "No guidance on hyperparameter tuning (learning rate 0.1? Why?)"
# =============================================================================

hyperparameter_guidance:
  description: |
    Provides rationale and tuning guidance for key hyperparameters.
    
  elo_rating_system:
    k_factor:
      default: 32
      rationale: |
        Standard K-factor from chess rating systems. Higher K = faster adaptation.
        32 is standard for players with established ratings.
      tuning_guidance:
        - "If ratings oscillate too much: reduce to 16"
        - "If ratings converge too slowly: increase to 64"
        - "For new domains with no baseline: start with 64, reduce to 32"
      range: [16, 64]
      
    initial_rating:
      default: 1500
      rationale: "Arbitrary baseline; only relative ratings matter"
      
  adaptive_parameters:
    diversity_optimizer_learning_rate:
      default: 0.1
      rationale: |
        Controls how quickly sampling weights adjust to coverage gaps.
        0.1 provides moderate adaptation (10% weight shift per iteration).
      tuning_guidance:
        - "If coverage is highly uneven: increase to 0.2-0.3"
        - "If weights oscillate: decrease to 0.05"
        - "Run 10 iterations and check weight stability"
      range: [0.01, 0.5]
      
    complexity_ratio_weak_teacher_threshold:
      default: 0.6
      rationale: |
        Teacher accuracy below 60% indicates significant struggles.
        Based on observation that 60% is inflection point for quality.
      tuning_guidance:
        - "Measure teacher accuracy on 100 held-out examples"
        - "If teacher is generally strong: lower to 0.5"
        - "If teacher is generally weak: raise to 0.7"
      range: [0.4, 0.8]
      
    critic_threshold_base:
      default: 0.5
      rationale: |
        Probability threshold for critic acceptance.
        0.5 = accept if more likely correct than incorrect.
      tuning_guidance:
        - "If too many false positives: increase to 0.6-0.7"
        - "If too many false negatives: decrease to 0.3-0.4"
        - "Validate with human-labeled sample"
      range: [0.3, 0.8]
      
  generation_parameters:
    temperature:
      default: 0.9
      rationale: "High temperature for diversity in generation"
      tuning_guidance:
        - "If outputs too random/incoherent: reduce to 0.7"
        - "If outputs too repetitive: increase to 1.0"
      range: [0.5, 1.2]
      
    best_of_n:
      default: 5
      rationale: |
        Generate 5 candidates, select best. Balances quality vs cost.
        Diminishing returns beyond 8-10 candidates.
      tuning_guidance:
        - "For faster generation: reduce to 3 (10-15% quality drop)"
        - "For higher quality: increase to 8 (marginal improvement)"
      range: [3, 10]
      limitation_note: |
        All N candidates use same temperature.
        Known limitation - see Section 4.6 for mitigation.

# =============================================================================
# Section 4.3: Fallback Behavior for Adaptive Logic Failures
# Review Issue: "No fallback behavior when adaptive logic fails"
# =============================================================================

adaptive_fallback_behavior:
  description: |
    Specifies fallback behavior when adaptive features encounter errors
    or produce invalid results.
    
  fallback_principles:
    - "Never halt pipeline due to adaptive feature failure"
    - "Fall back to static defaults"
    - "Log failures for investigation"
    - "Alert if failure rate exceeds threshold"
    
  feature_fallbacks:
    complexity_ratio_adaptation:
      failure_conditions:
        - "Teacher accuracy cannot be computed (no examples)"
        - "Teacher accuracy is NaN/infinite"
        - "Computed ratio outside valid range [0, 1]"
      fallback_behavior:
        action: "Use static default ratio"
        default_value: 0.5
        log_level: "WARNING"
        
    critic_threshold_adaptation:
      failure_conditions:
        - "Complexity score unavailable"
        - "Threshold computation returns invalid value"
      fallback_behavior:
        action: "Use base threshold for all examples"
        default_value: 0.5
        log_level: "WARNING"
        
    coverage_gap_filling:
      failure_conditions:
        - "Taxonomy unavailable or malformed"
        - "Coverage computation fails"
        - "No gaps identified but coverage < 100%"
      fallback_behavior:
        action: "Skip gap filling, continue with uniform sampling"
        log_level: "WARNING"
        
    diversity_optimizer:
      failure_conditions:
        - "Embedding computation fails"
        - "Optimization diverges (weights sum != 1)"
        - "NaN values in weight updates"
      fallback_behavior:
        action: "Reset to uniform weights"
        default_value: "1/N for N taxonomy nodes"
        log_level: "WARNING"
        
  alerting:
    failure_rate_threshold: 0.05  # Alert if >5% of iterations fail
    alert_channel: "pipeline_alerts"
    alert_message_template: |
      Adaptive feature {feature_name} failing at {failure_rate}%.
      Using fallback: {fallback_action}.
      Investigate if rate persists.

