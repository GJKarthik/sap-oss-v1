      python -m simula.pipeline.generate \
        --config configs/tb-review-config.yaml \
        --schema-context data/schemas/tb_review_schema.json \
        --output-dir output/tb_review_20260325 \
        --target-count 10000 \
        --seed 42 \
        --log-level INFO
        
  random_seeds:
    main_seed: 42
    numpy_seed: 42
    torch_seed: 42
    transformers_seed: 42
    note: "All seeds derived from main_seed for reproducibility"
    
  model_versions:
    generation_model:
      name: "Qwen/Qwen3.5-35B"
      revision: "a1b2c3d4e5f6"  # Git commit hash
      quantization: "AWQ-INT4"
    embedding_model:
      name: "sentence-transformers/all-MiniLM-L6-v2"
      revision: "8b3219a"
      
  expected_outputs:
    total_examples: 10247
    rejection_rate: "8.2%"
    complexity_distribution:
      EASY: 3412
      MEDIUM: 4156
      HARD: 2679
    global_diversity: 0.51
    local_diversity: 0.19
    coverage_at_level_2: 0.87
    
  output_files:
    - path: "output/tb_review_20260325/training_examples.jsonl"
      sha256: "placeholder_hash_to_be_computed"
    - path: "output/tb_review_20260325/rejected_examples.jsonl"
      sha256: "placeholder_hash_to_be_computed"
    - path: "output/tb_review_20260325/metrics.json"
      sha256: "placeholder_hash_to_be_computed"
      
  reproducibility_note: |
    Due to LLM non-determinism, exact reproduction may not be possible.
    Expected variance: ±5% on example counts, ±0.02 on diversity metrics.
    Seed controls random sampling but not LLM generation.

# =============================================================================
# Section 4.5: HANA Type Handling Specification
# Review Issue: "Missing handling of HANA types"
# =============================================================================

hana_type_handling:
  description: |
    Specification for handling SAP HANA-specific data types in schema
    extraction and SQL generation.
    
  type_mapping:
    # HANA type → Standard SQL type for training
    ALPHANUM: "VARCHAR"
    BIGINT: "BIGINT"
    BINARY: "BINARY"
    BINTEXT: "BLOB"
    BLOB: "BLOB"
    BOOLEAN: "BOOLEAN"
    CHAR: "CHAR"
    CLOB: "CLOB"
    DATE: "DATE"
    DAYDATE: "DATE"
    DECIMAL: "DECIMAL"
    DOUBLE: "DOUBLE PRECISION"
    FIXED: "DECIMAL"
    FLOAT: "FLOAT"
    INT: "INTEGER"
    INTEGER: "INTEGER"
    NCHAR: "NCHAR"
    NCLOB: "NCLOB"
    NVARCHAR: "NVARCHAR"
    REAL: "REAL"
    SECONDDATE: "TIMESTAMP"
    SECONDTIME: "TIME"
    SHORTTEXT: "NVARCHAR"
    SMALLDECIMAL: "DECIMAL"
    SMALLINT: "SMALLINT"
    ST_GEOMETRY: "GEOMETRY"  # Spatial type
    ST_POINT: "POINT"  # Spatial type
    TEXT: "NCLOB"  # Full-text type
    TIME: "TIME"
    TIMESTAMP: "TIMESTAMP"
    TINYINT: "TINYINT"
    VARBINARY: "VARBINARY"
    VARCHAR: "VARCHAR"
    
  special_type_handling:
    spatial_types:
      types: ["ST_GEOMETRY", "ST_POINT"]
      handling: "Include in schema but mark as 'spatial_type: true'"
      sql_generation: "Generate spatial function usage (ST_Distance, ST_Within, etc.)"
      
    fulltext_types:
      types: ["TEXT", "SHORTTEXT"]
      handling: "Include in schema but mark as 'fulltext_type: true'"
      sql_generation: "Generate CONTAINS() predicate for text search"
      
    temporal_types:
      types: ["DAYDATE", "SECONDDATE", "SECONDTIME"]
      handling: "Map to standard DATE/TIMESTAMP/TIME"
      sql_generation: "Use standard temporal functions"
      
  schema_extraction:
    source: "INFORMATION_SCHEMA.COLUMNS or SYS.TABLE_COLUMNS"
    columns_to_extract:
      - "COLUMN_NAME"
      - "DATA_TYPE_NAME"
      - "LENGTH"
      - "SCALE"
      - "IS_NULLABLE"
      - "DEFAULT_VALUE"
      - "COMMENTS"
      
  validation:
    unknown_type_handling: "Log warning, treat as VARCHAR"
    type_validation_enabled: true
    validate_generated_sql: "Parse with HANA SQL parser if available"

# =============================================================================
# Section 4.6: Best-of-N Same Temperature Limitation
# Review Issue: "Acknowledged as limitation but not fixed"
# =============================================================================

best_of_n_limitation:
  description: |
    Documents the known limitation where all N candidates in Best-of-N
    sampling use the same temperature, and provides mitigation strategies.
    
  limitation:
    summary: "All N candidates generated at same temperature"
    impact: |
      Reduced diversity among candidates. If temperature is high, all candidates
      may be highly varied. If low, all may be similar. No spectrum of diversity.
    status: "known_limitation"
    
  why_not_fixed:
    reason: |
      Fixing requires multiple LLM calls with different temperatures, which
      increases latency and cost by factor of N. Current implementation uses
      single batched call for efficiency.
    cost_estimate: |
      Current: 1 LLM call for N candidates (batched)
      With fix: N LLM calls (sequential or parallel)
      Latency impact: ~N× increase
      
  mitigation_strategies:
    strategy_1:
      name: "Inter-batch temperature variation"
      description: "Vary temperature across batches, not within"
      implementation: |
        batch_temperatures = [0.7, 0.8, 0.9, 1.0, 1.1]
        for batch in batches:
            temp = batch_temperatures[batch_id % len(batch_temperatures)]
            generate(batch, temperature=temp)
      effectiveness: "Medium - provides some diversity across batches"
      
    strategy_2:
      name: "Top-p variation"
      description: "Keep temperature fixed, vary top_p (nucleus sampling)"
      implementation: |
        Generate N candidates with same temperature but vary top_p
        from 0.8 to 0.95 across candidates.
      effectiveness: "Low-Medium - top_p variation less impactful than temperature"
      
    strategy_3:
      name: "Post-hoc diversity filtering"
      description: "Generate more candidates, filter for diversity"
      implementation: |
        Generate 2N candidates
        Compute pairwise similarity
        Select N most diverse while maintaining quality threshold
      effectiveness: "High - but increases cost by 2×"
      
  recommended_approach:
    primary: "strategy_1"  # Inter-batch temperature variation
    rationale: "Best balance of diversity improvement vs cost"
    
  future_work:
    description: "Consider multi-temperature batched generation if vLLM supports it"
    tracking_issue: "SIMULA-142"