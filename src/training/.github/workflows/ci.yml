# =============================================================================
# CI Pipeline — training-main
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python lint ────────────────────────────────────────────────────────────
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check nvidia-modelopt/api/ pipeline/
      - run: ruff format --check nvidia-modelopt/api/ pipeline/

  # ── Python tests ───────────────────────────────────────────────────────────
  test-python:
    name: Test Python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -r nvidia-modelopt/requirements.txt
          pip install fastapi uvicorn[standard] httpx pytest pytest-cov
      - name: Run ModelOpt API tests
        run: |
          cd nvidia-modelopt
          python -m pytest tests/ -v --tb=short --cov=api --cov-report=xml
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: nvidia-modelopt/coverage.xml

  # ── Pipeline tests ──────────────────────────────────────────────────────
  test-pipeline:
    name: Test Pipeline (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install pytest
      - name: Run pipeline tests
        run: python -m pytest pipeline/tests/ -v --tb=short

  # ── Angular lint & test ────────────────────────────────────────────────────
  test-ui:
    name: Test Angular UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: nvidia-modelopt/ui/package-lock.json
      - name: Install
        run: cd nvidia-modelopt/ui && npm ci
      - name: Lint
        run: cd nvidia-modelopt/ui && npm run lint 2>/dev/null || echo "Lint not configured yet"
      - name: Test
        run: cd nvidia-modelopt/ui && npm run test -- --no-watch --browsers=ChromeHeadless || echo "Tests not configured yet"
      - name: Build
        run: cd nvidia-modelopt/ui && npm run build:prod

  # ── Docker build ───────────────────────────────────────────────────────────
  build-docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [test-python]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t modelopt-api:ci nvidia-modelopt/

  # ── Benchmarks ───────────────────────────────────────────────────────────
  benchmarks:
    name: Pipeline Benchmarks
    runs-on: ubuntu-latest
    needs: [test-pipeline]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pytest
      - name: Run pipeline benchmarks
        run: ./benchmarks/bench_pipeline.sh
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/pipeline_results.json