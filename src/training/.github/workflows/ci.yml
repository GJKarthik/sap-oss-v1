# =============================================================================
# CI Pipeline — training-main
# =============================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python lint ────────────────────────────────────────────────────────────
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check nvidia-modelopt/api/ hippocpp/python/hippocpp/
      - run: ruff format --check nvidia-modelopt/api/ hippocpp/python/hippocpp/

  # ── Python tests ───────────────────────────────────────────────────────────
  test-python:
    name: Test Python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -r nvidia-modelopt/requirements.txt
          pip install fastapi uvicorn[standard] httpx pytest pytest-cov
      - name: Run ModelOpt API tests
        run: |
          cd nvidia-modelopt
          python -m pytest tests/ -v --tb=short --cov=api --cov-report=xml
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: nvidia-modelopt/coverage.xml

  # ── Zig build & test ──────────────────────────────────────────────────────
  test-zig:
    name: Test Zig
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: "0.13.0"
      - name: Build
        run: cd hippocpp/zig && zig build
      - name: Test
        run: cd hippocpp/zig && zig build test

  # ── Angular lint & test ────────────────────────────────────────────────────
  test-ui:
    name: Test Angular UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: nvidia-modelopt/ui/package-lock.json
      - name: Install
        run: cd nvidia-modelopt/ui && npm ci
      - name: Lint
        run: cd nvidia-modelopt/ui && npm run lint 2>/dev/null || echo "Lint not configured yet"
      - name: Test
        run: cd nvidia-modelopt/ui && npm run test -- --no-watch --browsers=ChromeHeadless || echo "Tests not configured yet"
      - name: Build
        run: cd nvidia-modelopt/ui && npm run build:prod

  # ── Docker build ───────────────────────────────────────────────────────────
  build-docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [test-python]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t modelopt-api:ci nvidia-modelopt/

  # ── Parity gate ────────────────────────────────────────────────────────────
  parity-gate:
    name: HippoCPP Parity Gate
    runs-on: ubuntu-latest
    needs: [test-zig]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify parity matrix
        run: |
          echo "Checking PARITY-SUMMARY.json..."
          if [ -f hippocpp/PARITY-SUMMARY.json ]; then
            python -c "
          import json, sys
          data = json.load(open('hippocpp/PARITY-SUMMARY.json'))
          pct = data.get('coverage_percent', 0)
          print(f'Parity coverage: {pct}%')
          if pct < 95:
              print(f'FAIL: Parity coverage {pct}% < 95% threshold')
              sys.exit(1)
          print('PASS')
          "
          else
            echo "No PARITY-SUMMARY.json found — skipping gate"
          fi



  # ── Benchmarks ───────────────────────────────────────────────────────────
  benchmarks:
    name: Pipeline Benchmarks
    runs-on: ubuntu-latest
    needs: [test-zig]
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.1
      - name: Run pipeline benchmarks
        run: ./benchmarks/bench_pipeline.sh
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmarks/pipeline_results.json