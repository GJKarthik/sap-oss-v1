# H200 141GB Training Configuration for Specialist Models
# 
# Hardware: NVIDIA H200 141GB
# This is the premium tier - can train larger models at full precision
# Training time: ~1 hour per specialist

# Model Configuration - Can use larger model on H200
model:
  name: "Qwen/Qwen2.5-14B-Instruct"  # Larger model for better quality
  # Options:
  # - "Qwen/Qwen2.5-7B-Instruct"   # ~45 min per specialist
  # - "Qwen/Qwen2.5-14B-Instruct"  # ~1.5 hours per specialist
  # - "Qwen/Qwen2.5-32B-Instruct"  # ~3 hours per specialist

# Quantization - H200 can train in full BF16
quantization:
  enabled: false  # Full precision training on H200
  compute_dtype: "bfloat16"
  
# LoRA Configuration - Higher rank for production quality
lora:
  r: 32  # Higher rank = better quality
  alpha: 64
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# Training Parameters - Aggressive batch size for H200
training:
  per_device_train_batch_size: 16  # Large batch on 141GB
  gradient_accumulation_steps: 2
  effective_batch_size: 32
  
  learning_rate: 2e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  
  num_train_epochs: 3
  
  # Fused optimizers for speed
  optim: "adamw_torch_fused"
  weight_decay: 0.01
  max_grad_norm: 1.0
  
  # Full BF16 training
  bf16: true
  tf32: true
  
  # Gradient checkpointing optional on H200 (enough memory)
  gradient_checkpointing: false
  
  # Logging
  logging_steps: 25
  save_strategy: "steps"
  save_steps: 500
  save_total_limit: 3
  
  # Performance
  dataloader_num_workers: 16
  dataloader_pin_memory: true
  
# Data Configuration
data:
  max_seq_length: 4096  # Longer sequences on H200
  packing: true

# Hardware Configuration
hardware:
  gpu: "H200-141GB"
  cpus: 24
  ram: "240 GB"
  expected_memory_usage: "~80-100 GB"
  expected_training_time: "~1 hour per specialist (14B model)"