[project]
name = "hippocpp"
version = "0.1.0"
description = "HippoCPP - A high-performance graph database engine for Mojo with embedded storage, HNSW vector indexing, Cypher query support, and MVCC transactions"
authors = ["SAP SE"]
license = "Apache-2.0"

[dependencies]
# MAX nightly channel for latest Mojo features
max = { version = "nightly", channel = "nightly" }

[build]
# Build configuration
entry-point = "src/hippocpp/__init__.mojo"

[test]
# Test configuration
test-files = [
    "catalog.🔥",
    "common.🔥",
    "expression.🔥",
    "graph.🔥"
]

[tool.mojo]
# Mojo-specific settings
edition = "2024.12"

