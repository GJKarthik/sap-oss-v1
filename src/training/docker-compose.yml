# =============================================================================
# training-main — Enterprise Orchestrator (V2)
# =============================================================================
# Consolidated Deployment: GenerativeUI + HippoCPP + Pipeline
# Usage: docker compose up -d

version: '3.8'

services:
  # --------------------------------------------------------------------------
  # Training Console V2 — The Master Orchestrator (FastAPI + PyTorch)
  # --------------------------------------------------------------------------
  training-api:
    build:
      context: ../generativeUI/training-console/packages/api-server
      dockerfile: Dockerfile
    container_name: training-api
    ports:
      - "${PORT:-8001}:8001"
    environment:
      - HOST=0.0.0.0
      - PORT=8001
      - ALLOWED_ORIGINS=http://localhost:4200,http://localhost:8080
    volumes:
      # Mount the upstream directories so FastAPI can Subprocess them natively
      - ./pipeline:/app/src/training/pipeline
      - ./hippocpp:/app/src/training/hippocpp
      - ~/.cache/huggingface:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # --------------------------------------------------------------------------
  # Training Console UI — Angular 18 Enterprise Dashboard
  # --------------------------------------------------------------------------
  training-ui:
    build:
      context: ../generativeUI/training-console
      dockerfile: apps/angular-shell/Dockerfile
    container_name: training-ui
    ports:
      - "${UI_PORT:-8080}:80"
    environment:
      - SAP_API_BASE_URL=http://training-api:8001
    depends_on:
      training-api:
        condition: service_healthy
    restart: unless-stopped
