# OpenTelemetry Collector configuration
# Receives OTLP (HTTP + gRPC) and forwards to local Jaeger instance.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

  # Add resource attributes useful for filtering in Jaeger UI
  resource:
    attributes:
      - key: deployment.environment
        value: local
        action: upsert

exporters:
  otlp/jaeger:
    endpoint: jaeger:14250
    tls:
      insecure: true

  # Optional: log spans to stdout for debugging
  debug:
    verbosity: detailed

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, resource]
      exporters: [otlp/jaeger]

  telemetry:
    metrics:
      address: 0.0.0.0:8888
