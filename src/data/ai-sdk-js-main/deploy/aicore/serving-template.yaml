# SAP AI SDK JS - KServe InferenceService
# OpenAI-Compatible API Server
#
# Endpoints:
#   - POST /v1/chat/completions  (streaming supported)
#   - POST /v1/completions       (streaming supported)
#   - POST /v1/embeddings
#   - GET  /v1/models
#   - GET  /health

apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: ai-sdk-js-openai
  annotations:
    scenarios.ai.sap.com/description: "OpenAI-compatible API using SAP AI SDK for JavaScript"
    scenarios.ai.sap.com/name: "ai-sdk-js-openai"
    executables.ai.sap.com/description: "Node.js OpenAI API proxy with AI Core integration"
    executables.ai.sap.com/name: "ai-sdk-js-openai-exec"
  labels:
    scenarios.ai.sap.com/id: "ai-sdk-js-openai"
    executables.ai.sap.com/id: "ai-sdk-js-openai-exec"
    ai.sap.com/version: "1.0.0"
spec:
  inputs:
    parameters:
      - name: AI_CORE_RESOURCE_GROUP
        type: string
        default: "default"
      - name: DEFAULT_MODEL
        type: string
        default: "gpt-4"
      - name: LOG_LEVEL
        type: string
        default: "info"
  template:
    apiVersion: serving.kserve.io/v1beta1
    kind: InferenceService
    metadata:
      annotations:
        autoscaling.knative.dev/metric: "concurrency"
        autoscaling.knative.dev/target: "100"
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
      labels:
        ai.sap.com/resourcePlan: "infer.s"
    spec:
      predictor:
        imagePullSecrets:
          - name: docker-registry-secret
        minReplicas: 1
        maxReplicas: 10
        containerConcurrency: 100
        timeout: 300
        containers:
          - name: kserve-container
            image: "{{DOCKER_REGISTRY}}/ai-sdk-js-openai:{{VERSION}}"
            ports:
              - containerPort: 8080
                protocol: TCP
            env:
              - name: AICORE_SERVICE_KEY
                valueFrom:
                  secretKeyRef:
                    name: ai-core-service-key
                    key: service-key
              - name: AI_CORE_RESOURCE_GROUP
                value: "{{AI_CORE_RESOURCE_GROUP}}"
              - name: DEFAULT_MODEL
                value: "{{DEFAULT_MODEL}}"
              - name: PORT
                value: "8080"
              - name: LOG_LEVEL
                value: "{{LOG_LEVEL}}"
              - name: NODE_ENV
                value: "production"
            resources:
              requests:
                memory: "256Mi"
                cpu: "100m"
              limits:
                memory: "1Gi"
                cpu: "1000m"
            livenessProbe:
              httpGet:
                path: /health
                port: 8080
              initialDelaySeconds: 10
              periodSeconds: 30
            readinessProbe:
              httpGet:
                path: /health
                port: 8080
              initialDelaySeconds: 5
              periodSeconds: 10