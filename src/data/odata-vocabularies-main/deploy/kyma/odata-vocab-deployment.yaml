# OData Vocabularies MCP Server - Kyma Deployment
# Independent service deployment for SAP BTP Kyma Runtime
---
apiVersion: v1
kind: Secret
metadata:
  name: odata-vocab-secrets
  namespace: kube-scb
type: Opaque
stringData:
  # MCP authentication token (generate with: openssl rand -base64 32)
  MCP_AUTH_TOKEN: "CHANGE_ME_GENERATE_SECURE_TOKEN"
  # Optional: AI Core credentials for real embeddings
  # AICORE_CLIENT_ID: ""
  # AICORE_CLIENT_SECRET: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: odata-vocab-config
  namespace: kube-scb
data:
  MCP_PORT: "9150"
  MCP_HOST: "0.0.0.0"
  LOG_LEVEL: "INFO"
  CORS_ENABLED: "true"
  CORS_ALLOWED_ORIGINS: "https://*.kyma.shoot.canary.k8s-hana.ondemand.com"
  # Feature flags
  FEATURE_SEMANTIC_SEARCH: "true"
  FEATURE_RAG_CONTEXT: "true"
  FEATURE_CDS_GENERATOR: "true"
  # Optional: AI Core config (uncomment if using real embeddings)
  # AICORE_BASE_URL: "https://api.ai.prod.eu10.aws.ml.hana.ondemand.com/v2"
  # AICORE_RESOURCE_GROUP: "default"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: odata-vocab-server
  namespace: kube-scb
  labels:
    app: odata-vocab
    version: v3.0.0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: odata-vocab
  template:
    metadata:
      labels:
        app: odata-vocab
        version: v3.0.0
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      serviceAccountName: odata-vocab-sa
      imagePullSecrets:
      - name: ollamadocker
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: mcp-server
        image: docker.io/gjkarthik/odata-vocab:v3.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 9150
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: odata-vocab-config
        - secretRef:
            name: odata-vocab-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 9150
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 9150
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
        volumeMounts:
        - name: embeddings-cache
          mountPath: /app/_embeddings
        - name: audit-logs
          mountPath: /app/_audit_logs
      volumes:
      - name: embeddings-cache
        emptyDir: {}
      - name: audit-logs
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: odata-vocab-service
  namespace: kube-scb
  labels:
    app: odata-vocab
spec:
  type: ClusterIP
  ports:
  - port: 9150
    targetPort: 9150
    protocol: TCP
    name: http
  selector:
    app: odata-vocab
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: odata-vocab-sa
  namespace: kube-scb
---
# Istio VirtualService for external access
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: odata-vocab-vs
  namespace: kube-scb
spec:
  hosts:
  - "odata-vocab.KYMA_DOMAIN"  # Replace with your Kyma domain
  gateways:
  - kyma-system/kyma-gateway
  http:
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: odata-vocab-service
        port:
          number: 9150
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 10s
---
# API Rule for external access (alternative to VirtualService)
apiVersion: gateway.kyma-project.io/v1beta1
kind: APIRule
metadata:
  name: odata-vocab-api
  namespace: kube-scb
spec:
  gateway: kyma-system/kyma-gateway
  host: odata-vocab  # Will be: odata-vocab.<kyma-domain>
  service:
    name: odata-vocab-service
    port: 9150
  rules:
  - path: /health
    methods: ["GET"]
    accessStrategies:
    - handler: noop  # Public health endpoint
  - path: /stats
    methods: ["GET"]
    accessStrategies:
    - handler: noop  # Public stats endpoint
  - path: /mcp
    methods: ["POST", "OPTIONS"]
    accessStrategies:
    - handler: jwt
      config:
        jwks_urls:
        - "https://auth.kyma.io/.well-known/jwks.json"
        trusted_issuers:
        - "https://auth.kyma.io"
  - path: /mcp/tools/.*
    methods: ["POST", "OPTIONS"]
    accessStrategies:
    - handler: jwt
      config:
        jwks_urls:
        - "https://auth.kyma.io/.well-known/jwks.json"
---
# HorizontalPodAutoscaler for scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: odata-vocab-hpa
  namespace: kube-scb
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: odata-vocab-server
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
# PodDisruptionBudget for high availability
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: odata-vocab-pdb
  namespace: kube-scb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: odata-vocab