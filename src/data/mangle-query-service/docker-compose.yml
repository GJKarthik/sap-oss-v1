# Mangle Query Service - Docker Compose
# OpenAI-compatible HTTP API with Mangle routing

version: '3.8'

services:
  # Mangle Query Service - OpenAI HTTP API
  mangle:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: mangle-query-service
    ports:
      - "8080:8080"    # OpenAI-compatible HTTP API
    environment:
      - AICORE_URL=${AICORE_URL:-https://api.ai.core.sap.cloud}
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - HANA_HOST=${HANA_HOST:-}
      - LOG_LEVEL=info
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - sap-oss
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Elasticsearch for semantic search
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.3
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
      - ./es_mappings:/es_mappings:ro
    networks:
      - sap-oss
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  es_data:
    driver: local

networks:
  sap-oss:
    name: sap-oss-network
    driver: bridge