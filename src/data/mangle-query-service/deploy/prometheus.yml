# Prometheus configuration for HANA Integration monitoring
#
# This config scrapes metrics from the mangle-query-service
# and provides alerting rules for critical conditions.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'hana-integration'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []
          # - alertmanager:9093

# Rule files for alerts
rule_files:
  - /etc/prometheus/alerts/*.yml

# Scrape configs
scrape_configs:
  # Mangle Query Service metrics
  - job_name: 'mangle-query-service'
    static_configs:
      - targets: ['mangle-query-service:9090']
    metrics_path: '/metrics'
    scrape_interval: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'mangle-query-service'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Elasticsearch metrics (if using elasticsearch-exporter)
  - job_name: 'elasticsearch'
    static_configs:
      - targets: ['elasticsearch:9200']
    metrics_path: '/_prometheus/metrics'
    scrape_interval: 30s

# Recording rules for pre-computed metrics
recording_rules:
  - name: hana_integration_rules
    rules:
      # Query success rate (5 minute window)
      - record: hana:query_success_rate:5m
        expr: |
          sum(rate(hana_query_total{status="success"}[5m]))
          /
          sum(rate(hana_query_total[5m]))

      # Cache hit rate (5 minute window)
      - record: hana:cache_hit_rate:5m
        expr: |
          sum(rate(hana_cache_hits_total[5m]))
          /
          (sum(rate(hana_cache_hits_total[5m])) + sum(rate(hana_cache_misses_total[5m])))

      # P99 query latency
      - record: hana:query_latency_p99:5m
        expr: |
          histogram_quantile(0.99, sum(rate(hana_query_latency_seconds_bucket[5m])) by (le))

      # Embedding throughput
      - record: hana:embedding_throughput:1m
        expr: |
          sum(rate(hana_embedding_batch_size_sum[1m]))

# Alerting rules
alerting_rules:
  - name: hana_alerts
    rules:
      # High error rate
      - alert: HighErrorRate
        expr: hana:query_success_rate:5m < 0.95
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate in HANA queries"
          description: "Query success rate is {{ $value | humanizePercentage }} (< 95%)"

      # Circuit breaker open
      - alert: CircuitBreakerOpen
        expr: hana_circuit_breaker_state{circuit_name="hana"} == 2
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "HANA circuit breaker is OPEN"
          description: "HANA connection failures exceeded threshold, circuit is open"

      # High query latency
      - alert: HighQueryLatency
        expr: hana:query_latency_p99:5m > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High P99 query latency"
          description: "P99 query latency is {{ $value | humanizeDuration }} (> 2s)"

      # Low cache hit rate
      - alert: LowCacheHitRate
        expr: hana:cache_hit_rate:5m < 0.5
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Low cache hit rate"
          description: "Cache hit rate is {{ $value | humanizePercentage }} (< 50%)"

      # High fallback rate
      - alert: HighFallbackRate
        expr: |
          sum(rate(hana_circuit_breaker_fallbacks_total[5m]))
          /
          sum(rate(hana_query_total[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High fallback rate to Elasticsearch"
          description: "More than 10% of queries are using fallback path"