# Mangle Query Service - Data Products Registry
# 
# This registry defines the data products exposed by the mangle-query-service.
# All products comply with regulations/mangle (MGF, Agent Index, Research Papers).

apiVersion: dataproducts/v1
kind: DataProductRegistry
metadata:
  name: mangle-query-service
  version: "1.1.0"
  description: "OpenAI-compatible query routing service with governance"
  sap_ai_experience:
    tier: "ai_core"
    service: "agent-router"
    map_ref: "sap-ai-experience-map.yaml" 

# Agent Classification (2025-AI-Agent-Index.pdf)
x-agent-classification:
  # Category: chat, browser, enterprise
  category: "enterprise"
  category_reference: "2025-AI-Agent-Index_p005_c002"
  
  # Agency criteria (all must be true)
  agency_criteria:
    autonomy: true
    goal_complexity: true
    env_interaction: true
    generality: true
  
  # Action space
  action_space:
    type: "api"
    tools:
      - "chat_completion"
      - "embeddings"
      - "model_routing"
    write_access: false  # Read-only for LLM queries
    external_access: true  # Calls SAP AI Core
  
  # Risk assessment
  risk_level: "medium"
  risk_factors:
    - "external_api_access"
    - "sensitive_data_routing"
  risk_mitigations:
    - "L2_autonomy"
    - "emergency_stop"
    - "guardrails"
    - "monitoring"

# Regulatory Compliance (Required for 100/100 score)
x-regulatory-compliance:
  # MGF Reference: mgf-for-agentic-ai.pdf
  mgf:
    version: "1.0"
    publication_date: "2026-01-22"
    publisher: "Singapore IMDA"
    compliance_status: "HIGHLY_COMPLIANT"
    chunk_references:
      - "mgf_004"  # Technical controls
      - "mgf_006"  # Risk assessment
      - "mgf_008"  # Safety controls
      - "mgf_012"  # Autonomy levels
      - "mgf_015"  # Emergency stop
  
  # Agent Index Reference: 2025-AI-Agent-Index.pdf
  agent_index:
    version: "2025"
    publication_date: "2025-12-31"
    publisher: "MIT/Cambridge/Stanford/Harvard"
    compliance_status: "COMPLIANT"
    
  # Research Reference: 2503.18238v3.pdf
  research:
    version: "v3"
    publication_date: "2026-02-06"
    publisher: "Johns Hopkins/MIT Sloan"
    compliance_status: "ALIGNED"
  
  # Autonomy Level Configuration
  autonomy:
    level: "L2"
    level_name: "HUMAN_ON_LOOP"
    description: "Human monitoring with intervention capability"
    controls:
      - "monitoring"
      - "audit_logging"
      - "emergency_stop"
      - "approval_gates"
  
  # Safety Controls
  safety_controls:
    guardrails:
      enabled: true
      implementation: "governance.mg deny rules"
    sandboxing:
      enabled: true
      implementation: "vocabulary_client.py LOCAL mode"
    approval_gates:
      enabled: true
      implementation: "requires_consent()"
    monitoring:
      enabled: true
      implementation: "audit_required() + request tracking"
    emergency_stop:
      enabled: true
      implementation: "ServiceRouter.emergency_stop()"
      api_endpoint: "POST /v1/admin/emergency-stop"
  
  # Data Security Classifications
  data_security:
    supported_classifications:
      - class: "public"
        routing: "aicore-ok"
        description: "Non-sensitive data, can use SAP AI Core"
      - class: "internal"
        routing: "hybrid"
        description: "Internal data, auto-select backend"
      - class: "confidential"
        routing: "hybrid"
        description: "Confidential data, prefer vLLM"
      - class: "restricted"
        routing: "vllm-only"
        description: "Restricted data, vLLM only"

# Data Products
products:
  - name: mangle-query-completion
    description: "LLM query completion with governance"
    version: "1.0.0"
    type: "api"
    
    x-regulatory-compliance:
      autonomy_level: "L2"
      safety_controls:
        - "guardrails"
        - "monitoring"
        - "emergency_stop"
      mgf_chunks:
        - "mgf_004"
        - "mgf_014"
    
    endpoints:
      - path: "/v1/chat/completions"
        method: "POST"
        description: "OpenAI-compatible chat completions"
      - path: "/v1/completions"
        method: "POST"
        description: "OpenAI-compatible text completions"
    
    governance:
      access_control: "RBAC via access_allowed()"
      audit_logging: "audit_required()"
      consent_required: "requires_consent() for sensitive data"
      anonymization: "must_anonymize() for non-production"

  - name: mangle-embeddings
    description: "Vector embeddings with caching"
    version: "1.0.0"
    type: "api"
    
    x-regulatory-compliance:
      autonomy_level: "L2"
      safety_controls:
        - "monitoring"
      mgf_chunks:
        - "mgf_008"
    
    endpoints:
      - path: "/v1/embeddings"
        method: "POST"
        description: "OpenAI-compatible embeddings"
    
    governance:
      audit_logging: "audit_required()"
      caching: "semantic cache with TTL"

  - name: mangle-model-router
    description: "Intelligent model selection and routing"
    version: "1.0.0"
    type: "internal"
    
    x-regulatory-compliance:
      autonomy_level: "L2"
      safety_controls:
        - "guardrails"
        - "emergency_stop"
      mgf_chunks:
        - "mgf_004"
        - "mgf_012"
        - "mgf_015"
    
    routing_rules:
      - rule: "model_registry.mg"
        description: "Model capability matching"
      - rule: "governance.mg"
        description: "Data governance enforcement"
    
    backends:
      - name: "aicore_direct"
        description: "Direct to SAP AI Core"
      - name: "streaming_service"
        description: "Via ai-core-streaming (Zig)"

  - name: mangle-vocabulary-service
    description: "OData vocabulary semantic metadata"
    version: "1.0.0"
    type: "internal"
    
    x-regulatory-compliance:
      autonomy_level: "L2"
      safety_controls:
        - "monitoring"
      mgf_chunks:
        - "mgf_006"
        - "mgf_007"
    
    entities:
      - name: "ACDOCA"
        data_security_class: "confidential"
        routing_policy: "hybrid"
      - name: "BKPF"
        data_security_class: "confidential"
        routing_policy: "hybrid"
      - name: "KNA1"
        data_security_class: "internal"
        routing_policy: "hybrid"
      - name: "VBAK"
        data_security_class: "internal"
        routing_policy: "hybrid"