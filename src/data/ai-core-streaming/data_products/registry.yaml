# =============================================================================
# AI Core Streaming - Data Product Registry (ODPS 4.1)
# Infrastructure Service - External AI Core Backend
# =============================================================================

version: "4.1"
catalog:
  id: "aicore-streaming-catalog"
  name: "AI Core Streaming Data Product Catalog"
  description: "SAP AI Core streaming inference - handles public/internal data"
  sap_ai_experience:
    tier: "ai_core"
    service: "ai-shared-fabric"
    map_ref: "sap-ai-experience-map.yaml" 

products:
  - ref: "aicore_streaming_service.yaml"

# Global policies - External backend for non-confidential data
globalPolicies:
  defaultSecurityClass: "public"
  defaultLLMRouting: "external"
  auditEnabled: true
  
# LLM Backend Configuration - AI Core is an external backend
llmBackends:
  aicore:
    endpoint: "http://localhost:9190/mcp"
    models:
      - "anthropic-claude-3"
      - "gpt-4"
    forSecurityClass: ["public", "internal"]
    
  # Fallback to vLLM for confidential data
  vllm:
    endpoint: "http://localhost:9180/mcp"
    models:
      - "llama-3.1-70b"
    forSecurityClass: ["confidential", "restricted"]