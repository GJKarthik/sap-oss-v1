# BDC AIPrompt Streaming - HorizontalPodAutoscaler
# Automatically scales broker pods based on resource utilization and custom metrics

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bdc-aiprompt-streaming
  namespace: bdc
  labels:
    app: bdc-aiprompt-streaming
    component: broker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bdc-aiprompt-streaming
  minReplicas: 2
  maxReplicas: 10
  metrics:
    # Scale based on CPU utilization
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    
    # Scale based on memory utilization
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
    
    # Scale based on incoming message rate (custom metric from Prometheus)
    - type: Pods
      pods:
        metric:
          name: aiprompt_messages_in_rate
        target:
          type: AverageValue
          averageValue: "5000"
    
    # Scale based on backlog size (custom metric from Prometheus)
    - type: Pods
      pods:
        metric:
          name: aiprompt_subscription_backlog
        target:
          type: AverageValue
          averageValue: "10000"
  
  behavior:
    scaleDown:
      # Prevent rapid scale-down to avoid connection disruptions
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
        - type: Percent
          value: 10
          periodSeconds: 60
      selectPolicy: Min
    
    scaleUp:
      # Allow faster scale-up for burst traffic
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
        - type: Percent
          value: 50
          periodSeconds: 60
      selectPolicy: Max

---
# Vertical Pod Autoscaler (optional - requires VPA controller)
# Automatically adjusts resource requests based on actual usage
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: bdc-aiprompt-streaming-vpa
  namespace: bdc
  labels:
    app: bdc-aiprompt-streaming
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bdc-aiprompt-streaming
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: pulsar-broker
        minAllowed:
          cpu: "250m"
          memory: "256Mi"
        maxAllowed:
          cpu: "4"
          memory: "8Gi"
        controlledResources: ["cpu", "memory"]
        controlledValues: RequestsAndLimits