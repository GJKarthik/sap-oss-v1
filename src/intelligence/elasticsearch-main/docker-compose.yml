# Local development — single-node Elasticsearch 8.19.3
# Mirrors the sap-ai-services/elasticsearch-0 StatefulSet configuration.
#
# Usage:
#   cp .env.example .env        # set ES_PASSWORD
#   docker compose up -d
#   curl http://localhost:9200/_cluster/health

services:
  elasticsearch:
    image: ie-coe-team.common.repositories.cloud.sap/vanilla-elasticsearch:8.19.3
    container_name: sap-elasticsearch
    environment:
      - cluster.name=sap-elasticsearch
      - node.name=elasticsearch-0
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - xpack.ml.enabled=false
      - bootstrap.memory_lock=false
      - action.destructive_requires_name=true
    volumes:
      - ./config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  elasticsearch-data:
    driver: local