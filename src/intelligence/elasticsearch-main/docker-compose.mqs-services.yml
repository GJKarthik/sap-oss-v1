# Docker Compose for Multi-Service Architecture
#
# Runs mangle-query-service (Python) + ai-core-streaming (Zig) as separate services
#
# Architecture:
#   Client → mangle-query-service:8080 → ai-core-streaming:9000 → SAP AI Core
#                     ↓
#              (direct route)
#                     ↓
#               SAP AI Core

version: '3.8'

services:
  # ============================================
  # mangle-query-service (Python/FastAPI)
  # OpenAI-compatible API gateway
  # ============================================
  mangle-query-service:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: mangle-query-service
    ports:
      - "8080:8080"
    environment:
      # Service configuration
      - PORT=8080
      - LOG_LEVEL=INFO
      
      # ai-core-streaming connection
      - STREAMING_SERVICE_URL=http://ai-core-streaming:9000
      - STREAMING_SERVICE_ENABLED=true
      - PREFER_STREAMING_SERVICE=true
      - DEFAULT_BACKEND=auto
      
      # SAP AI Core (for direct route)
      - AICORE_BASE_URL=${AICORE_BASE_URL}
      - AICORE_CLIENT_ID=${AICORE_CLIENT_ID}
      - AICORE_CLIENT_SECRET=${AICORE_CLIENT_SECRET}
      - AICORE_AUTH_URL=${AICORE_AUTH_URL}
      - AICORE_RESOURCE_GROUP=${AICORE_RESOURCE_GROUP:-default}
      
      # Elasticsearch (for metadata)
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL:-http://elasticsearch:9200}
      
      # HANA (for vector store)
      - HANA_HOST=${HANA_HOST}
      - HANA_PORT=${HANA_PORT:-443}
      - HANA_USER=${HANA_USER}
      - HANA_PASSWORD=${HANA_PASSWORD}
    depends_on:
      ai-core-streaming:
        condition: service_healthy
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ============================================
  # ai-core-streaming (Zig)
  # High-performance streaming backend
  # ============================================
  ai-core-streaming:
    build:
      context: ../ai-core-streaming
      dockerfile: Dockerfile
    container_name: ai-core-streaming
    ports:
      - "9000:9000"
    environment:
      # Service configuration
      - PORT=9000
      - LOG_LEVEL=info
      
      # SAP AI Core
      - AICORE_BASE_URL=${AICORE_BASE_URL}
      - AICORE_CLIENT_ID=${AICORE_CLIENT_ID}
      - AICORE_CLIENT_SECRET=${AICORE_CLIENT_SECRET}
      - AICORE_AUTH_URL=${AICORE_AUTH_URL}
      - AICORE_RESOURCE_GROUP=${AICORE_RESOURCE_GROUP:-default}
      
      # XSUAA (for JWT validation)
      - XSUAA_URL=${XSUAA_URL}
      - XSUAA_CLIENT_ID=${XSUAA_CLIENT_ID}
      - XSUAA_CLIENT_SECRET=${XSUAA_CLIENT_SECRET}
      
      # Pulsar (optional - for pub/sub)
      - PULSAR_URL=${PULSAR_URL:-}
      - PULSAR_TENANT=${PULSAR_TENANT:-}
      - PULSAR_NAMESPACE=${PULSAR_NAMESPACE:-}
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ============================================
  # Elasticsearch (optional - for metadata)
  # ============================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    networks:
      - ai-network
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    profiles:
      - full

  # ============================================
  # Redis (optional - for caching)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - ai-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    profiles:
      - full

networks:
  ai-network:
    driver: bridge

volumes:
  es-data:
    driver: local