# Elasticsearch StatefulSet for Kyma / sap-ai-services
#
# Mirrors the live elasticsearch-0 instance:
#   kubectl get statefulset elasticsearch -n sap-ai-services
#
# Prerequisites (create once):
#   kubectl create secret generic elasticsearch-credentials \
#     --namespace sap-ai-services \
#     --from-literal=ELASTIC_PASSWORD="$(openssl rand -hex 16)"
#
# Apply:
#   kubectl apply -f configmap.yaml
#   kubectl apply -f statefulset.yaml

---
# ConfigMap for elasticsearch.yml is in configmap.yaml.
# This file manages the StatefulSet + headless Service + ClusterIP Service.

---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-headless
  namespace: sap-ai-services
  labels:
    app: elasticsearch
    app.kubernetes.io/part-of: btp-ai-suite
spec:
  clusterIP: None
  selector:
    app: elasticsearch
  ports:
    - name: http
      port: 9200
      protocol: TCP
    - name: transport
      port: 9300
      protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: sap-ai-services
  labels:
    app: elasticsearch
    app.kubernetes.io/part-of: btp-ai-suite
spec:
  type: ClusterIP
  selector:
    app: elasticsearch
  ports:
    - name: http
      port: 9200
      targetPort: 9200
      protocol: TCP
    - name: transport
      port: 9300
      targetPort: 9300
      protocol: TCP

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: sap-ai-services
  labels:
    app: elasticsearch
    app.kubernetes.io/part-of: btp-ai-suite
spec:
  serviceName: elasticsearch-headless
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
      annotations:
        # Istio sidecar enabled — allows mTLS from other injected pods.
        # The es-mcp pod (inject=false) connects via PeerAuthentication PERMISSIVE
        # defined in peerauthentication.yaml.
        istio.io/rev: default
    spec:
      initContainers:
        # Elasticsearch requires vm.max_map_count >= 262144
        - name: fix-permissions
          image: busybox:1.36
          command: ["sysctl", "-w", "vm.max_map_count=262144"]
          securityContext:
            privileged: true
      containers:
        - name: elasticsearch
          image: ie-coe-team.common.repositories.cloud.sap/vanilla-elasticsearch:8.19.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9200
              protocol: TCP
            - name: transport
              containerPort: 9300
              protocol: TCP
          env:
            - name: node.name
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: cluster.name
              value: "sap-elasticsearch"
            - name: discovery.type
              value: "single-node"
            - name: ES_JAVA_OPTS
              value: "-Xms1g -Xmx1g"
            - name: xpack.security.enabled
              value: "false"
            - name: xpack.ml.enabled
              value: "false"
            - name: bootstrap.memory_lock
              value: "false"
          volumeMounts:
            - name: elasticsearch-data
              mountPath: /usr/share/elasticsearch/data
            - name: elasticsearch-config
              mountPath: /usr/share/elasticsearch/config/elasticsearch.yml
              subPath: elasticsearch.yml
          readinessProbe:
            httpGet:
              path: /_cluster/health?local=true
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /_cluster/health?local=true
              port: 9200
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
      volumes:
        - name: elasticsearch-config
          configMap:
            name: elasticsearch-config
      imagePullSecrets:
        - name: sap-registry-credentials
  volumeClaimTemplates:
    - metadata:
        name: elasticsearch-data
        labels:
          app: elasticsearch
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: default
        resources:
          requests:
            storage: 10Gi