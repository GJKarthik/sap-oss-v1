apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "privatellm.fullname" . }}
  labels:
    {{- include "privatellm.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "privatellm.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "{{ .Values.metrics.enabled }}"
        prometheus.io/port: "{{ .Values.metrics.port }}"
        prometheus.io/path: "/metrics"
      labels:
        {{- include "privatellm.selectorLabels" . | nindent 8 }}
    spec:
      {{- if .Values.security }}
      securityContext:
        runAsNonRoot: {{ .Values.security.runAsNonRoot }}
        readOnlyRootFilesystem: {{ .Values.security.readOnlyRootFilesystem }}
      {{- end }}
      containers:
      - name: privatellm
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.port }}
          protocol: TCP
        {{- if .Values.metrics.enabled }}
        - name: metrics
          containerPort: {{ .Values.metrics.port }}
          protocol: TCP
        {{- end }}
        env:
        - name: MODEL_NAME
          value: "{{ .Values.model.name }}"
        - name: MODEL_FILE
          value: "{{ .Values.model.file }}"
        - name: CONTEXT_SIZE
          value: "{{ .Values.model.contextSize }}"
        - name: GPU_LAYERS
          value: "{{ .Values.model.gpuLayers }}"
        - name: MODEL_FORMAT
          value: "{{ .Values.model.format }}"
        {{- if .Values.gpu.count }}
        - name: CUDA_VISIBLE_DEVICES
          value: "0"
        {{- end }}
        {{- if .Values.otel.enabled }}
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "{{ .Values.otel.endpoint }}"
        - name: OTEL_SDK_DISABLED
          value: "false"
        {{- end }}
        {{- if .Values.lora.enabled }}
        - name: LORA_ADAPTERS_PATH
          value: "{{ .Values.lora.adaptersPath }}"
        {{- end }}
        {{- if .Values.multiNode.enabled }}
        - name: WORLD_SIZE
          value: "{{ .Values.multiNode.worldSize }}"
        - name: MASTER_ADDR
          value: "{{ .Values.multiNode.masterAddr }}"
        {{- end }}
        {{- if .Values.probes.liveness.enabled }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
          failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
        {{- end }}
        {{- if .Values.probes.readiness.enabled }}
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
          failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.gpu.count }}
        volumeMounts:
        - name: gpu-devices
          mountPath: /dev/nvidia0
        {{- end }}
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.tolerations }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- end }}
      {{- if .Values.gpu.count }}
      volumes:
      - name: gpu-devices
        hostPath:
          path: /dev/nvidia0
      {{- end }}

