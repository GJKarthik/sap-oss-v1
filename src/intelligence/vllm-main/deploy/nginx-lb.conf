# NGINX Load Balancer Configuration for Scaled Deployment
# Routes requests across multiple llama-server and openai-gateway replicas
#
# Features:
# - Least-connections load balancing
# - Health checks with automatic failover
# - WebSocket support for streaming
# - Rate limiting per client IP
# - Request queuing during high load

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/json;

    # Logging format with latency metrics
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance tuning
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression for JSON responses
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types application/json text/plain text/css application/javascript;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=api_inference:10m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # =========================================================================
    # Upstream: OpenAI Gateway Replicas
    # =========================================================================
    upstream openai_gateway {
        least_conn;
        keepalive 64;

        # Docker Swarm/Compose service discovery
        # These resolve to multiple container IPs
        server openai-gateway:8080 max_fails=3 fail_timeout=30s;

        # For manual scaling, add explicit servers:
        # server openai-gateway-1:8080 weight=1 max_fails=3 fail_timeout=30s;
        # server openai-gateway-2:8080 weight=1 max_fails=3 fail_timeout=30s;
    }

    # =========================================================================
    # Upstream: LLM Backend Replicas (llama.cpp servers)
    # =========================================================================
    upstream llm_backends {
        least_conn;
        keepalive 32;

        # Docker Swarm/Compose service discovery
        server llama-server:3000 max_fails=2 fail_timeout=60s;

        # For manual scaling with multiple GPUs:
        # server llama-server-1:3000 weight=1 max_fails=2 fail_timeout=60s;
        # server llama-server-2:3000 weight=1 max_fails=2 fail_timeout=60s;
        # server llama-server-3:3000 weight=1 max_fails=2 fail_timeout=60s;
        # server llama-server-4:3000 weight=1 max_fails=2 fail_timeout=60s;
    }

    # =========================================================================
    # Main Server Block
    # =========================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Connection limits
        limit_conn conn_limit 100;

        # Client body size for large prompts
        client_max_body_size 10M;
        client_body_buffer_size 128k;

        # =====================================================================
        # Health Check Endpoint
        # =====================================================================
        location /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "OK\n";
        }

        location /nginx-status {
            stub_status on;
            access_log off;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 127.0.0.1;
            deny all;
        }

        # =====================================================================
        # OpenAI-Compatible API Routes
        # =====================================================================
        location /v1/ {
            limit_req zone=api_inference burst=50 nodelay;

            proxy_pass http://openai_gateway;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;

            # Connection keep-alive
            proxy_set_header Connection "";

            # Timeouts for LLM inference (can be slow)
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 300s;

            # Disable buffering for streaming responses
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;

            # Error handling
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 10s;
        }

        # Chat completions with streaming support
        location /v1/chat/completions {
            limit_req zone=api_inference burst=30 nodelay;

            proxy_pass http://openai_gateway;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";

            # SSE streaming support
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 600s;
            chunked_transfer_encoding on;

            # For SSE
            proxy_set_header Accept-Encoding "";
        }

        # =====================================================================
        # Direct LLM Backend Access (for debugging/metrics)
        # =====================================================================
        location /llm/ {
            internal;  # Only accessible internally

            proxy_pass http://llm_backends/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 300s;
        }

        # =====================================================================
        # Metrics Endpoint (Prometheus scraping)
        # =====================================================================
        location /metrics {
            limit_req zone=api_general burst=10 nodelay;

            proxy_pass http://openai_gateway/metrics;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }

        # =====================================================================
        # Default: Route to Gateway
        # =====================================================================
        location / {
            limit_req zone=api_general burst=100 nodelay;

            proxy_pass http://openai_gateway;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 60s;

            proxy_next_upstream error timeout http_500 http_502 http_503;
        }

        # =====================================================================
        # Error Pages
        # =====================================================================
        error_page 500 502 503 504 /50x.json;
        location = /50x.json {
            internal;
            default_type application/json;
            return 503 '{"error":{"message":"Service temporarily unavailable","type":"server_error","code":503}}';
        }

        error_page 429 /429.json;
        location = /429.json {
            internal;
            default_type application/json;
            return 429 '{"error":{"message":"Rate limit exceeded","type":"rate_limit_error","code":429}}';
        }
    }

    # =========================================================================
    # HTTPS Server (Production)
    # Uncomment and configure SSL certificates
    # =========================================================================
    # server {
    #     listen 443 ssl http2;
    #     listen [::]:443 ssl http2;
    #     server_name _;
    #
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_session_timeout 1d;
    #     ssl_session_cache shared:SSL:50m;
    #     ssl_session_tickets off;
    #
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #
    #     # HSTS
    #     add_header Strict-Transport-Security "max-age=63072000" always;
    #
    #     # Include all location blocks from HTTP server above
    #     include /etc/nginx/conf.d/locations.conf;
    # }
}