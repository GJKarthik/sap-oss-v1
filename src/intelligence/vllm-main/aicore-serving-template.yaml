apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: privatellm-inference
  annotations:
    scenarios.ai.sap.com/description: "Pure Zig LLM inference - Direct GGUF loading with T4/L4 GPU support"
    scenarios.ai.sap.com/name: "privatellm"
    executables.ai.sap.com/description: "OpenAI-compatible LLM gateway with built-in GGUF inference"
    executables.ai.sap.com/name: "privatellm"
  labels:
    scenarios.ai.sap.com/id: "privatellm"
    ai.sap.com/version: "2.1.0"
spec:
  inputs:
    parameters:
      - name: dockerImage
        type: string
        default: "ghcr.io/sap/ai-core-privatellm:v2.1.0"
      - name: resourcePlan
        type: string
        default: "infer.s"
    artifacts:
      - name: llmmodel
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/metric: concurrency
        autoscaling.knative.dev/target: 1
        autoscaling.knative.dev/targetBurstCapacity: 0
      labels: |
        ai.sap.com/resourcePlan: "{{inputs.parameters.resourcePlan}}"
    spec: |
      predictor:
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: "{{inputs.parameters.dockerImage}}"
          ports:
          - containerPort: 8080
            protocol: TCP
          securityContext:
            runAsUser: 1001
            runAsGroup: 0
            allowPrivilegeEscalation: false
          resources:
            limits:
              nvidia.com/gpu: "1"
              memory: "16Gi"
              cpu: "4"
            requests:
              nvidia.com/gpu: "1"
              memory: "8Gi"
              cpu: "2"
          env:
          - name: PORT
            value: "8080"
          - name: MODEL_PATH
            value: "/mnt/models"
          - name: METRICS_BIND
            value: "127.0.0.1"
          - name: CUDA_VISIBLE_DEVICES
            value: "0"
          - name: NVIDIA_VISIBLE_DEVICES
            value: "all"
          volumeMounts:
          - name: model-volume
            mountPath: /mnt/models
            readOnly: true
        volumes:
        - name: model-volume
          persistentVolumeClaim:
            claimName: "{{inputs.artifacts.llmmodel}}"
