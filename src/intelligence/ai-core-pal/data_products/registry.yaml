# =============================================================================
# AI Core PAL - Data Product Registry (ODPS 4.1)
# MCP Integration with SAP HANA Predictive Analysis Library
# =============================================================================

version: "4.1"
catalog:
  id: "aicore-pal-catalog"
  name: "AI Core PAL Data Product Catalog"
  description: "MCP integration for SAP HANA PAL predictive analytics"
  sap_ai_experience:
    tier: "ai_core"
    service: "mcp-pal-deep-learning"
    map_ref: "sap-ai-experience-map.yaml" 

products:
  - ref: "aicore_pal_service.yaml"

# Global policies - HANA data is confidential, always vLLM
globalPolicies:
  defaultSecurityClass: "confidential"
  defaultLLMRouting: "vllm-only"
  auditEnabled: true
  
# LLM Backend Configuration - vLLM only for HANA PAL data
llmBackends:
  vllm:
    endpoint: "http://localhost:9180/mcp"
    models:
      - "llama-3.1-70b"
      - "codellama-34b"
    forSecurityClass: ["internal", "confidential", "restricted"]

# =============================================================================
# OData Vocabularies Integration - Analytics Vocabulary for PAL
# =============================================================================
dependencies:
  # =========================================================================
  # Upstream: HANA Training Data Products (training-main)
  # =========================================================================
  hanaTrainingData:
    name: "HANA Training Data Products"
    catalogRef: "../../training-main/data_products/registry.yaml"
    description: >
      Enterprise HANA metadata organized as ODPS 4.1 data products.
      Treasury, ESG, and Performance domains with business-to-technical
      field mappings, dimension hierarchies, and supervised prompt pairs.
    inputPortBinding: "hana-tables"
    products:
      - ref: "treasury-capital-markets-v1"
        description: "Bond/Issuance positions: MtM, Notional, RWA, Yield"
        palFunctions: ["pal_forecast", "pal_anomaly", "pal_clustering"]
      - ref: "esg-sustainability-v1"
        description: "Net Zero emissions, Integrated Client, Sustainable Finance"
        palFunctions: ["pal_forecast", "pal_anomaly", "pal_clustering", "pal_classification"]
      - ref: "performance-bpc-v1"
        description: "CRD Fact + NFRP dimensions (Account/Location/Product/Segment/Cost)"
        palFunctions: ["pal_forecast", "pal_regression", "pal_anomaly"]
    enrichment:
      pipeline: "../../training-main/scripts/xlsx_to_odps.py"
      copilot: "../../../generativeUI/training-webcomponents-ngx"
      reports: "../../training-main/data_products/enriched/"

  vocabularyService:
    name: "OData Vocabularies"
    endpoint: "http://localhost:9150/mcp"
    openaiEndpoint: "http://localhost:9150/v1"
    description: "Universal dictionary for OData annotations"
    capabilities:
      - "annotation-lookup"
      - "analytics-vocabulary"
      - "measure-annotation"
      - "dimension-annotation"
    vocabularies:
      - name: "Analytics"
        namespace: "com.sap.vocabularies.Analytics.v1"
        usage: "KPI and measure annotations for PAL output"
      - name: "Common"
        namespace: "com.sap.vocabularies.Common.v1"
        usage: "Labels and semantic keys"
      - name: "Aggregation"
        namespace: "Org.OData.Aggregation.V1"
        usage: "Aggregation functions for measures"
    models:
      - id: "odata-vocab-annotator"
        purpose: "Suggest Analytics annotations for PAL columns"
      - id: "odata-vocab-search"
        purpose: "Search Analytics vocabulary terms"
    integrationPoints:
      - palOutputAnnotation: "Annotate PAL output columns with Analytics.Measure/Dimension"
      - kpiTemplates: "Generate KPI annotation templates"
      - termLookup: "Look up Analytics vocabulary term definitions"


# =============================================================================
# Domain Schemas - Unified catalogue (Wave 1 / task 1)
# One registry entry per existing schema under docs/schema/.
# Schemas are NOT merged; each URI stays distinct. See integrityRules below.
# =============================================================================
domainSchemas:
  integrityRules:
    - id: "no-merge-requirement"
      rule: >
        tb/requirement.schema.json and regulations/requirement.schema.json
        remain distinct URIs; the schemas are never merged. Each domain
        retains ownership of its own requirement record.

  arabic:
    owner: "arabic"
    securityClass: "confidential"
    llmRouting: "vllm-only"
    persona: "ap-clerk"
    schemas:
      - id: "arabic.invoice"
        path: "docs/schema/arabic/invoice.schema.json"
        uri:  "https://sap-oss.github.io/schema/arabic/invoice.schema.json"
        title: "Arabic Invoice Record"
      - id: "arabic.ocr-result"
        path: "docs/schema/arabic/ocr-result.schema.json"
        uri:  "https://sap-oss.github.io/schema/arabic/ocr-result.schema.json"
        title: "OCR Extraction Result"
      - id: "arabic.vat-checklist"
        path: "docs/schema/arabic/vat-checklist.schema.json"
        uri:  "https://sap-oss.github.io/schema/arabic/vat-checklist.schema.json"
        title: "VAT Compliance Checklist"
      - id: "arabic.vendor"
        path: "docs/schema/arabic/vendor.schema.json"
        uri:  "https://sap-oss.github.io/schema/arabic/vendor.schema.json"
        title: "Arabic Vendor Record"
      - id: "arabic.payment-instruction"
        path: "docs/schema/arabic/payment-instruction.schema.json"
        uri:  "https://sap-oss.github.io/schema/arabic/payment-instruction.schema.json"
        title: "Payment Instruction Record"

  tb:
    owner: "tb"
    securityClass: "confidential"
    llmRouting: "vllm-only"
    persona: "financial-controller"
    schemas:
      - id: "tb.tb-extract"
        path: "docs/schema/tb/tb-extract.schema.json"
        uri:  "https://sap-oss.github.io/schema/tb/tb-extract.schema.json"
        title: "Trial Balance Extract"
      - id: "tb.pl-extract"
        path: "docs/schema/tb/pl-extract.schema.json"
        uri:  "https://sap-oss.github.io/schema/tb/pl-extract.schema.json"
        title: "P&L Extract"
      - id: "tb.variance-record"
        path: "docs/schema/tb/variance-record.schema.json"
        uri:  "https://sap-oss.github.io/schema/tb/variance-record.schema.json"
        title: "Variance Record"
      - id: "tb.commentary-draft"
        path: "docs/schema/tb/commentary-draft.schema.json"
        uri:  "https://sap-oss.github.io/schema/tb/commentary-draft.schema.json"
        title: "AI Commentary Draft"
      - id: "tb.decision-point"
        path: "docs/schema/tb/decision-point.schema.json"
        uri:  "https://sap-oss.github.io/schema/tb/decision-point.schema.json"
        title: "Decision Point Record"
      - id: "tb.entity-params"
        path: "docs/schema/tb/entity-params.schema.json"
        uri:  "https://sap-oss.github.io/schema/tb/entity-params.schema.json"
        title: "TB Entity Parameter File"

  regulations:
    owner: "regulations"
    securityClass: "confidential"
    llmRouting: "vllm-only"
    persona: "compliance-officer"
    schemas:
      - id: "regulations.requirement"
        path: "docs/schema/regulations/requirement.schema.json"
        uri:  "https://sap-oss.github.io/schema/regulations/requirement.schema.json"
        title: "Requirement with Status"
      - id: "regulations.regulation"
        path: "docs/schema/regulations/regulation.schema.json"
        uri:  "https://sap-oss.github.io/schema/regulations/regulation.schema.json"
        title: "Regulation Record"
      - id: "regulations.conformance-tool"
        path: "docs/schema/regulations/conformance-tool.schema.json"
        uri:  "https://sap-oss.github.io/schema/regulations/conformance-tool.schema.json"
        title: "Conformance Tool Record"
      - id: "regulations.corpus"
        path: "docs/schema/regulations/corpus.schema.json"
        uri:  "https://sap-oss.github.io/schema/regulations/corpus.schema.json"
        title: "Regulations Corpus"
      - id: "regulations.agent-identity"
        path: "docs/schema/regulations/agent-identity.schema.json"
        uri:  "https://sap-oss.github.io/schema/regulations/agent-identity.schema.json"
        title: "Agent Identity"
      - id: "regulations.request-identity"
        path: "docs/schema/regulations/request-identity.schema.json"
        uri:  "https://sap-oss.github.io/schema/regulations/request-identity.schema.json"
        title: "Request Identity"
      - id: "regulations.audit-event"
        path: "docs/schema/regulations/audit-event.schema.json"
