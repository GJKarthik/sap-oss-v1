        title: "Capability Monitoring Metric"

  simula:
    owner: "simula"
    securityClass: "confidential"
    llmRouting: "vllm-only"
    persona: "training-engineer"
    schemas:
      - id: "simula.training-example"
        path: "docs/schema/simula/training-example.schema.json"
        uri:  "https://sap-oss.github.io/schema/simula/training-example.schema.json"
        title: "Training Example"
      - id: "simula.taxonomy"
        path: "docs/schema/simula/taxonomy.schema.json"
        uri:  "https://sap-oss.github.io/schema/simula/taxonomy.schema.json"
        title: "Taxonomy Tree Structure"
      - id: "simula.hana-schema-entry"
        path: "docs/schema/simula/hana-schema-entry.schema.json"
        uri:  "https://sap-oss.github.io/schema/simula/hana-schema-entry.schema.json"
        title: "HANA Schema Registry Entry"
      - id: "simula.config"
        path: "docs/schema/simula/config.schema.json"
        uri:  "https://sap-oss.github.io/schema/simula/config.schema.json"
        title: "Pipeline Configuration"
      - id: "simula.meta-prompt"
        path: "docs/schema/simula/meta-prompt.schema.json"
        uri:  "https://sap-oss.github.io/schema/simula/meta-prompt.schema.json"
        title: "Meta-Prompt Record"

  common:
    owner: "platform"
    securityClass: "confidential"
    llmRouting: "vllm-only"
    schemas:
      - id: "common.base-types"
        path: "docs/schema/common/base-types.schema.json"
        uri:  "https://sap-oss.github.io/schema/common/base-types.schema.json"
        title: "SAP OSS Common Base Types"