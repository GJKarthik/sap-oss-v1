# =============================================================================
# AI Core PAL Service Data Product (ODPS 4.1)
# MCP Integration with SAP HANA Predictive Analysis Library
# =============================================================================

dataProduct:
  id: "aicore-pal-service-v1"
  version: "1.0.0"
  name: "AI Core PAL Service Data Product"
  description: "MCP integration for SAP HANA PAL - predictive analytics on enterprise data"
  
  # ODPS 4.1 Standard Fields - Confidential (HANA data)
  dataSecurityClass: "confidential"
  dataGovernanceClass: "analytics"
  
  # Data Owner
  owner:
    name: "Data Science Team"
    team: "Analytics Platform"
    contact: "data-science@company.com"
  
  # Extension: LLM Routing Policy - vLLM only
  x-llm-policy:
    routing: "vllm-only"
    defaultBackend: "vllm"
    confidentialBackend: "vllm"
    auditLevel: "full"
    retentionPolicy: "standard"
    
    routingRules:
      - condition: "hana_data"
        backend: "vllm"
        reason: "HANA enterprise data must use on-premise LLM"
      - condition: "ml_results"
        backend: "vllm"
        reason: "ML results contain enterprise insights"
  
  # Extension: Prompting Policy
  x-prompting-policy:
    systemPrompt: |
      You are an AI assistant for SAP HANA PAL predictive analytics.
      Help users understand ML results, interpret predictions, and guide analysis.
      All data processed is enterprise confidential - use on-premise LLM only.
      Never send enterprise data or ML results to external services.
    maxTokens: 4096
    temperature: 0.3
    responseFormat: "structured"
    
  # Extension: Regulatory Compliance
  x-regulatory-compliance:
    frameworks:
      - "MGF-Agentic-AI"
      - "AI-Agent-Index"
      - "GDPR-Data-Processing"
    autonomyLevel: "L2"
    requiresHumanOversight: true
    safetyControls:
      - "guardrails"
      - "monitoring"
      - "audit-logging"
      - "access-control"
  
  # Output Ports - ML operations
  outputPort:
    - id: "classification"
      name: "PAL Classification"
      description: "Classification model results"
      dataSecurityClass: "confidential"
      x-llm-policy:
        routing: "vllm-only"
    
    - id: "regression"
      name: "PAL Regression"
      description: "Regression analysis results"
      dataSecurityClass: "confidential"
      x-llm-policy:
        routing: "vllm-only"
    
    - id: "clustering"
      name: "PAL Clustering"
      description: "Clustering analysis results"
      dataSecurityClass: "confidential"
      x-llm-policy:
        routing: "vllm-only"
    
    - id: "forecast"
      name: "PAL Forecast"
      description: "Time series forecasting"
      dataSecurityClass: "confidential"
      x-llm-policy:
        routing: "vllm-only"
    
    - id: "anomaly"
      name: "PAL Anomaly Detection"
      description: "Anomaly detection results"
      dataSecurityClass: "confidential"
      x-llm-policy:
        routing: "vllm-only"
  
  # Input Ports - wired to training-main data products
  inputPort:
    - id: "hana-tables"
      name: "HANA Table Input"
      description: "Enterprise data tables from HANA"
      dataSecurityClass: "confidential"
      x-llm-policy:
        routing: "vllm-only"
        allowExternalRouting: false
      upstreamProducts:
        - ref: "treasury-capital-markets-v1"
          catalogRef: "../../training-main/data_products/registry.yaml"
          outputPort: "treasury-positions"
          schema:
            measures: ["GLB_MTM_USD", "GLB_NOTIONAL_USD", "GLB_RWA", "GLB_BOOK_VALUE_USD",
                       "GLB_MARKET_VALUE_USD", "GLB_MARKET_YIELD", "GLB_IR_PV01_TOTAL"]
            dimensions: ["GLB_FINAL_COUNTRY_NAME", "GLB_ASSET_CLASS_2", "GLB_COUPON_TYPE",
                         "GLB_PRODUCT_SUBTYPE", "GLB_GLOBAL_REGION"]
            identifiers: ["GLB_ISIN", "GLB_CUSIP"]
        - ref: "esg-sustainability-v1"
          catalogRef: "../../training-main/data_products/registry.yaml"
          outputPort: "esg-net-zero"
          schema:
            measures: ["ATT_EMI", "PE_ASS", "EMIINTAL", "RWAASSTR", "TRYTDTR"]
            dimensions: ["DD_SEC", "BEBOOKINGLOCID", "C_SSEG_ID", "CLGRD"]
        - ref: "performance-bpc-v1"
          catalogRef: "../../training-main/data_products/registry.yaml"
          outputPort: "performance-fact"
          schema:
            factTable: "CRD_FACT"
            dimensions:
              - table: "NFRP_Account_AM"
                joinKey: "ACCOUNT"
                levels: ["L0", "L1", "L2", "L3", "L4", "L5"]
              - table: "NFRP_Location_AM"
                joinKey: "LOCATION_PK"
                levels: ["L0", "L1", "L2", "L3", "L4", "L5", "L6"]
              - table: "NFRP_Product_AM"
                joinKey: "PRODUCT"
                levels: ["L0", "L1", "L2", "L3", "L4"]
              - table: "NFRP_Segment_AM"
                joinKey: "M_SEGMENT_CONCAT"
                levels: ["M_SEGMENT_0", "M_SEGMENT_1", "M_SEGMENT_2", "M_SEGMENT_3", "M_SEGMENT_4"]
              - table: "NFRP_Cost_AM"
                joinKey: "COST_CLUSTER_PK"
                levels: ["L0", "L1", "L2", "L3", "L4", "L5"]
  
  # Quality Metrics
  quality:
    availability: "99.5%"
    latencyP95: "5000ms"
    throughput: "100 req/min"