apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: qwen35-35b-fp8-l40s-turboquant
  annotations:
    scenarios.ai.sap.com/description: "Qwen 3.5 35B MoE FP8 + TurboQuant KV for L40S"
    scenarios.ai.sap.com/name: "qwen35-35b-fp8-l40s-turboquant"
    executables.ai.sap.com/description: "Qwen 3.5 35B MoE FP8 + TurboQuant KV for L40S"
    executables.ai.sap.com/name: "qwen35-35b-fp8-l40s-turboquant"
  labels:
    scenarios.ai.sap.com/id: "qwen35-35b-fp8-l40s-turboquant"
    ai.sap.com/version: "1.0.0"
spec:
  inputs:
    parameters:
      - name: modelName
        default: "Qwen/Qwen3.5-35B-A3B-FP8" 
        type: string
      - name: dataType
        default: "auto"
      - name: gpuMemoryUtilization
        default: "0.96"
      - name: maxTokenLen
        default: "24576"
      - name: maxNumBatchedTokens
        default: "45000"
      - name: maxNumSeqs
        default: "64"
      - name: kvCacheDtype
        default: "fp8"
        type: string
      - name: resourcePlan
        type: "string"
        default: "train.l"
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/metric: "concurrency"
        autoscaling.knative.dev/target: "1"
      labels: |
        ai.sap.com/resourcePlan: "{{inputs.parameters.resourcePlan}}"
    spec: |
      predictor:
        imagePullSecrets:
        - name: ollamadocker
        minReplicas: 1
        maxReplicas: 1
        containers:
        - name: kserve-container
          image: docker.io/gjkarthik/vllm:l40s-turboquant
          ports:
            - containerPort: 8000
              protocol: TCP
          command: ["/bin/sh", "-c"]
          args:
            - >
              set -e &&
              pip install --no-deps --upgrade "transformers>=5.4.0" "huggingface_hub>=0.28.0" &&
              chmod -R 777 /usr/local/lib/python3.12/dist-packages/vllm/model_executor/layers/quantization/utils/configs 2>/dev/null || true &&
              TF_LOC="$(python3 -c 'import transformers; import os; print(os.path.dirname(transformers.__file__))')" &&
              TF_FILE="$TF_LOC/modeling_rope_utils.py" &&
              echo "Patching $TF_FILE" &&
              sed -i.bak 's/received_keys -= ignore_keys/received_keys -= set(ignore_keys) if isinstance(ignore_keys, list) else ignore_keys/' "$TF_FILE" &&
              echo "RoPE validator patched for Qwen3.5" &&
              echo "" | base64 -d | python3 &&
              /app/start-turboquant.py
          env:
            - name: MODEL
              value: "{{inputs.parameters.modelName}}"
            - name: DATA_TYPE
              value: "{{inputs.parameters.dataType}}"
            - name: GPU_MEM_UTIL
              value: "{{inputs.parameters.gpuMemoryUtilization}}"
            - name: MAX_MODEL_LEN
              value: "{{inputs.parameters.maxTokenLen}}"
            - name: MAX_BATCHED_TOKENS
              value: "{{inputs.parameters.maxNumBatchedTokens}}"
            - name: MAX_NUM_SEQS
              value: "{{inputs.parameters.maxNumSeqs}}"
            - name: KV_CACHE_DTYPE
              value: "{{inputs.parameters.kvCacheDtype}}"
            # No QUANTIZATION env var - FP8 doesn't need it