# =============================================================================
# Generative AI HANA Service Data Product (ODPS 4.1)
# =============================================================================

dataProduct:
  id: "gen-ai-hana-service-v1"
  version: "1.0.0"
  name: "Generative AI HANA Service Data Product"
  description: "Generative AI toolkit for SAP HANA Cloud - RAG, embeddings, and text generation"
  
  # ODPS 4.1 Standard Fields - HANA data is confidential
  dataSecurityClass: "confidential"
  dataGovernanceClass: "enterprise-data"
  
  # Data Owner
  owner:
    name: "AI Platform Team"
    team: "HANA Cloud ML"
    contact: "ai-platform@company.com"
  
  # Extension: LLM Routing Policy - vLLM only for HANA data
  x-llm-policy:
    routing: "vllm-only"
    defaultBackend: "vllm"
    confidentialBackend: "vllm"
    auditLevel: "full"
    retentionPolicy: "no-storage"
    
    routingRules:
      - condition: "hana_data_query"
        backend: "vllm"
        reason: "HANA data queries must stay on-premise"
      - condition: "rag_with_hana"
        backend: "vllm"
        reason: "RAG with HANA vectors is confidential"
      - condition: "text_generation"
        backend: "vllm"
        reason: "Generated content based on HANA data"
  
  # Extension: Prompting Policy
  x-prompting-policy:
    systemPrompt: |
      You are a generative AI assistant integrated with SAP HANA Cloud.
      Generate responses using RAG patterns with HANA vector store.
      Never expose raw data values from HANA tables.
      All processing must remain on-premise for data protection.
      Follow enterprise governance and compliance requirements.
    maxTokens: 4096
    temperature: 0.7
    responseFormat: "structured"
    
  # Extension: Regulatory Compliance
  x-regulatory-compliance:
    frameworks:
      - "MGF-Agentic-AI"
      - "AI-Agent-Index"
      - "GDPR-Data-Processing"
    autonomyLevel: "L2"
    requiresHumanOversight: true
    safetyControls:
      - "guardrails"
      - "monitoring"
      - "audit-logging"
      - "content-filtering"
  
  # Output Ports
  outputPort:
    - id: "rag-query"
      name: "RAG Query API"
      description: "Retrieval augmented generation with HANA"
      dataSecurityClass: "confidential"
      x-llm-policy:
        routing: "vllm-only"
    
    - id: "text-generation"
      name: "Text Generation API"
      description: "Generate text based on HANA context"
      dataSecurityClass: "confidential"
      x-llm-policy:
        routing: "vllm-only"
    
    - id: "embeddings"
      name: "Embeddings API"
      description: "Generate and store embeddings in HANA"
      dataSecurityClass: "confidential"
      x-llm-policy:
        routing: "vllm-only"
  
  # Input Ports
  inputPort:
    - id: "hana-tables"
      name: "HANA Tables"
      description: "Business tables from HANA Cloud"
      dataSecurityClass: "confidential"
      x-llm-policy:
        routing: "vllm-only"
        allowTokenization: false
    
    - id: "documents"
      name: "Document Input"
      description: "Documents for RAG indexing"
      dataSecurityClass: "internal"
      x-llm-policy:
        routing: "vllm-only"
  
  # Quality Metrics
  quality:
    availability: "99.5%"
    latencyP95: "5000ms"
    throughput: "100 req/min"