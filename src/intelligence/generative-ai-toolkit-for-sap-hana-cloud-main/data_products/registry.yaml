# =============================================================================
# Generative AI Toolkit for SAP HANA Cloud - Data Product Registry (ODPS 4.1)
# =============================================================================

version: "4.1"
catalog:
  id: "gen-ai-toolkit-hana-catalog"
  name: "Generative AI Toolkit HANA Cloud Data Product Catalog"
  description: "Data products for generative AI with SAP HANA Cloud"
  sap_ai_experience:
    tier: "ai_core"
    service: "ai-prompt-agent"
    map_ref: "sap-ai-experience-map.yaml" 

products:
  - ref: "gen_ai_hana_service.yaml"

# Global policies - HANA data is confidential
globalPolicies:
  defaultSecurityClass: "confidential"
  defaultLLMRouting: "vllm-only"
  auditEnabled: true
  
# LLM Backend Configuration
llmBackends:
  aicore:
    endpoint: "http://localhost:9130/mcp"
    models:
      - "anthropic-claude"
    forSecurityClass: ["public"]
  
  vllm:
    endpoint: "http://localhost:9180/mcp"
    models:
      - "llama-3.1-70b"
      - "codellama-34b"
    forSecurityClass: ["internal", "confidential", "restricted"]