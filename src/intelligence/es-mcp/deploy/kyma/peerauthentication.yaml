apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: elasticsearch-permissive
  namespace: sap-ai-services
  labels:
    app: elasticsearch
    app.kubernetes.io/part-of: btp-ai-suite
  annotations:
    # Allow plain HTTP from non-Istio pods (e.g. es-mcp which has sidecar.istio.io/inject=false)
    # while still accepting mTLS from Istio-injected pods.
    # Without this, the global STRICT mTLS policy blocks plain HTTP to elasticsearch-0.
spec:
  selector:
    matchLabels:
      app: elasticsearch
  portLevelMtls:
    9200:
      mode: PERMISSIVE
    9300:
      mode: PERMISSIVE