# ES MCP Server — Kyma APIRule v2
#
# Auth model: static API key (app-level)
# ───────────────────────────────────────
# This MCP server is called by other internal Kyma services, not by
# end users.  Internal callers reach it directly via ClusterIP:
#
#   http://es-mcp-service.sap-ai-services.svc.cluster.local:9120/mcp
#
# and authenticate with:
#
#   Authorization: ApiKey <MCP_API_KEY value>
#
# The APIRule below is therefore only needed for:
#   1. External health checks (ops monitoring, readiness probes from outside)
#   2. Optional external access if you ever need to call /mcp from outside
#      the cluster (e.g. from a BTP application) — secured by the API key.
#
# Because the app itself enforces the API key on every /mcp request, the
# gateway rule uses noAuth=true; the key in the Authorization header is
# the actual security boundary.
#
# Update the `hosts` value to match your Kyma cluster domain, then:
#   kubectl apply -f apirule.yaml
#   curl https://es-mcp.<cluster-domain>/health
---
apiVersion: gateway.kyma-project.io/v2
kind: APIRule
metadata:
  name: es-mcp-api
  namespace: sap-ai-services
  labels:
    app: es-mcp
    component: mcp-server
spec:
  gateway: kyma-system/kyma-gateway
  hosts:
    # Replace with your actual Kyma cluster wildcard domain.
    # Example: es-mcp.c-9323c0b.kyma.ondemand.com
    - es-mcp.c-xxxxxxx.kyma.ondemand.com
  service:
    name: es-mcp-service
    port: 9120
  rules:
    # ── Health — public, no credentials required ────────────────────────
    - path: /health
      methods: ["GET"]
      noAuth: true

    # ── MCP — noAuth at gateway; app enforces Authorization: ApiKey header
    # Internal callers skip the gateway entirely (ClusterIP).
    # External callers (e.g. BTP app) must still send the ApiKey header.
    - path: /mcp
      methods: ["POST", "OPTIONS"]
      noAuth: true