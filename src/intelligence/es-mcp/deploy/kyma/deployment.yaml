# ES MCP Server — Kubernetes Deployment + Service
# Namespace: sap-ai-services
#
# Reuses the existing cluster secrets and ConfigMap:
#   elasticsearch-credentials        → ELASTIC_PASSWORD
#   sap-elasticsearch-aicore-secrets → AICORE_CLIENT_ID, AICORE_CLIENT_SECRET
#   sap-elasticsearch-config         → ES_HOST, AICORE_AUTH_URL, AICORE_BASE_URL, …
#
# The only new secret you need to create is es-mcp-auth for the MCP API key:
#
#   kubectl create secret generic es-mcp-auth \
#     --namespace sap-ai-services \
#     --from-literal=MCP_API_KEY="$(openssl rand -hex 32)"
#
# Then apply:
#   kubectl apply -f deployment.yaml
#
# How a calling service authenticates:
#   POST http://es-mcp-service.sap-ai-services.svc.cluster.local:9120/mcp
#   Authorization: ApiKey <MCP_API_KEY value>

---
# Small ConfigMap for es-mcp-specific settings not in sap-elasticsearch-config.
apiVersion: v1
kind: ConfigMap
metadata:
  name: es-mcp-config
  namespace: sap-ai-services
  labels:
    app: es-mcp
    component: mcp-server
data:
  ES_USERNAME: "elastic"
  # Set to "false" temporarily during first-run testing; set back to "true" for production.
  XSUAA_VERIFY_TOKEN: "true"
  MCP_MAX_SEARCH_SIZE: "100"
  MCP_MAX_KNN_K: "100"
  MCP_MAX_REQUEST_BYTES: "1048576"
  # Set to the exact AI Core deployment ID for your embedding model.
  # Leave empty to auto-discover (slower, logs a warning on first call).
  AICORE_EMBEDDING_DEPLOYMENT_ID: "dc9b452a67bfcaa5"

---
# NetworkPolicy: mirrors ai-core-pal-agent-network-policy pattern.
# Allows egress to ES (:9200 in-cluster) + HTTPS (:443 for AI Core) + DNS (:53).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: es-mcp-network-policy
  namespace: sap-ai-services
  labels:
    app: es-mcp
    app.kubernetes.io/part-of: btp-ai-suite
spec:
  podSelector:
    matchLabels:
      app: es-mcp
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: sap-ai-services
      ports:
        - port: 9120
          protocol: TCP
    - from:
        - namespaceSelector:
            matchLabels:
              istio-injection: enabled
    # Allow Kyma ingress gateway (istio-system) to reach MCP port
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - port: 9120
          protocol: TCP
  egress:
    # In-cluster: ES on 9200 + anything else in namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: sap-ai-services
    # External HTTPS for SAP AI Core auth + inference
    - ports:
        - port: 443
          protocol: TCP
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
      to:
        - namespaceSelector: {}
    # Istio control plane — required for sidecar certificate issuance (xDS/SDS)
    - ports:
        - port: 15012
          protocol: TCP
        - port: 15010
          protocol: TCP
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: es-mcp
  namespace: sap-ai-services
  labels:
    app: es-mcp
    component: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: es-mcp
  template:
    metadata:
      labels:
        app: es-mcp
        component: mcp-server
      annotations:
        # Istio sidecar injection enabled — required for Kyma APIRule v2.
        # NetworkPolicy allows egress to istiod:15012 for certificate issuance,
        # and ingress from istio-system for the Kyma ingress gateway.
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: es-mcp
          image: docker.io/plturrell/es-mcp:1.0.2
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 9120
              protocol: TCP

          # ── Existing cluster-wide config (ES_HOST, AICORE_AUTH_URL, AICORE_BASE_URL, …)
          envFrom:
            - configMapRef:
                name: sap-elasticsearch-config   # existing
            - configMapRef:
                name: es-mcp-config              # es-mcp specific overrides

          env:
            # ── ES password ─────────────────────────────────────────────
            # Key in the existing secret is ELASTIC_PASSWORD; map it to ES_PASSWORD
            - name: ES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: elasticsearch-credentials   # existing
                  key: ELASTIC_PASSWORD

            # ── AI Core credentials ──────────────────────────────────────
            - name: AICORE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: sap-elasticsearch-aicore-secrets   # existing
                  key: AICORE_CLIENT_ID
            - name: AICORE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sap-elasticsearch-aicore-secrets   # existing
                  key: AICORE_CLIENT_SECRET

            # ── MCP static API key ───────────────────────────────────────
            - name: MCP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: es-mcp-auth   # new — create with the command above
                  key: MCP_API_KEY

            # ── Override PORT to avoid conflict with sap-elasticsearch-config ─
            # sap-elasticsearch-config has MCP_PORT=9120; our server reads PORT.
            - name: PORT
              value: "9120"

          livenessProbe:
            httpGet:
              path: /health
              port: 9120
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 9120
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      imagePullSecrets:
        - name: dockerhub-plturrell
      restartPolicy: Always
      automountServiceAccountToken: false

---
apiVersion: v1
kind: Service
metadata:
  name: es-mcp-service
  namespace: sap-ai-services
  labels:
    app: es-mcp
    component: mcp-server
spec:
  selector:
    app: es-mcp
  ports:
    - name: http
      protocol: TCP
      port: 9120
      targetPort: 9120
  # ClusterIP — only reachable from within the cluster.
  # Callers use: http://es-mcp-service.sap-ai-services.svc.cluster.local:9120
  type: ClusterIP