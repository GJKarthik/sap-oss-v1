<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SAC AI Widget Harness</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #f5f6f7;
        font-family: Arial, sans-serif;
      }

      body {
        display: flex;
        align-items: stretch;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
      }

      .harness-shell {
        width: min(1280px, 100%);
        height: 720px;
        border: 1px solid #d5dadd;
        border-radius: 12px;
        overflow: hidden;
        background: #ffffff;
        box-shadow: 0 20px 48px rgba(17, 22, 26, 0.08);
      }

      sac-ai-widget {
        display: block;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div class="harness-shell">
      <sac-ai-widget id="widget"></sac-ai-widget>
    </div>

    <script src="./harness.js"></script>
    <script src="/dist/sac-ai-widget/widget.js"></script>
  </body>
</html>
