# SAP AI Fabric Console — Kyma APIRule v2
# Exposes the Angular web frontend at: https://aifabric.c-054c570.kyma.ondemand.com
#
# The web container (nginx) internally proxies /api/* to the FastAPI backend.
# The API backend (aifabric-api-service:8000) is NOT directly exposed externally.
#
# Deploy:
#   kubectl apply -f deploy/kyma/apirule.yaml

apiVersion: gateway.kyma-project.io/v2
kind: APIRule
metadata:
  name: aifabric-web
  namespace: sap-ai-services
  labels:
    app: aifabric-web
    app.kubernetes.io/part-of: btp-ai-suite
spec:
  gateway: kyma-system/kyma-gateway
  hosts:
    - aifabric.c-054c570.kyma.ondemand.com
  service:
    name: aifabric-web-service
    port: 80
  rules:
    # Health check — unauthenticated
    - path: /health
      methods: ["GET"]
      noAuth: true
    # All app routes — unauthenticated at gateway (JWT auth enforced inside FastAPI)
    - path: /{**}
      methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
      noAuth: true