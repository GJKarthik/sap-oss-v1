#
# OpenAPI 3.1 Specification for Data Cleaning Copilot
# 
# This specification covers:
# - REST API endpoints for the Copilot service
# - MCP (Model Context Protocol) endpoints
# - Authentication and authorization
#
# View with Swagger UI: https://editor.swagger.io/

openapi: 3.1.0

info:
  title: Data Cleaning Copilot API
  description: |
    AI-powered data quality validation and check generation service.
    
    ## Overview
    
    The Data Cleaning Copilot provides:
    - **Automated Check Generation**: LLM-powered generation of data validation checks
    - **Data Profiling**: Statistical analysis of database tables and columns
    - **Validation Execution**: Run generated checks against data
    - **MCP Protocol**: Model Context Protocol for LLM tool integration
    
    ## Authentication
    
    The API supports Bearer token authentication:
    ```
    Authorization: Bearer <token>
    ```
    
    For development, authentication can be disabled by not setting `MCP_AUTH_TOKEN`.
    
    ## Rate Limiting
    
    Default limits:
    - 100 tool calls per minute per endpoint
    - 20 requests per minute per client
    - 1000 total requests per minute globally
    
    Rate limit headers are included in responses:
    - `X-RateLimit-Limit`: Maximum requests allowed
    - `X-RateLimit-Remaining`: Requests remaining in window
    - `Retry-After`: Seconds until rate limit resets (on 429)
    
  version: 0.1.0
  contact:
    name: SAP AI Foundation
    url: https://github.com/SAP/data-cleaning-copilot
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:9110
    description: Local MCP server
  - url: http://localhost:8000
    description: Local REST API server
  - url: https://api.example.com
    description: Production server

tags:
  - name: health
    description: Health check endpoints
  - name: mcp
    description: Model Context Protocol endpoints
  - name: tools
    description: MCP tools for data operations
  - name: resources
    description: MCP resources for context
  - name: validation
    description: Data validation operations
  - name: profiling
    description: Data profiling operations

paths:
  /health:
    get:
      tags:
        - health
      summary: Health check
      description: Returns the health status of the service
      operationId: healthCheck
      security: []  # No auth required
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /metrics:
    get:
      tags:
        - health
      summary: Prometheus metrics
      description: Returns Prometheus-format metrics
      operationId: getMetrics
      security: []
      responses:
        '200':
          description: Metrics in Prometheus format
          content:
            text/plain:
              schema:
                type: string
                example: |
                  # HELP dcc_requests_total Total requests
                  # TYPE dcc_requests_total counter
                  dcc_requests_total{service="mcp",method="tools/call",status="success"} 42

  /mcp:
    post:
      tags:
        - mcp
      summary: MCP JSON-RPC endpoint
      description: |
        Model Context Protocol endpoint supporting JSON-RPC 2.0.
        
        Supported methods:
        - `initialize`: Initialize MCP session
        - `tools/list`: List available tools
        - `tools/call`: Execute a tool
        - `resources/list`: List available resources
        - `resources/read`: Read a resource
      operationId: mcpRpc
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JsonRpcRequest'
            examples:
              initialize:
                summary: Initialize session
                value:
                  jsonrpc: "2.0"
                  id: 1
                  method: "initialize"
                  params: {}
              toolsList:
                summary: List tools
                value:
                  jsonrpc: "2.0"
                  id: 2
                  method: "tools/list"
                  params: {}
              toolsCall:
                summary: Call a tool
                value:
                  jsonrpc: "2.0"
                  id: 3
                  method: "tools/call"
                  params:
                    name: "data_quality_check"
                    arguments:
                      table_name: "Users"
              resourcesRead:
                summary: Read a resource
                value:
                  jsonrpc: "2.0"
                  id: 4
                  method: "resources/read"
                  params:
                    uri: "mangle://facts"
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonRpcResponse'
          headers:
            X-RateLimit-Limit:
              schema:
                type: integer
              description: Maximum requests per window
            X-RateLimit-Remaining:
              schema:
                type: integer
              description: Remaining requests in window
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonRpcError'
        '429':
          description: Rate limit exceeded
          headers:
            Retry-After:
              schema:
                type: integer
              description: Seconds until rate limit resets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonRpcError'

  # REST API endpoints (alternative to MCP)
  /api/v1/tables:
    get:
      tags:
        - profiling
      summary: List tables
      description: Returns a list of all tables in the database
      operationId: listTables
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of tables
          content:
            application/json:
              schema:
                type: object
                properties:
                  tables:
                    type: array
                    items:
                      $ref: '#/components/schemas/TableInfo'

  /api/v1/tables/{tableName}/schema:
    get:
      tags:
        - profiling
      summary: Get table schema
      description: Returns the schema definition for a table
      operationId: getTableSchema
      security:
        - bearerAuth: []
      parameters:
        - name: tableName
          in: path
          required: true
          schema:
            type: string
          description: Name of the table
      responses:
        '200':
          description: Table schema
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TableSchema'
        '404':
          description: Table not found

  /api/v1/tables/{tableName}/profile:
    get:
      tags:
        - profiling
      summary: Profile table data
      description: Returns statistical profile of table data
      operationId: profileTable
      security:
        - bearerAuth: []
      parameters:
        - name: tableName
          in: path
          required: true
          schema:
            type: string
        - name: sample_size
          in: query
          schema:
            type: integer
            default: 1000
          description: Number of rows to sample
      responses:
        '200':
          description: Table profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TableProfile'

  /api/v1/tables/{tableName}/columns/{columnName}/profile:
    get:
      tags:
        - profiling
      summary: Profile column data
      description: Returns detailed statistical profile of a column
      operationId: profileColumn
      security:
        - bearerAuth: []
      parameters:
        - name: tableName
          in: path
          required: true
          schema:
            type: string
        - name: columnName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Column profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ColumnProfile'

  /api/v1/checks:
    get:
      tags:
        - validation
      summary: List checks
      description: Returns all registered validation checks
      operationId: listChecks
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of checks
          content:
            application/json:
              schema:
                type: object
                properties:
                  checks:
                    type: array
                    items:
                      $ref: '#/components/schemas/CheckDefinition'

    post:
      tags:
        - validation
      summary: Add checks
      description: Add new validation checks
      operationId: addChecks
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                checks:
                  type: array
                  items:
                    $ref: '#/components/schemas/CheckDefinition'
      responses:
        '201':
          description: Checks added successfully
        '400':
          description: Invalid check definition

  /api/v1/checks/{checkName}:
    get:
      tags:
        - validation
      summary: Get check details
      description: Returns details of a specific check
      operationId: getCheck
      security:
        - bearerAuth: []
      parameters:
        - name: checkName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Check details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckDefinition'
        '404':
          description: Check not found

    delete:
      tags:
        - validation
      summary: Remove check
      description: Remove a validation check
      operationId: removeCheck
      security:
        - bearerAuth: []
      parameters:
        - name: checkName
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Check removed
        '404':
          description: Check not found

  /api/v1/validate:
    post:
      tags:
        - validation
      summary: Run validation
      description: Execute all validation checks
      operationId: runValidation
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                check_names:
                  type: array
                  items:
                    type: string
                  description: Specific checks to run (optional, runs all if empty)
      responses:
        '200':
          description: Validation results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationResults'

  /api/v1/generate-checks:
    post:
      tags:
        - validation
      summary: Generate checks
      description: Use AI to generate validation checks
      operationId: generateChecks
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agent_version:
                  type: string
                  enum: [v1, v2, v3]
                  default: v3
                table_scopes:
                  type: array
                  items:
                    type: string
                  description: Tables to scope check generation
                max_iterations:
                  type: integer
                  default: 100
      responses:
        '200':
          description: Generated checks
          content:
            application/json:
              schema:
                type: object
                properties:
                  checks:
                    type: array
                    items:
                      $ref: '#/components/schemas/CheckDefinition'
                  summary:
                    type: string

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        Bearer token authentication.
        Set via MCP_AUTH_TOKEN environment variable.

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
        timestamp:
          type: string
          format: date-time
        checks:
          type: object
          additionalProperties:
            type: object
            properties:
              healthy:
                type: boolean
              message:
                type: string

    JsonRpcRequest:
      type: object
      required:
        - jsonrpc
        - method
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        id:
          oneOf:
            - type: string
            - type: integer
        method:
          type: string
        params:
          type: object

    JsonRpcResponse:
      type: object
      properties:
        jsonrpc:
          type: string
          enum: ["2.0"]
        id:
          oneOf:
            - type: string
            - type: integer
        result:
          type: object
        error:
          $ref: '#/components/schemas/JsonRpcErrorObject'

    JsonRpcError:
      type: object
      properties:
        jsonrpc:
          type: string
        id:
          oneOf:
            - type: string
            - type: integer
            - type: "null"
        error:
          $ref: '#/components/schemas/JsonRpcErrorObject'

    JsonRpcErrorObject:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data:
          type: object

    TableInfo:
      type: object
      properties:
        name:
          type: string
        row_count:
          type: integer
        column_count:
          type: integer

    TableSchema:
      type: object
      properties:
        table_name:
          type: string
        columns:
          type: array
          items:
            $ref: '#/components/schemas/ColumnSchema'
        primary_key:
          type: array
          items:
            type: string
        foreign_keys:
          type: array
          items:
            $ref: '#/components/schemas/ForeignKey'

    ColumnSchema:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        nullable:
          type: boolean
        description:
          type: string

    ForeignKey:
      type: object
      properties:
        columns:
          type: array
          items:
            type: string
        references_table:
          type: string
        references_columns:
          type: array
          items:
            type: string

    TableProfile:
      type: object
      properties:
        table_name:
          type: string
        row_count:
          type: integer
        column_count:
          type: integer
        columns:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ColumnProfile'

    ColumnProfile:
      type: object
      properties:
        name:
          type: string
        dtype:
          type: string
        null_count:
          type: integer
        null_percentage:
          type: number
        unique_count:
          type: integer
        unique_percentage:
          type: number
        min:
          type: string
        max:
          type: string
        mean:
          type: number
        std:
          type: number
        sample_values:
          type: array
          items: {}

    CheckDefinition:
      type: object
      required:
        - function_name
        - description
      properties:
        function_name:
          type: string
          description: Unique identifier for the check
        description:
          type: string
        scope:
          type: array
          items:
            type: array
            items:
              type: string
          description: "Array of [table, column] pairs"
        sql:
          type: string
          description: SQL representation of the check
        code:
          type: string
          description: Python code for the check

    ValidationResults:
      type: object
      properties:
        total_checks:
          type: integer
        checks_passed:
          type: integer
        checks_failed:
          type: integer
        checks_with_violations:
          type: array
          items:
            type: object
            properties:
              check_name:
                type: string
              violation_count:
                type: integer
              sample_violations:
                type: array
                items: {}
        checks_without_violations:
          type: array
          items:
            type: string
        errors:
          type: array
          items:
            type: object
            properties:
              check_name:
                type: string
              error:
                type: string

    MCPTool:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        inputSchema:
          type: object
          properties:
            type:
              type: string
            properties:
              type: object
            required:
              type: array
              items:
                type: string

    MCPResource:
      type: object
      properties:
        uri:
          type: string
        name:
          type: string
        description:
          type: string
        mimeType:
          type: string