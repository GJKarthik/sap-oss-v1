# ODPS 4.1 Data Product Descriptor
# Data Cleaning Copilot Service
#

apiVersion: odps.sap.com/v4.1
kind: DataProduct
metadata:
  name: data-cleaning-copilot
  namespace: sap.generativeui
  version: 0.1.0
  labels:
    domain: data-quality
    tier: platform
    maturity: beta

spec:
  # =========================================================================
  # Product Overview
  # =========================================================================
  title: Data Cleaning Copilot Service
  description: |
    AI-powered data quality validation framework that leverages Large Language
    Models to automatically generate, validate, and maintain data quality checks
    across enterprise databases. Provides automated check generation, data
    profiling, anomaly detection, and validation execution via MCP protocol.

  owner:
    team: SAP AI Foundation
    contact: ai-foundation@sap.com

  # =========================================================================
  # Data Classification
  # =========================================================================
  dataSecurityClass: internal
  dataGovernanceClass: data-quality-tools

  classification:
    confidentiality: internal
    integrity: high
    availability: standard

  # =========================================================================
  # Input Ports
  # =========================================================================
  inputPorts:
    - name: database-schemas
      description: Database schema definitions for validation target
      format: json
      protocol: mcp
      x-llm-policy:
        routing: aicore-ok
        contains-pii: false

    - name: table-data
      description: Sample or full table data for profiling and validation
      format: dataframe
      protocol: internal
      x-llm-policy:
        routing: conditional
        pii-detection: enabled
        route-if-pii: vllm-onprem

    - name: user-context
      description: User session context and preferences
      format: json
      protocol: mcp
      x-llm-policy:
        routing: aicore-ok
        contains-pii: false

  # =========================================================================
  # Output Ports
  # =========================================================================
  outputPorts:
    - name: validation-checks
      description: Generated validation check definitions
      format: json
      schema: CheckLogic
      x-llm-policy:
        routing: aicore-ok
        audit-required: true

    - name: validation-results
      description: Results of executed validation checks
      format: json
      schema: ValidationResults
      x-llm-policy:
        routing: aicore-ok
        audit-required: true

    - name: data-profiles
      description: Statistical profiles of tables and columns
      format: json
      schema: DataProfile
      x-llm-policy:
        routing: conditional
        pii-masking: enabled

    - name: anomaly-reports
      description: Detected data anomalies
      format: json
      schema: AnomalyReport
      x-llm-policy:
        routing: conditional
        pii-masking: enabled

    - name: cleaning-queries
      description: SQL queries to fix data issues
      format: sql
      x-llm-policy:
        routing: aicore-ok
        human-approval: required

  # =========================================================================
  # Service Interfaces
  # =========================================================================
  interfaces:
    - name: mcp-server
      type: mcp
      version: "2024-11-05"
      endpoint: http://localhost:9110/mcp
      authentication:
        type: bearer
        tokenEnvVar: MCP_AUTH_TOKEN

    - name: rest-api
      type: http
      version: "1.0"
      endpoint: http://localhost:8000/api/v1
      authentication:
        type: bearer
        tokenEnvVar: API_AUTH_TOKEN
      documentation: docs/openapi.yaml

    - name: metrics
      type: prometheus
      endpoint: http://localhost:9110/metrics
      authentication: none

    - name: health
      type: http
      endpoint: http://localhost:9110/health
      authentication: none

  # =========================================================================
  # Tool Definitions
  # =========================================================================
  tools:
    - name: data_quality_check
      description: Run data quality checks on a table
      inputSchema:
        type: object
        properties:
          table_name:
            type: string
            description: Name of the table to check
          checks:
            type: array
            items:
              type: string
            description: Specific checks to run
        required:
          - table_name
      x-autonomy:
        level: auto
        approval-required: false

    - name: schema_analysis
      description: Analyze database schema for quality recommendations
      inputSchema:
        type: object
        properties:
          schema_definition:
            type: string
            description: JSON schema definition
        required:
          - schema_definition
      x-autonomy:
        level: auto
        approval-required: false

    - name: data_profiling
      description: Generate statistical profile of table data
      inputSchema:
        type: object
        properties:
          table_name:
            type: string
          sample_size:
            type: integer
            default: 1000
        required:
          - table_name
      x-autonomy:
        level: auto
        approval-required: false

    - name: anomaly_detection
      description: Detect anomalies in column data
      inputSchema:
        type: object
        properties:
          table_name:
            type: string
          column_name:
            type: string
          method:
            type: string
            enum: [zscore, iqr, isolation_forest]
        required:
          - table_name
          - column_name
      x-autonomy:
        level: auto
        approval-required: false

    - name: generate_cleaning_query
      description: Generate SQL to fix data issues
      inputSchema:
        type: object
        properties:
          issue_description:
            type: string
          table_name:
            type: string
        required:
          - issue_description
          - table_name
      x-autonomy:
        level: supervised
        approval-required: true
        approval-reason: "Generates queries that may modify data"

    - name: mangle_query
      description: Query Mangle fact store for governance rules
      inputSchema:
        type: object
        properties:
          predicate:
            type: string
          arguments:
            type: array
            items:
              type: string
        required:
          - predicate
      x-autonomy:
        level: auto
        approval-required: false

  # =========================================================================
  # Agentic AI Governance
  # =========================================================================
  x-regulatory-compliance:
    frameworks:
      - MGF-Agentic-AI
    autonomyLevel: L2
    description: |
      Level L2: Semi-autonomous operation with human oversight required
      for data-mutating operations. All read operations are auto-approved.
      Query generation requires explicit human confirmation before execution.

  x-human-oversight:
    required: true
    scope:
      - generate_cleaning_query
      - execute_cleaning_query
    bypassConditions:
      - environment: development
        tables: sample_*
    auditTrail: enabled
    confirmationUI: gradio

  x-data-routing:
    defaultBackend: aicore
    rules:
      - condition:
          keywords:
            - customer
            - personal
            - confidential
            - pii
            - ssn
            - credit_card
        action: route-to-vllm
        reason: PII data must stay on-premise

      - condition:
          dataSecurityClass: restricted
        action: route-to-vllm
        reason: Restricted data requires on-premise processing

      - condition:
          default: true
        action: route-to-aicore
        reason: Non-sensitive data can use cloud LLM

  # =========================================================================
  # Observability
  # =========================================================================
  observability:
    metrics:
      enabled: true
      endpoint: /metrics
      format: prometheus
      scrapeInterval: 15s

    tracing:
      enabled: true
      protocol: otlp
      sampling: 0.1
      exportEndpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}

    logging:
      enabled: true
      format: json
      level: INFO
      retention: 30d

    healthCheck:
      endpoint: /health
      interval: 10s
      timeout: 5s

  # =========================================================================
  # SLA and Limits
  # =========================================================================
  sla:
    availability: 99.5%
    responseTime:
      p50: 500ms
      p95: 2000ms
      p99: 5000ms

  rateLimits:
    global:
      requestsPerMinute: 1000
    perClient:
      requestsPerMinute: 100
    perTool:
      data_quality_check: 100/min
      schema_analysis: 50/min
      data_profiling: 50/min
      anomaly_detection: 30/min
      generate_cleaning_query: 20/min

  resourceLimits:
    maxRequestSize: 1MB
    maxResponseSize: 10MB
    sandboxTimeout: 30s
    sandboxMemory: 512MB

  # =========================================================================
  # Dependencies
  # =========================================================================
  dependencies:
    required:
      - name: sap-ai-core
        type: llm-backend
        version: ">=2024.1"

    optional:
      - name: vllm-onprem
        type: llm-backend
        version: ">=0.4.0"
        condition: pii-data-present

      - name: kuzu-graph
        type: database
        version: ">=0.3.0"
        condition: schema-graph-enabled

      - name: prometheus
        type: monitoring
        version: ">=2.40.0"

      - name: jaeger
        type: tracing
        version: ">=1.50.0"

  # =========================================================================
  # Lifecycle
  # =========================================================================
  lifecycle:
    status: beta
    deprecationPolicy: 12-months-notice
    supportedVersions:
      - "0.1.x"
    endOfLife: null