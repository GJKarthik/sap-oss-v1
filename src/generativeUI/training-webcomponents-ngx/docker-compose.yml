version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: apps/angular-shell/Dockerfile
    ports:
      - '8080:80'
    environment:
      - SAP_API_BASE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - training-network

  api:
    build:
      context: packages/api-server
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    environment:
      - MODELOPT_URL=http://modelopt:8001
      - ALLOWED_ORIGINS=http://localhost:8080,http://localhost:4200
      - PORT=8000
    depends_on:
      modelopt:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - training-network

  modelopt:
    image: training-webcomponents-ngx-modelopt:latest
    ports:
      - '8001:8001'
    environment:
      - PORT=8001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - training-network
    volumes:
      - modelopt-cache:/root/.cache/huggingface
      - modelopt-models:/app/models

networks:
  training-network:
    driver: bridge

volumes:
  modelopt-cache:
    driver: local
  modelopt-models:
    driver: local