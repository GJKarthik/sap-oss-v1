---
apiVersion: v1
kind: ConfigMap
metadata:
  name: training-web-runtime-config
  namespace: sap-ai-services
  labels:
    app.kubernetes.io/name: training-web
data:
  runtime-config.js: |
    window.__TRAINING_CONFIG__ = {
      apiBaseUrl: '/api',
      authMode: 'edge',
      requireAuth: true,
      loginUrl: '/oauth2/start?rd=%2F',
      logoutUrl: '/oauth2/sign_out'
    };
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: training-edge-auth-config
  namespace: sap-ai-services
  labels:
    app.kubernetes.io/name: training-edge-auth
    app.kubernetes.io/component: auth
data:
  OAUTH2_PROXY_PROVIDER: "oidc"
  OAUTH2_PROXY_OIDC_ISSUER_URL: "https://YOUR_IDENTITY_ISSUER"
  OAUTH2_PROXY_REDIRECT_URL: "https://training-workbench.YOUR_KYMA_DOMAIN/oauth2/callback"
  OAUTH2_PROXY_UPSTREAMS: "http://training-gateway.sap-ai-services.svc.cluster.local:80/"
  OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
  OAUTH2_PROXY_EMAIL_DOMAINS: "*"
  OAUTH2_PROXY_SCOPE: "openid profile email"
  OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
  OAUTH2_PROXY_REVERSE_PROXY: "true"
  OAUTH2_PROXY_COOKIE_SECURE: "true"
  OAUTH2_PROXY_COOKIE_SAMESITE: "lax"
  OAUTH2_PROXY_COOKIE_DOMAINS: ".YOUR_KYMA_DOMAIN"
  OAUTH2_PROXY_WHITELIST_DOMAINS: ".YOUR_KYMA_DOMAIN"
  OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER: "true"
  OAUTH2_PROXY_SET_AUTHORIZATION_HEADER: "true"
  OAUTH2_PROXY_PASS_ACCESS_TOKEN: "true"
  OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
  OAUTH2_PROXY_SKIP_JWT_BEARER_TOKENS: "true"
  OAUTH2_PROXY_PING_PATH: "/ping"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: training-edge-auth
  namespace: sap-ai-services
  labels:
    app: training-edge-auth
    app.kubernetes.io/name: training-edge-auth
    app.kubernetes.io/component: auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: training-edge-auth
  template:
    metadata:
      labels:
        app: training-edge-auth
        app.kubernetes.io/name: training-edge-auth
        app.kubernetes.io/component: auth
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4180
              name: http
          envFrom:
            - configMapRef:
                name: training-edge-auth-config
          env:
            - name: OAUTH2_PROXY_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: training-edge-auth-secrets
                  key: OAUTH2_PROXY_CLIENT_ID
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: training-edge-auth-secrets
                  key: OAUTH2_PROXY_CLIENT_SECRET
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: training-edge-auth-secrets
                  key: OAUTH2_PROXY_COOKIE_SECRET
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: training-edge-auth
  namespace: sap-ai-services
  labels:
    app: training-edge-auth
    app.kubernetes.io/name: training-edge-auth
spec:
  type: ClusterIP
  selector:
    app: training-edge-auth
  ports:
    - name: http
      port: 4180
      targetPort: 4180
---
apiVersion: gateway.kyma-project.io/v2
kind: APIRule
metadata:
  name: training-workbench
  namespace: sap-ai-services
  labels:
    app.kubernetes.io/name: training-workbench
    app.kubernetes.io/component: auth
spec:
  gateway: kyma-system/kyma-gateway
  hosts:
    - training-workbench.YOUR_KYMA_DOMAIN
  service:
    name: training-edge-auth
    port: 4180
  rules:
    - path: /*
      methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
      noAuth: true
