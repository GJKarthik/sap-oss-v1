# Training Workbench runtime secrets template for SAP BTP Kyma.
# Copy, replace placeholders, and apply to the cluster.
---
apiVersion: v1
kind: Secret
metadata:
  name: training-runtime-secrets
  namespace: sap-ai-services
  labels:
    app.kubernetes.io/name: training-workbench
    app.kubernetes.io/component: runtime-secrets
type: Opaque
stringData:
  HANA_USER: "REPLACE_WITH_HANA_USER"
  HANA_PASSWORD: "REPLACE_WITH_HANA_PASSWORD"
  AICORE_CLIENT_ID: "REPLACE_WITH_AICORE_CLIENT_ID"
  AICORE_CLIENT_SECRET: "REPLACE_WITH_AICORE_CLIENT_SECRET"
