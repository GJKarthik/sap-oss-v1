---
apiVersion: v1
kind: Namespace
metadata:
  name: sap-ai-services
  labels:
    app.kubernetes.io/name: sap-ai-services
    app.kubernetes.io/part-of: sap-oss-v1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: training-api-config
  namespace: sap-ai-services
  labels:
    app.kubernetes.io/name: training-api
data:
  PORT: "8002"
  HOST: "0.0.0.0"
  DATABASE_URL: "sqlite:////app/data/enterprise_mlops.db"
  ALLOWED_ORIGINS: "https://training-workbench.YOUR_KYMA_DOMAIN"
  HANA_HOST: "your-hana-instance.hanacloud.ondemand.com"
  HANA_PORT: "443"
  HANA_SCHEMA: "PAL_STORE"
  HANA_ENCRYPT: "true"
  VLLM_URL: "http://vllm.sap-ai-services.svc.cluster.local:8080"
  VLLM_TURBOQUANT_URL: "http://vllm.sap-ai-services.svc.cluster.local:8080"
  MODELOPT_URL: "http://model-optimizer.sap-ai-services.svc.cluster.local:8001"
  AICORE_AUTH_URL: "https://your-auth-url/oauth/token"
  AICORE_BASE_URL: "https://your-ai-core-base-url"
  AICORE_RESOURCE_GROUP: "default"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: training-web-runtime-config
  namespace: sap-ai-services
  labels:
    app.kubernetes.io/name: training-web
data:
  runtime-config.js: |
    window.__TRAINING_CONFIG__ = {
      apiBaseUrl: '/api',
      requireAuth: false
    };
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: training-gateway-config
  namespace: sap-ai-services
  labels:
    app.kubernetes.io/name: training-gateway
data:
  nginx.conf: |
    worker_processes auto;

    events {
      worker_connections 1024;
    }

    http {
      include       mime.types;
      default_type  application/octet-stream;
      sendfile      on;
      keepalive_timeout 65;

      map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
      }

      server {
        listen 80;
        server_name _;

        location / {
          proxy_pass http://training-web.sap-ai-services.svc.cluster.local:80;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /api/prompts {
          proxy_pass http://training-api.sap-ai-services.svc.cluster.local:8002/api/prompts;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/prompts/ {
          proxy_pass http://training-api.sap-ai-services.svc.cluster.local:8002/api/prompts/;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
          rewrite ^/api/?(.*)$ /$1 break;
          proxy_pass http://training-api.sap-ai-services.svc.cluster.local:8002;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws/ {
          proxy_pass http://training-api.sap-ai-services.svc.cluster.local:8002;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ocr/ {
          proxy_pass http://arabic-ocr.sap-ai-services.svc.cluster.local:8060;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
          default_type application/json;
          return 200 '{"status":"ok","gateway":"healthy","mode":"kyma"}';
        }
      }
    }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: training-api-data
  namespace: sap-ai-services
  labels:
    app.kubernetes.io/name: training-api
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: training-api
  namespace: sap-ai-services
  labels:
    app: training-api
    app.kubernetes.io/name: training-api
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: training-api
  template:
    metadata:
      labels:
        app: training-api
        app.kubernetes.io/name: training-api
        app.kubernetes.io/component: api
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      imagePullSecrets:
        - name: sap-oss-v1-registry
      containers:
        - name: api-server
          image: ghcr.io/your-org/sap-oss-v1-api-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
              name: http
          envFrom:
            - configMapRef:
                name: training-api-config
          env:
            - name: HANA_USER
              valueFrom:
                secretKeyRef:
                  name: training-runtime-secrets
                  key: HANA_USER
            - name: HANA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: training-runtime-secrets
                  key: HANA_PASSWORD
            - name: AICORE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: training-runtime-secrets
                  key: AICORE_CLIENT_ID
            - name: AICORE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: training-runtime-secrets
                  key: AICORE_CLIENT_SECRET
          volumeMounts:
            - name: training-api-data
              mountPath: /app/data
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
      volumes:
        - name: training-api-data
          persistentVolumeClaim:
            claimName: training-api-data
---
apiVersion: v1
kind: Service
metadata:
  name: training-api
  namespace: sap-ai-services
  labels:
    app: training-api
    app.kubernetes.io/name: training-api
spec:
  type: ClusterIP
  selector:
    app: training-api
  ports:
    - name: http
      port: 8002
      targetPort: 8002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: training-web
  namespace: sap-ai-services
  labels:
    app: training-web
    app.kubernetes.io/name: training-web
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: training-web
  template:
    metadata:
      labels:
        app: training-web
        app.kubernetes.io/name: training-web
        app.kubernetes.io/component: frontend
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      imagePullSecrets:
        - name: sap-oss-v1-registry
      containers:
        - name: angular-shell
          image: ghcr.io/your-org/sap-oss-v1-angular-shell:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          env:
            - name: SAP_API_BASE_URL
              value: "http://training-api.sap-ai-services.svc.cluster.local:8002"
          volumeMounts:
            - name: training-web-runtime-config
              mountPath: /usr/share/nginx/html/runtime-config.js
              subPath: runtime-config.js
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: training-web-runtime-config
          configMap:
            name: training-web-runtime-config
---
apiVersion: v1
kind: Service
metadata:
  name: training-web
  namespace: sap-ai-services
  labels:
    app: training-web
    app.kubernetes.io/name: training-web
spec:
  type: ClusterIP
  selector:
    app: training-web
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: training-gateway
  namespace: sap-ai-services
  labels:
    app: training-gateway
    app.kubernetes.io/name: training-gateway
    app.kubernetes.io/component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: training-gateway
  template:
    metadata:
      labels:
        app: training-gateway
        app.kubernetes.io/name: training-gateway
        app.kubernetes.io/component: gateway
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: training-gateway-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
      volumes:
        - name: training-gateway-config
          configMap:
            name: training-gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: training-gateway
  namespace: sap-ai-services
  labels:
    app: training-gateway
    app.kubernetes.io/name: training-gateway
spec:
  type: ClusterIP
  selector:
    app: training-gateway
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: gateway.kyma-project.io/v2
kind: APIRule
metadata:
  name: training-workbench
  namespace: sap-ai-services
  labels:
    app.kubernetes.io/name: training-workbench
spec:
  gateway: kyma-system/kyma-gateway
  hosts:
    - training-workbench.YOUR_KYMA_DOMAIN
  service:
    name: training-gateway
    port: 80
  rules:
    - path: /*
      methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
      noAuth: true
