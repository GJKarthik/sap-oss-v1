# Training Workbench edge-auth secrets template for SAP BTP Kyma.
# Copy, replace placeholders, and apply after the base stack.
---
apiVersion: v1
kind: Secret
metadata:
  name: training-edge-auth-secrets
  namespace: sap-ai-services
  labels:
    app.kubernetes.io/name: training-edge-auth
    app.kubernetes.io/component: auth
type: Opaque
stringData:
  OAUTH2_PROXY_CLIENT_ID: "REPLACE_WITH_IAS_OR_XSUAA_CLIENT_ID"
  OAUTH2_PROXY_CLIENT_SECRET: "REPLACE_WITH_IAS_OR_XSUAA_CLIENT_SECRET"
  OAUTH2_PROXY_COOKIE_SECRET: "REPLACE_WITH_32_BYTE_BASE64_COOKIE_SECRET"
