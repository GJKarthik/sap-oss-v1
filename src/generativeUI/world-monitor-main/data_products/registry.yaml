# =============================================================================
# World Monitor - Data Product Registry (ODPS 4.1)
# =============================================================================

version: "4.1"
catalog:
  id: "world-monitor-catalog"
  name: "World Monitor Data Product Catalog"
  description: "Data products for global event monitoring and analysis"

products:
  - ref: "world_monitor_service.yaml"

# Global policies - External data, but analysis may touch internal
globalPolicies:
  defaultSecurityClass: "internal"
  defaultLLMRouting: "hybrid"
  auditEnabled: true
  
# LLM Backend Configuration
llmBackends:
  aicore:
    endpoint: "http://localhost:9160/mcp"
    models:
      - "anthropic-claude"
    forSecurityClass: ["public"]
  
  vllm:
    endpoint: "http://localhost:9180/mcp"
    models:
      - "llama-3.1-70b"
    forSecurityClass: ["internal", "confidential", "restricted"]