version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: apps/angular-shell/Dockerfile
    ports:
      - '8080:80'
    environment:
      - SAP_API_BASE_URL=http://api:8000
    depends_on:
      - api

  api:
    build:
      context: packages/api-server
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    environment:
      - MODELOPT_URL=http://modelopt:8001
      - ALLOWED_ORIGINS=http://localhost:8080,http://localhost:4200
      - PORT=8000
    depends_on:
      - modelopt

  modelopt:
    image: training-console-modelopt:latest
    ports:
      - '8001:8001'
    environment:
      - PORT=8001
