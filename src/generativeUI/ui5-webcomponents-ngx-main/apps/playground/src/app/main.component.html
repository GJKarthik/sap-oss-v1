<!-- Landing Page -->
<div class="home-page">

  <div class="home-hero">
    <ui5-title level="H1" class="home-hero__title">{{ 'HOME_HERO_TITLE' | ui5I18n }}</ui5-title>
    <p class="home-hero__subtitle">
      {{ 'HOME_HERO_SUBTITLE' | ui5I18n }}
    </p>
  </div>

  <div class="home-cards">

    <ui5-card
      *ngFor="let card of homeCards; trackBy: trackByPath"
      class="home-card"
      (click)="navigateTo(card.path)"
      tabindex="0"
      (keydown.enter)="navigateTo(card.path)"
      role="link"
      [attr.aria-label]="(card.titleKey | ui5I18n) + ' - ' + (card.subtitleKey | ui5I18n)">
      <ui5-card-header
        slot="header"
        [attr.title-text]="card.titleKey | ui5I18n"
        [attr.subtitle-text]="card.subtitleKey | ui5I18n"
        interactive>
      </ui5-card-header>
      <div class="home-card__body">
        <p class="home-card__desc">
          {{ card.descriptionKey | ui5I18n }}
        </p>
        <ui5-button design="Emphasized" (click)="$event.stopPropagation(); navigateTo(card.path)">{{ card.buttonKey | ui5I18n }}</ui5-button>
      </div>
    </ui5-card>

  </div>

  <ui5-message-strip class="home-info" design="Information" hide-close-button>
    {{ 'HOME_INFO_MSG' | ui5I18n }}
  </ui5-message-strip>

</div>
