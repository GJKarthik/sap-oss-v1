<!-- App Shell -->
<div class="app-shell">

  <!-- Fiori ShellBar -->
  <ui5-shellbar
    primary-title="UI5 Web Components NGX"
    secondary-title="Playground"
    [accessibilityAttributes]="shellbarA11y"
    (logoClick)="navigateTo('/')">

    <!-- Nav items (ui5-shellbar-item uses default slot in v2) -->
    <ui5-shellbar-item
      icon="home"
      text="Home"
      count=""
      (item-click)="navigateTo('/')">
    </ui5-shellbar-item>

    <ui5-shellbar-item
      icon="form"
      text="Forms Demo"
      count=""
      (item-click)="navigateTo('/forms')">
    </ui5-shellbar-item>

    <ui5-shellbar-item
      icon="ai"
      text="Joule AI"
      count=""
      (item-click)="navigateTo('/joule')">
    </ui5-shellbar-item>

    <ui5-shellbar-item
      icon="collaborate"
      text="Collaboration"
      count=""
      (item-click)="navigateTo('/collab')">
    </ui5-shellbar-item>

    <ui5-shellbar-item
      icon="palette"
      text="Components"
      count=""
      (item-click)="navigateTo('/components')">
    </ui5-shellbar-item>

    <ui5-shellbar-item
      icon="chain-link"
      text="MCP"
      count=""
      (item-click)="navigateTo('/mcp')">
    </ui5-shellbar-item>

    <ui5-shellbar-item
      icon="checklist"
      text="Readiness"
      count=""
      (item-click)="navigateTo('/readiness')">
    </ui5-shellbar-item>

    <!-- Theme switcher in profile slot -->
    <ui5-select slot="profile" style="min-width:160px" (change)="onThemeChange($event)">
      <ui5-option value="sap_horizon" [attr.selected]="currentTheme === 'sap_horizon' ? true : null">Horizon</ui5-option>
      <ui5-option value="sap_horizon_dark" [attr.selected]="currentTheme === 'sap_horizon_dark' ? true : null">Horizon Dark</ui5-option>
      <ui5-option value="sap_fiori_3" [attr.selected]="currentTheme === 'sap_fiori_3' ? true : null">Quartz Light</ui5-option>
      <ui5-option value="sap_fiori_3_dark" [attr.selected]="currentTheme === 'sap_fiori_3_dark' ? true : null">Quartz Dark</ui5-option>
    </ui5-select>

  </ui5-shellbar>

  <!-- Top nav bar with active route highlight -->
  <nav class="app-nav" role="navigation" aria-label="Main navigation">
    <button
      class="app-nav__item"
      [class.app-nav__item--active]="isActive('/')"
      (click)="navigateTo('/')">
      Home
    </button>
    <button
      class="app-nav__item"
      [class.app-nav__item--active]="isActive('/forms')"
      (click)="navigateTo('/forms')">
      Forms Demo
    </button>
    <button
      class="app-nav__item"
      [class.app-nav__item--active]="isActive('/joule')"
      (click)="navigateTo('/joule')">
      Joule AI
    </button>
    <button
      class="app-nav__item"
      [class.app-nav__item--active]="isActive('/collab')"
      (click)="navigateTo('/collab')">
      Collaboration
    </button>
    <button
      class="app-nav__item"
      [class.app-nav__item--active]="isActive('/generative')"
      (click)="navigateTo('/generative')">
      Generative UI
    </button>
    <button
      class="app-nav__item"
      [class.app-nav__item--active]="isActive('/components')"
      (click)="navigateTo('/components')">
      Components
    </button>
    <button
      class="app-nav__item"
      [class.app-nav__item--active]="isActive('/mcp')"
      (click)="navigateTo('/mcp')">
      MCP
    </button>
    <button
      class="app-nav__item"
      [class.app-nav__item--active]="isActive('/readiness')"
      (click)="navigateTo('/readiness')">
      Readiness
    </button>

    <div class="app-nav__spacer"></div>

    <!-- Theme switcher in nav bar -->
    <div class="app-nav__theme">
      <label class="app-nav__theme-label">Theme</label>
      <ui5-select style="min-width:160px" (change)="onThemeChange($event)">
        <ui5-option value="sap_horizon" [attr.selected]="currentTheme === 'sap_horizon' ? true : null">Horizon</ui5-option>
        <ui5-option value="sap_horizon_dark" [attr.selected]="currentTheme === 'sap_horizon_dark' ? true : null">Horizon Dark</ui5-option>
        <ui5-option value="sap_fiori_3" [attr.selected]="currentTheme === 'sap_fiori_3' ? true : null">Quartz Light</ui5-option>
        <ui5-option value="sap_fiori_3_dark" [attr.selected]="currentTheme === 'sap_fiori_3_dark' ? true : null">Quartz Dark</ui5-option>
      </ui5-select>
    </div>
  </nav>

  <section class="demo-tour-banner" *ngIf="demoTourActive" aria-label="Demo tour controls">
    <div class="demo-tour-banner__left">
      <ui5-tag design="Information">Demo Tour {{ demoTourProgress }}</ui5-tag>
      <span>Current step: {{ demoTourStepLabel }}</span>
    </div>
    <div class="demo-tour-banner__actions">
      <ui5-button data-testid="demo-tour-next" design="Emphasized" (click)="nextDemoStep()">Next Step</ui5-button>
      <ui5-button data-testid="demo-tour-end" design="Transparent" (click)="endDemoTour()">End Tour</ui5-button>
    </div>
  </section>

  <playground-live-health-panel></playground-live-health-panel>

  <!-- Main Content -->
  <main class="app-content">
    <router-outlet></router-outlet>
  </main>

</div>
