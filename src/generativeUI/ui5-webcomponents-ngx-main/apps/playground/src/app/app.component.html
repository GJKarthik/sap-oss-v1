<!-- App Shell -->
<div class="app-shell">

  <!-- Fiori ShellBar -->
  <ui5-shellbar
    primary-title="UI5 Web Components NGX"
    secondary-title="Playground"
    (logoClick)="navigateTo('/')"
    (menuItemClick)="onMenuItemClick($event)">

    <ui5-shellbar-item
      slot="items"
      icon="home"
      text="Home"
      (click)="navigateTo('/')">
    </ui5-shellbar-item>

    <ui5-shellbar-item
      slot="items"
      icon="form"
      text="Forms Demo"
      (click)="navigateTo('/forms')">
    </ui5-shellbar-item>

    <ui5-shellbar-item
      slot="items"
      icon="ai"
      text="Joule AI"
      (click)="navigateTo('/joule')">
    </ui5-shellbar-item>

    <ui5-shellbar-item
      slot="items"
      icon="collaborate"
      text="Collaboration"
      (click)="navigateTo('/collab')">
    </ui5-shellbar-item>

    <!-- Theme switcher -->
    <ui5-select slot="items" style="min-width:180px" (change)="onThemeChange($event)">
      <ui5-option value="sap_horizon" [attr.selected]="currentTheme === 'sap_horizon' ? true : null">Horizon</ui5-option>
      <ui5-option value="sap_horizon_dark" [attr.selected]="currentTheme === 'sap_horizon_dark' ? true : null">Horizon Dark</ui5-option>
      <ui5-option value="sap_fiori_3" [attr.selected]="currentTheme === 'sap_fiori_3' ? true : null">Quartz Light</ui5-option>
      <ui5-option value="sap_fiori_3_dark" [attr.selected]="currentTheme === 'sap_fiori_3_dark' ? true : null">Quartz Dark</ui5-option>
    </ui5-select>

  </ui5-shellbar>

  <!-- Main Content -->
  <main class="app-content">
    <router-outlet></router-outlet>
  </main>

</div>
