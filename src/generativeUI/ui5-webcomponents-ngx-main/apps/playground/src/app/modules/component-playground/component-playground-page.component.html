<section class="component-playground" role="main" aria-label="Component playground">
  <ui5-title level="H3">{{ 'COMPONENT_PLAYGROUND_TITLE' | ui5I18n }}</ui5-title>

  <ui5-message-strip *ngIf="routeBlocked" design="Negative" hide-close-button>
    {{ blockingReason }}
  </ui5-message-strip>

  <ui5-message-strip *ngIf="lastError" design="Negative" hide-close-button>
    {{ lastError }}
  </ui5-message-strip>

  <div class="component-playground__actions">
    <ui5-button design="Emphasized" [disabled]="loading || routeBlocked" (click)="loadModels()">
      {{ 'COMPONENT_PLAYGROUND_REFRESH' | ui5I18n }}
    </ui5-button>
    <span class="component-playground__hint">{{ 'COMPONENT_PLAYGROUND_SOURCE' | ui5I18n : models.length }}</span>
  </div>

  <ui5-busy-indicator *ngIf="loading" active size="M" [text]="'LOADING' | ui5I18n"></ui5-busy-indicator>

  <ui5-list *ngIf="!loading && models.length > 0" separators="Inner">
    <ui5-li *ngFor="let model of models">
      <div class="component-playground__model-row">
        <bdi>{{ model }}</bdi>
        <ui5-tag *ngIf="isArabicPrimaryModel(model)" design="Information">
          {{ 'MODEL_TAG_ARABIC_PRIMARY' | ui5I18n }}
        </ui5-tag>
      </div>
    </ui5-li>
  </ui5-list>

  <ui5-message-strip *ngIf="!loading && !routeBlocked && models.length === 0 && !lastError" design="Information" hide-close-button>
    {{ 'COMPONENT_PLAYGROUND_EMPTY' | ui5I18n }}
  </ui5-message-strip>
</section>
