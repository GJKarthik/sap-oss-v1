<section class="mcp-page">
  <ui5-title level="H3">{{ 'MCP_PAGE_TITLE' | ui5I18n }}</ui5-title>

  <ui5-message-strip *ngIf="routeBlocked" design="Negative" hide-close-button>
    {{ blockingReason }}
  </ui5-message-strip>

  <ui5-message-strip *ngIf="lastError" design="Negative" hide-close-button>
    {{ lastError }}
  </ui5-message-strip>

  <div class="mcp-page__controls">
    <ui5-select [disabled]="loading || routeBlocked" (change)="onToolSelect($event)">
      <ui5-option *ngFor="let tool of tools" [value]="tool" [attr.selected]="tool === selectedTool ? true : null">
        {{ tool }}
      </ui5-option>
    </ui5-select>

    <ui5-button design="Emphasized" [disabled]="invoking || loading || routeBlocked || !selectedTool" (click)="invokeSelectedTool()">
      {{ 'MCP_INVOKE_TOOL' | ui5I18n }}
    </ui5-button>

    <ui5-button design="Transparent" [disabled]="loading || routeBlocked" (click)="loadTools()">
      {{ 'MCP_REFRESH_TOOLS' | ui5I18n }}
    </ui5-button>
  </div>

  <!-- Tool description -->
  <div *ngIf="selectedToolMeta" class="mcp-page__tool-info">
    <div class="tool-info__name">{{ selectedToolMeta.name }}</div>
    <div *ngIf="selectedToolMeta.description" class="tool-info__desc">{{ selectedToolMeta.description }}</div>
  </div>

  <!-- Argument builder -->
  <div *ngIf="selectedTool && !routeBlocked" class="mcp-page__args">
    <div class="args-header">
      <ui5-title level="H5">Arguments (JSON)</ui5-title>
      <ui5-button design="Transparent" icon="reset" (click)="toolArgs = '{}'">Clear</ui5-button>
    </div>
    <textarea
      class="mcp-page__args-editor"
      [(ngModel)]="toolArgs"
      rows="6"
      spellcheck="false"
      placeholder='{ "key": "value" }'></textarea>
    <ui5-message-strip *ngIf="argsError" design="Negative" hide-close-button>
      {{ argsError }}
    </ui5-message-strip>
  </div>

  <ui5-busy-indicator *ngIf="loading || invoking" active size="M" [text]="'LOADING' | ui5I18n"></ui5-busy-indicator>

  <pre *ngIf="lastCallResult" class="mcp-page__result"><bdi>{{ lastCallResult }}</bdi></pre>
</section>
