# =============================================================================
# BDC Pulsar Streaming - Standalone Configuration
# =============================================================================
# Configuration for running in standalone mode (single broker, local metadata)

# =============================================================================
# Cluster Configuration
# =============================================================================
clusterName=standalone

# =============================================================================
# Broker Configuration
# =============================================================================
# Binary protocol port
brokerServicePort=6650
# Binary protocol TLS port
brokerServicePortTls=6651
# HTTP admin port
webServicePort=8080
# HTTPS admin port
webServicePortTls=8443

# =============================================================================
# Performance Configuration
# =============================================================================
# Number of I/O threads for handling connections
numIOThreads=4
# Number of HTTP server threads
numHttpServerThreads=4
# Maximum message size (5MB)
maxMessageSize=5242880
# Maximum unacked messages per consumer
maxUnackedMessagesPerConsumer=50000

# =============================================================================
# Storage Configuration (SAP HANA)
# =============================================================================
# Storage backend type
managedLedgerStorageClassName=hana
# Ledger rollover size (256MB)
managedLedgerMaxLedgerRolloverTimeMinutes=240
# Entry batch size
managedLedgerMaxEntriesPerLedger=50000

# =============================================================================
# HANA Connection
# =============================================================================
# Connection pool minimum size
hanaPoolMinConnections=2
# Connection pool maximum size
hanaPoolMaxConnections=20
# Connection timeout (30 seconds)
hanaConnectionTimeoutMs=30000
# Idle timeout (5 minutes)
hanaIdleTimeoutMs=300000

# =============================================================================
# Retention Configuration
# =============================================================================
# Default retention time in minutes (0 = infinite)
defaultRetentionTimeMinutes=0
# Default retention size in MB (0 = infinite)
defaultRetentionSizeMB=0
# Backlog quota limit (10GB)
backlogQuotaLimitBytes=10737418240
# Backlog quota policy
backlogQuotaPolicy=producer_request_hold

# =============================================================================
# Authentication Configuration
# =============================================================================
# Enable authentication
authenticationEnabled=false
# Authentication providers
authenticationProviders=
# Enable authorization
authorizationEnabled=false
# Superuser roles
superUserRoles=admin

# =============================================================================
# TLS Configuration
# =============================================================================
# Enable TLS
tlsEnabled=false
# TLS certificate file
tlsCertificateFilePath=
# TLS key file
tlsKeyFilePath=
# TLS trust certs file
tlsTrustCertsFilePath=
# Require TLS client auth
tlsRequireClientAuth=false

# =============================================================================
# Transaction Configuration
# =============================================================================
# Enable transactions
transactionEnabled=true
# Transaction coordinator enabled
transactionCoordinatorEnabled=true
# Transaction timeout (seconds)
transactionBufferClientMaxConcurrentRequests=1000
transactionPendingAckLogIndexMinLag=100

# =============================================================================
# Metrics Configuration
# =============================================================================
# Enable metrics
metricsEnabled=true
# Expose topic level metrics
exposeTopicLevelMetricsInPrometheus=true
# Expose consumer level metrics
exposeConsumerLevelMetricsInPrometheus=false
# Expose producer level metrics
exposeProducerLevelMetricsInPrometheus=false

# =============================================================================
# Load Balancer Configuration
# =============================================================================
# Enable load balancer
loadBalancerEnabled=false

# =============================================================================
# Offloader Configuration (Tiered Storage)
# =============================================================================
# Managed ledger offload driver
managedLedgerOffloadDriver=
# Offload threshold (1GB)
managedLedgerOffloadAutoTriggerSizeThresholdBytes=1073741824
# Offload deletion lag (1 hour)
managedLedgerOffloadDeletionLagMs=3600000

# =============================================================================
# Functions Configuration
# =============================================================================
# Disable functions worker in standalone mode
functionsWorkerEnabled=false

# =============================================================================
# Schema Configuration  
# =============================================================================
# Schema compatibility strategy
schemaCompatibilityStrategy=FULL
# Is auto update schema enabled
isSchemaAutoUpdateEnabled=true
# Is schema validation enforced
schemaValidationEnforced=false