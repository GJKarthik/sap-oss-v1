---
# Network Policy - Restrict traffic to authorized services only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bdc-aiprompt-streaming-network-policy
  namespace: bdc
  labels:
    app: bdc-aiprompt-streaming
spec:
  podSelector:
    matchLabels:
      app: bdc-aiprompt-streaming
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from other BDC services
    - from:
        - namespaceSelector:
            matchLabels:
              name: bdc
        - namespaceSelector:
            matchLabels:
              name: ai-core
      ports:
        - protocol: TCP
          port: 6650
        - protocol: TCP
          port: 6651
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8443
    # Allow traffic from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 8080
    # Allow traffic from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8443
  egress:
    # Allow DNS resolution
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow HANA Cloud connections
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
    # Allow XSUAA/IAS connections
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
    # Allow connections to other BDC services
    - to:
        - namespaceSelector:
            matchLabels:
              name: bdc
        - namespaceSelector:
            matchLabels:
              name: ai-core
      ports:
        - protocol: TCP
          port: 6650
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 8815

---
# Resource Quota - Prevent resource exhaustion in the namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: bdc-aiprompt-streaming-quota
  namespace: bdc
  labels:
    app: bdc-aiprompt-streaming
spec:
  hard:
    # Limit total CPU/memory for all AIPrompt pods
    requests.cpu: "16"
    requests.memory: "32Gi"
    limits.cpu: "32"
    limits.memory: "64Gi"
    # Limit pod count
    pods: "20"
    # Limit persistent volume claims
    persistentvolumeclaims: "10"
    requests.storage: "500Gi"

---
# Priority Class - Ensure broker pods get scheduling priority
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: bdc-aiprompt-streaming-high
  labels:
    app: bdc-aiprompt-streaming
value: 1000000
globalDefault: false
description: "High priority for BDC AIPrompt Streaming broker pods"
preemptionPolicy: PreemptLowerPriority