# BDC AIPrompt Streaming - PodDisruptionBudget
# Ensures high availability during voluntary disruptions (upgrades, node maintenance)

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: bdc-aiprompt-streaming
  namespace: bdc
  labels:
    app: bdc-aiprompt-streaming
    component: broker
spec:
  # Ensure at least 50% of pods remain available during disruptions
  minAvailable: "50%"
  selector:
    matchLabels:
      app: bdc-aiprompt-streaming
      component: broker

---
# Alternative: Use maxUnavailable for more flexible scaling
# Uncomment this and comment out the above if preferred

