apiVersion: apps/v1
kind: Deployment
metadata:
  name: bdc-pulsar-streaming
  namespace: bdc
  labels:
    app: bdc-pulsar-streaming
    component: broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bdc-pulsar-streaming
  template:
    metadata:
      labels:
        app: bdc-pulsar-streaming
        component: broker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: bdc-pulsar-streaming
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: pulsar-broker
          image: ghcr.io/sap/bdc-pulsar-streaming:latest
          imagePullPolicy: Always
          ports:
            - name: binary
              containerPort: 6650
              protocol: TCP
            - name: binary-tls
              containerPort: 6651
              protocol: TCP
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: https
              containerPort: 8443
              protocol: TCP
          env:
            - name: PULSAR_HOME
              value: /opt/pulsar
            - name: PULSAR_CONF_DIR
              value: /opt/pulsar/conf
            - name: PULSAR_DATA_DIR
              value: /opt/pulsar/data
            - name: PULSAR_LOG_DIR
              value: /opt/pulsar/logs
            - name: HANA_HOST
              valueFrom:
                secretKeyRef:
                  name: bdc-pulsar-hana-secret
                  key: host
            - name: HANA_PORT
              valueFrom:
                secretKeyRef:
                  name: bdc-pulsar-hana-secret
                  key: port
            - name: HANA_SCHEMA
              value: PULSAR_STORAGE
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.monitoring:4317
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /admin/v2/brokers/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /admin/v2/brokers/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /opt/pulsar/conf
              readOnly: true
            - name: data
              mountPath: /opt/pulsar/data
            - name: logs
              mountPath: /opt/pulsar/logs
            - name: tls-certs
              mountPath: /opt/pulsar/certs
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: bdc-pulsar-config
        - name: data
          emptyDir: {}
        - name: logs
          emptyDir: {}
        - name: tls-certs
          secret:
            secretName: bdc-pulsar-tls
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: bdc-pulsar-streaming
  namespace: bdc
  labels:
    app: bdc-pulsar-streaming
spec:
  type: ClusterIP
  ports:
    - name: binary
      port: 6650
      targetPort: binary
      protocol: TCP
    - name: binary-tls
      port: 6651
      targetPort: binary-tls
      protocol: TCP
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: https
      port: 8443
      targetPort: https
      protocol: TCP
  selector:
    app: bdc-pulsar-streaming
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bdc-pulsar-streaming
  namespace: bdc
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bdc-pulsar-config
  namespace: bdc
data:
  broker.conf: |
    # BDC Pulsar Streaming - Broker Configuration
    
    # Cluster
    clusterName=bdc-cluster
    
    # Broker
    brokerServicePort=6650
    brokerServicePortTls=6651
    webServicePort=8080
    webServicePortTls=8443
    
    # Performance
    numIOThreads=8
    numHttpServerThreads=8
    maxMessageSize=5242880
    
    # Storage (HANA)
    managedLedgerStorageClassName=hana
    
    # Authentication
    authenticationEnabled=false
    authorizationEnabled=false
    
    # TLS
    tlsEnabled=false
    
    # Metrics
    metricsEnabled=true
    
  standalone.conf: |
    # BDC Pulsar Streaming - Standalone Configuration
    
    # Cluster
    clusterName=standalone
    
    # Broker
    brokerServicePort=6650
    webServicePort=8080
    
    # Performance
    numIOThreads=4
    numHttpServerThreads=4
    maxMessageSize=5242880
    
    # Storage
    managedLedgerStorageClassName=hana
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bdc-pulsar-streaming
  namespace: bdc
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  rules:
    - host: pulsar.bdc.sap.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bdc-pulsar-streaming
                port:
                  number: 8080