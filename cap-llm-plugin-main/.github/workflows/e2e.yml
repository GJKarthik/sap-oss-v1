name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  e2e:
    name: E2E Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (TypeScript)
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e:ci
        env:
          JEST_JUNIT_OUTPUT_DIR: test-results
          JEST_JUNIT_OUTPUT_NAME: e2e-junit-node${{ matrix.node-version }}.xml

      - name: Publish E2E test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: E2E Results (Node ${{ matrix.node-version }})
          path: test-results/e2e-junit-node${{ matrix.node-version }}.xml
          reporter: java-junit
          fail-on-error: true

      - name: Upload E2E test results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results-node${{ matrix.node-version }}
          path: test-results/
          retention-days: 14

  e2e-summary:
    name: E2E Summary
    runs-on: ubuntu-latest
    needs: e2e
    if: always()

    steps:
      - name: Check E2E result
        run: |
          if [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "E2E tests failed or were cancelled."
            exit 1
          fi
          echo "All E2E tests passed."
