openapi: 3.0.3
info:
  title: CAP LLM Plugin Service
  description: |
    Typed API contract for the cap-llm-plugin CDS service.
    Generated from `srv/llm-service.cds` (CDS Compiler v6.7.3).

    All actions are unbound service actions invoked via POST.
    Errors follow the standard schema: `{ error: { code, message, details } }`.
  version: 2.0.0
  license:
    name: Apache-2.0

servers:
  - url: /odata/v4/cap-llm-plugin
    description: Default OData V4 service path

paths:
  # ── Embedding ──────────────────────────────────────────────────────
  /getEmbeddingWithConfig:
    post:
      operationId: getEmbeddingWithConfig
      summary: Generate vector embeddings for the given input text
      tags: [Embedding]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [config, input]
              properties:
                config:
                  $ref: "#/components/schemas/EmbeddingConfig"
                input:
                  type: string
                  description: Text to embed
      responses:
        "200":
          description: Embedding response from the SDK
          content:
            application/json:
              schema:
                type: string
                description: JSON-serialized SDK embedding response
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  # ── Chat Completion ────────────────────────────────────────────────
  /getChatCompletionWithConfig:
    post:
      operationId: getChatCompletionWithConfig
      summary: Perform a chat completion request via the Orchestration SDK
      tags: [Chat]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [config, messages]
              properties:
                config:
                  $ref: "#/components/schemas/ChatConfig"
                messages:
                  type: array
                  items:
                    $ref: "#/components/schemas/ChatMessage"
      responses:
        "200":
          description: Chat completion response from the SDK
          content:
            application/json:
              schema:
                type: string
                description: JSON-serialized SDK chat completion response
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  # ── RAG Pipeline ───────────────────────────────────────────────────
  /getRagResponse:
    post:
      operationId: getRagResponse
      summary: "Full RAG pipeline: embed → search → complete"
      tags: [RAG]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - input
                - tableName
                - embeddingColumnName
                - contentColumn
                - chatInstruction
                - embeddingConfig
                - chatConfig
              properties:
                input:
                  type: string
                  description: User query
                tableName:
                  type: string
                  description: HANA Cloud table with vector embeddings
                embeddingColumnName:
                  type: string
                  description: Column containing embedding vectors
                contentColumn:
                  type: string
                  description: Column containing text content
                chatInstruction:
                  type: string
                  description: System prompt instruction for the chat model
                embeddingConfig:
                  $ref: "#/components/schemas/EmbeddingConfig"
                chatConfig:
                  $ref: "#/components/schemas/ChatConfig"
                context:
                  type: array
                  items:
                    $ref: "#/components/schemas/ChatMessage"
                  description: Optional conversation history
                topK:
                  type: integer
                  default: 3
                  description: Number of similar documents to retrieve
                algoName:
                  type: string
                  default: COSINE_SIMILARITY
                  description: Similarity algorithm (COSINE_SIMILARITY or L2DISTANCE)
      responses:
        "200":
          description: RAG pipeline response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RagResponse"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  # ── Similarity Search ──────────────────────────────────────────────
  /similaritySearch:
    post:
      operationId: similaritySearch
      summary: Perform vector similarity search on a HANA Cloud table
      tags: [Search]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tableName
                - embeddingColumnName
                - contentColumn
                - embedding
              properties:
                tableName:
                  type: string
                  description: HANA Cloud table name
                embeddingColumnName:
                  type: string
                  description: Column containing embedding vectors
                contentColumn:
                  type: string
                  description: Column containing text content
                embedding:
                  type: string
                  description: JSON-serialized number[] embedding vector
                algoName:
                  type: string
                  default: COSINE_SIMILARITY
                topK:
                  type: integer
                  default: 3
      responses:
        "200":
          description: Similarity search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SimilaritySearchResult"
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  # ── Anonymization ──────────────────────────────────────────────────
  /getAnonymizedData:
    post:
      operationId: getAnonymizedData
      summary: Retrieve anonymized data from a HANA anonymized view
      tags: [Anonymization]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entityName]
              properties:
                entityName:
                  type: string
                  description: 'Fully qualified entity name in "ServiceName.EntityName" format'
                sequenceIds:
                  type: array
                  items:
                    type: string
                  description: Optional sequence IDs to filter results
      responses:
        "200":
          description: Anonymized rows from the HANA view
          content:
            application/json:
              schema:
                type: string
                description: JSON-serialized rows
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  # ── Orchestration: Harmonized Chat ─────────────────────────────────
  /getHarmonizedChatCompletion:
    post:
      operationId: getHarmonizedChatCompletion
      summary: Chat completion with OrchestrationClient and optional response extraction
      tags: [Orchestration]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [clientConfig, chatCompletionConfig]
              properties:
                clientConfig:
                  type: string
                  description: JSON-serialized OrchestrationModuleConfig
                chatCompletionConfig:
                  type: string
                  description: JSON-serialized ChatCompletionRequest
                getContent:
                  type: boolean
                  default: false
                  description: Return only the message content string
                getTokenUsage:
                  type: boolean
                  default: false
                  description: Return only the token usage object
                getFinishReason:
                  type: boolean
                  default: false
                  description: Return only the finish reason string
      responses:
        "200":
          description: Chat completion response (full, content, usage, or reason)
          content:
            application/json:
              schema:
                type: string
                description: JSON-serialized response
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

  # ── Orchestration: Content Filters ─────────────────────────────────
  /getContentFilters:
    post:
      operationId: getContentFilters
      summary: Build a content safety filter for use with the Orchestration Service
      tags: [Orchestration]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, config]
              properties:
                type:
                  type: string
                  description: "Filter provider type (currently only 'azure')"
                config:
                  type: string
                  description: JSON-serialized filter configuration
      responses:
        "200":
          description: Constructed filter object
          content:
            application/json:
              schema:
                type: string
                description: JSON-serialized filter object
        "400":
          $ref: "#/components/responses/ErrorResponse"
        "500":
          $ref: "#/components/responses/ErrorResponse"

# ═══════════════════════════════════════════════════════════════════════
# Components
# ═══════════════════════════════════════════════════════════════════════

components:
  schemas:
    EmbeddingConfig:
      type: object
      required: [modelName, resourceGroup]
      properties:
        modelName:
          type: string
          description: SDK model name (e.g., "text-embedding-ada-002")
        resourceGroup:
          type: string
          description: AI Core resource group
        destinationName:
          type: string
          description: BTP destination name
        deploymentUrl:
          type: string
          description: Deployment URL path

    ChatConfig:
      type: object
      required: [modelName, resourceGroup]
      properties:
        modelName:
          type: string
          description: SDK model name (e.g., "gpt-4o")
        resourceGroup:
          type: string
          description: AI Core resource group
        destinationName:
          type: string
          description: BTP destination name
        deploymentUrl:
          type: string
          description: Deployment URL path

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role:
          type: string
          description: "Message role: system, user, or assistant"
        content:
          type: string
          description: Message text

    SimilaritySearchResult:
      type: object
      properties:
        PAGE_CONTENT:
          type: string
          description: Text content from the matched document
        SCORE:
          type: number
          format: double
          description: Similarity score

    RagResponse:
      type: object
      properties:
        completion:
          type: string
          description: JSON-serialized chat completion response
        additionalContents:
          type: array
          items:
            $ref: "#/components/schemas/SimilaritySearchResult"
          description: Similar documents from the vector search

    ErrorDetail:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable error code (e.g., EMBEDDING_CONFIG_INVALID)
        message:
          type: string
          description: Human-readable error description
        details:
          type: object
          description: Additional structured context about the error
          additionalProperties: true

  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                $ref: "#/components/schemas/ErrorDetail"
