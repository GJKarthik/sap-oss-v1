# =============================================================================
# AI SDK JS - Data Product Registry (ODPS 4.1)
# =============================================================================

version: "4.1"
catalog:
  id: "ai-sdk-js-catalog"
  name: "AI SDK JS Data Product Catalog"
  description: "Data products for AI Core inference services"
  sap_ai_experience:
    tier: "sap_cap"
    service: "ai-sdk-js"
    map_ref: "sap-ai-experience-map.yaml" 

products:
  - ref: "ai_core_inference.yaml"
  - ref: "embeddings.yaml"
  - ref: "deployments.yaml"

# Global policies
globalPolicies:
  defaultSecurityClass: "internal"
  defaultLLMRouting: "hybrid"
  auditEnabled: true
  
# LLM Backend Configuration
llmBackends:
  aicore:
    endpoint: "http://localhost:9090/mcp"
    models:
      - "anthropic-claude"
      - "azure-openai"
    forSecurityClass: ["public", "internal"]
  
  vllm:
    endpoint: "http://localhost:9180/mcp"
    models:
      - "llama-3.1-70b"
      - "mistral-7b"
    forSecurityClass: ["confidential", "restricted"]

# =============================================================================
# OData Vocabularies Integration
# =============================================================================
dependencies:
  vocabularyService:
    name: "OData Vocabularies"
    endpoint: "http://localhost:9150/mcp"
    openaiEndpoint: "http://localhost:9150/v1"
    description: "Universal dictionary for OData annotations and type generation"
    capabilities:
      - "term-lookup"
      - "term-search"
      - "annotation-suggestion"
      - "typescript-generation"
      - "annotation-validation"
    vocabularies:
      - name: "UI"
        namespace: "com.sap.vocabularies.UI.v1"
        usage: "Fiori Elements UI annotations - LineItem, HeaderInfo, Chart"
      - name: "Common"
        namespace: "com.sap.vocabularies.Common.v1"
        usage: "Labels, semantic keys, value lists"
      - name: "Analytics"
        namespace: "com.sap.vocabularies.Analytics.v1"
        usage: "Measures and dimensions for analytical apps"
      - name: "PersonalData"
        namespace: "com.sap.vocabularies.PersonalData.v1"
        usage: "GDPR data classification"
    models:
      - id: "odata-vocab-annotator"
        purpose: "Suggest and generate OData annotations"
      - id: "odata-vocab-search"
        purpose: "Search vocabulary terms"
    integrationPoints:
      - typescriptGeneration: "Generate TS types from vocabulary definitions"
      - annotationSuggestion: "Suggest annotations for entity types"
      - termLookup: "Look up specific vocabulary terms"
      - annotationValidation: "Validate OData annotations"
    typesPackage: "@sap-ai-sdk/types/vocabulary"
