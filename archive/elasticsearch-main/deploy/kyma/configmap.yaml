# Elasticsearch ConfigMaps for sap-ai-services
#
# Two ConfigMaps:
#   1. elasticsearch-config  — elasticsearch.yml mounted into the ES pod
#   2. sap-elasticsearch-config — shared env vars consumed by es-mcp and other services
#
# Apply:
#   kubectl apply -f configmap.yaml

---
# Mounted as /usr/share/elasticsearch/config/elasticsearch.yml in elasticsearch-0
apiVersion: v1
kind: ConfigMap
metadata:
  name: elasticsearch-config
  namespace: sap-ai-services
  labels:
    app: elasticsearch
    app.kubernetes.io/part-of: btp-ai-suite
data:
  elasticsearch.yml: |
    cluster.name: sap-elasticsearch
    node.name: ${HOSTNAME}
    network.host: 0.0.0.0
    discovery.type: single-node
    xpack.security.enabled: false
    xpack.security.enrollment.enabled: false
    xpack.ml.enabled: false
    path.data: /usr/share/elasticsearch/data
    path.logs: /usr/share/elasticsearch/logs
    # Memory settings optimized for Kyma (2GB heap)
    bootstrap.memory_lock: false
    # Index settings
    action.destructive_requires_name: true

---
# Shared env vars: consumed by es-mcp, sap-elasticsearch, and any other service
# that needs to locate ES or SAP AI Core.
apiVersion: v1
kind: ConfigMap
metadata:
  name: sap-elasticsearch-config
  namespace: sap-ai-services
  labels:
    app: elasticsearch
    app.kubernetes.io/part-of: btp-ai-suite
data:
  # Elasticsearch endpoint (in-cluster)
  ES_HOST: "http://elasticsearch.sap-ai-services.svc.cluster.local:9200"

  # SAP AI Core — update these for your BTP subaccount/region
  AICORE_AUTH_URL: "https://fin-analytical-svc-rnd.authentication.ap11.hana.ondemand.com/oauth/token"
  AICORE_BASE_URL: "https://api.ai.prod-ap11.ap-southeast-1.aws.ml.hana.ondemand.com"
  AICORE_RESOURCE_GROUP: "default"

  # Logging
  LOG_LEVEL: "INFO"
  PYTHONUNBUFFERED: "1"

  # Port configuration for dependent services
  MCP_HOST: "0.0.0.0"
  MCP_PORT: "9120"
  OPENAI_HOST: "0.0.0.0"
  OPENAI_PORT: "9201"