# Secret template for Elasticsearch credentials
#
# DO NOT commit real values. Create this secret manually:
#
#   kubectl create secret generic elasticsearch-credentials \
#     --namespace sap-ai-services \
#     --from-literal=ELASTIC_PASSWORD="$(openssl rand -hex 16)"
#
# The ELASTIC_PASSWORD is referenced by:
#   - es-mcp deployment (as ES_PASSWORD env var)
#   - Any other service that needs to authenticate to Elasticsearch
#
# Note: xpack.security.enabled=false on elasticsearch-0 means the password
# is NOT currently enforced by ES itself. The secret exists for forward
# compatibility when security is re-enabled.

apiVersion: v1
kind: Secret
metadata:
  name: elasticsearch-credentials
  namespace: sap-ai-services
  labels:
    app: elasticsearch
    app.kubernetes.io/part-of: btp-ai-suite
type: Opaque
stringData:
  # Replace with actual password — do not commit real values
  ELASTIC_PASSWORD: "REPLACE_WITH_SECURE_PASSWORD"