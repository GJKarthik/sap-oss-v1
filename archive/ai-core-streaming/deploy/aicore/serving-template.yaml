# SAP AI Core Streaming - KServe InferenceService
# OpenAI-Compatible API Server
#
# Endpoints:
#   - POST /v1/chat/completions  (streaming supported)
#   - POST /v1/completions       (streaming supported)
#   - POST /v1/embeddings
#   - GET  /v1/models
#   - GET  /health
#
# Deploy with: ai-core-sdk deployment create --template serving-template.yaml

apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: ai-core-streaming-openai
  annotations:
    scenarios.ai.sap.com/description: "OpenAI-compatible API server with smart routing to AI Core models"
    scenarios.ai.sap.com/name: "ai-core-streaming-openai"
    executables.ai.sap.com/description: "OpenAI API proxy with governance-based routing"
    executables.ai.sap.com/name: "ai-core-streaming-openai-exec"
  labels:
    scenarios.ai.sap.com/id: "ai-core-streaming-openai"
    executables.ai.sap.com/id: "ai-core-streaming-openai-exec"
    ai.sap.com/version: "1.0.0"
spec:
  inputs:
    parameters:
      - name: AI_CORE_RESOURCE_GROUP
        type: string
        default: "default"
        description: "AI Core resource group for model deployments"
      - name: VLLM_URL
        type: string
        default: ""
        description: "Optional vLLM endpoint for confidential workloads"
      - name: LOG_LEVEL
        type: string
        default: "INFO"
        description: "Logging level (DEBUG, INFO, WARNING, ERROR)"
  template:
    apiVersion: serving.kserve.io/v1beta1
    kind: InferenceService
    metadata:
      annotations:
        # Autoscaling configuration
        autoscaling.knative.dev/metric: "concurrency"
        autoscaling.knative.dev/target: "100"
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        # Allow longer requests for streaming
        autoscaling.knative.dev/window: "120s"
      labels:
        ai.sap.com/resourcePlan: "infer.s"
    spec:
      predictor:
        imagePullSecrets:
          - name: docker-registry-secret
        minReplicas: 1
        maxReplicas: 10
        containerConcurrency: 100
        timeout: 300
        containers:
          - name: kserve-container
            image: "{{DOCKER_REGISTRY}}/ai-core-streaming-openai:{{VERSION}}"
            ports:
              - containerPort: 8080
                protocol: TCP
            env:
              # AI Core connection (auto-injected by AI Core runtime)
              - name: AI_CORE_URL
                value: "{{AI_CORE_URL}}"
              - name: AI_CORE_CLIENT_ID
                valueFrom:
                  secretKeyRef:
                    name: ai-core-credentials
                    key: clientid
              - name: AI_CORE_CLIENT_SECRET
                valueFrom:
                  secretKeyRef:
                    name: ai-core-credentials
                    key: clientsecret
              - name: AI_CORE_RESOURCE_GROUP
                value: "{{AI_CORE_RESOURCE_GROUP}}"
              # Optional vLLM for confidential routing
              - name: VLLM_URL
                value: "{{VLLM_URL}}"
              # Server configuration
              - name: PORT
                value: "8080"
              - name: LOG_LEVEL
                value: "{{LOG_LEVEL}}"
            resources:
              requests:
                memory: "512Mi"
                cpu: "250m"
              limits:
                memory: "2Gi"
                cpu: "2000m"
            # KServe health checks (OpenAI-compatible endpoints)
            livenessProbe:
              httpGet:
                path: /health
                port: 8080
              initialDelaySeconds: 10
              periodSeconds: 30
              timeoutSeconds: 10
              failureThreshold: 3
            readinessProbe:
              httpGet:
                path: /health
                port: 8080
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
            startupProbe:
              httpGet:
                path: /health
                port: 8080
              initialDelaySeconds: 5
              periodSeconds: 5
              timeoutSeconds: 5
              failureThreshold: 12