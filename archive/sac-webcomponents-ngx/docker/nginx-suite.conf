server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        default_type application/json;
        return 200 '{"status":"ok","service":"sac-web"}';
    }

    location = / {
        try_files /harness/ai-widget/index.html =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
