# SAP BTP AI Core Serving Template for LLM Inference
# This template defines how to deploy the LLM server on AI Core
#
# Deploy via AI Core API:
#   POST /v2/lm/configurations
#   POST /v2/lm/deployments
#
# Or via SAP AI Launchpad UI
#
apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: ainuc-llm-server
  annotations:
    scenarios.ai.sap.com/description: "OpenAI-compatible LLM inference server"
    scenarios.ai.sap.com/name: "ainuc-llm-inference"
    executables.ai.sap.com/description: "Serves LLM models via llama.cpp with GPU acceleration"
    executables.ai.sap.com/name: "llm-server"
    artifacts.ai.sap.com/llm-model.kind: "model"
    artifacts.ai.sap.com/llm-model.description: "GGUF format LLM model"
  labels:
    scenarios.ai.sap.com/id: "ainuc-llm-inference"
    ai.sap.com/version: "1.0.0"
spec:
  # ==========================================================================
  # Template Definition
  # ==========================================================================
  template:
    apiVersion: "serving.kserve.io/v1beta1"
    metadata:
      annotations: |
        autoscaling.knative.dev/metric: "concurrency"
        autoscaling.knative.dev/target: "10"
        autoscaling.knative.dev/minScale: "{{inputs.parameters.minReplicas}}"
        autoscaling.knative.dev/maxScale: "{{inputs.parameters.maxReplicas}}"
      labels: |
        ai.sap.com/resourcePlan: "{{inputs.parameters.resourcePlan}}"
    spec: |
      predictor:
        # GPU resource plan - T4 for cost-effective inference
        imagePullSecrets:
          - name: docker-registry-secret
        containers:
          - name: llm-server
            image: "{{inputs.parameters.dockerImage}}"
            ports:
              - containerPort: 8080
                protocol: TCP
            env:
              # Server configuration
              - name: PORT
                value: "8080"
              - name: HOST
                value: "0.0.0.0"
              
              # Model configuration
              - name: DEFAULT_MODEL
                value: "{{inputs.parameters.modelFile}}"
              - name: MODEL_PATH
                value: "/mnt/models"
              
              # T4 GPU optimizations
              - name: LLAMA_CTX_SIZE
                value: "{{inputs.parameters.contextSize}}"
              - name: LLAMA_N_GPU_LAYERS
                value: "{{inputs.parameters.gpuLayers}}"
              - name: LLAMA_PARALLEL
                value: "{{inputs.parameters.parallelRequests}}"
              - name: LLAMA_CONT_BATCHING
                value: "true"
              - name: LLAMA_FLASH_ATTENTION
                value: "true"
              
              # CUDA settings
              - name: CUDA_VISIBLE_DEVICES
                value: "{{inputs.parameters.cudaVisibleDevices}}"
              - name: NVIDIA_VISIBLE_DEVICES
                value: "all"
              
              # Mangle DSL
              - name: MANGLE_ENABLED
                value: "{{inputs.parameters.mangleEnabled}}"
            
            # Resource requests/limits managed by AI Core resourcePlan
            
            # Liveness probe
            livenessProbe:
              httpGet:
                path: /health
                port: 8080
              initialDelaySeconds: 120
              periodSeconds: 30
              timeoutSeconds: 10
              failureThreshold: 3
            
            # Readiness probe
            readinessProbe:
              httpGet:
                path: /ready
                port: 8080
              initialDelaySeconds: 60
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
            
            # Security hardening
            securityContext:
              runAsNonRoot: true
              readOnlyRootFilesystem: true
              allowPrivilegeEscalation: false

            # Volume mounts
            volumeMounts:
              - name: model-volume
                mountPath: /mnt/models
                readOnly: true
              - name: tmp-volume
                mountPath: /tmp

        # Volumes from AI Core artifacts
        volumes:
          - name: model-volume
            persistentVolumeClaim:
              claimName: "{{inputs.artifacts.llm-model}}"
          - name: tmp-volume
            emptyDir: {}

  # ==========================================================================
  # Input Artifacts and Parameters
  # ==========================================================================
  inputs:
    artifacts:
      - name: llm-model
    parameters:
      # Docker image (from AI Core registry)
      - name: dockerImage
        type: string
        default: "docker.io/ainuc/llm-server:latest"
        description: "Docker image for the LLM server"
      
      # Resource plan (GPU type)
      - name: resourcePlan
        type: string
        default: "infer.s"  # Change to gpu_nvidia_t4 for GPU
        description: "AI Core resource plan (infer.s, infer.m, infer.l, gpu_nvidia_t4)"
      
      # Model configuration
      - name: modelFile
        type: string
        default: "phi-2.Q4_K_M.gguf"
        description: "GGUF model filename"
      
      # Context size
      - name: contextSize
        type: string
        default: "4096"
        description: "Model context window size"
      
      # Parallel requests
      - name: parallelRequests
        type: string
        default: "4"
        description: "Number of parallel inference requests"
      
      # Scaling
      - name: minReplicas
        type: string
        default: "1"
        description: "Minimum number of replicas"
      
      - name: maxReplicas
        type: string
        default: "4"
        description: "Maximum number of replicas"
      
      # CUDA GPU selection
      - name: cudaVisibleDevices
        type: string
        default: "all"
        description: "CUDA_VISIBLE_DEVICES (e.g. '0', '0,1', 'all')"

      # GPU layers
      - name: gpuLayers
        type: string
        default: "99"
        description: "Number of model layers to offload to GPU (-1 = all, 0 = CPU only)"

      # Mangle DSL
      - name: mangleEnabled
        type: string
        default: "true"
        description: "Enable Mangle DSL routing rules"