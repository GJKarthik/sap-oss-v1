{{- if .Values.kserve.enabled }}
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: {{ include "privatellm.fullname" . }}
  labels:
    {{- include "privatellm.labels" . | nindent 4 }}
spec:
  predictor:
    minReplicas: {{ .Values.autoscaling.minReplicas | default 1 }}
    maxReplicas: {{ .Values.autoscaling.maxReplicas | default 3 }}
    containers:
    - name: privatellm
      image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
      imagePullPolicy: {{ .Values.image.pullPolicy }}
      ports:
      - containerPort: {{ .Values.service.port }}
        name: http
        protocol: TCP
      env:
      - name: MODEL_NAME
        value: "{{ .Values.model.name }}"
      - name: MODEL_FILE
        value: "{{ .Values.model.file }}"
      - name: CONTEXT_SIZE
        value: "{{ .Values.model.contextSize }}"
      - name: GPU_LAYERS
        value: "{{ .Values.model.gpuLayers }}"
      - name: MODEL_FORMAT
        value: "{{ .Values.model.format }}"
      {{- if .Values.gpu.count }}
      - name: CUDA_VISIBLE_DEVICES
        value: "0"
      {{- end }}
      resources:
        {{- toYaml .Values.resources | nindent 8 }}
      {{- if .Values.probes.readiness.enabled }}
      readinessProbe:
        httpGet:
          path: /ready
          port: http
        initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
        periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
        timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
        failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
      {{- end }}
    nodeSelector:
      {{- toYaml .Values.nodeSelector | nindent 6 }}
    tolerations:
      {{- toYaml .Values.tolerations | nindent 6 }}
    {{- if .Values.affinity }}
    affinity:
      {{- toYaml .Values.affinity | nindent 6 }}
    {{- end }}
{{- end }}

