# ════════════════════════════════════════════════════════════════════════════
# SAP AI Experience – Microservice Architecture (100% Python Production)
# ════════════════════════════════════════════════════════════════════════════

version: '3.8'

services:

  # ── API Gateway & UI ──────────────────────────────────────────────────

  api-gateway:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - angular-shell
      - api-server
      - vllm
    networks: [platform-network]

  angular-shell:
    build:
      context: ./src/generativeUI/training-webcomponents-ngx
      dockerfile: apps/angular-shell/Dockerfile
    restart: unless-stopped
    environment:
      - SAP_API_BASE_URL=http://api-server:8002
    labels:
      sap.ai.tier: "frontend"
      sap.ai.service: "horizon-cinematic-shell"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [platform-network]

  # ── Orchestration Hub ──────────────────────────────────────────────────

  api-server:
    build:
      context: ./src/generativeUI/training-webcomponents-ngx/packages/api-server
      dockerfile: Dockerfile.suite
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      - PORT=8002
      - HANA_HOST=fea6d8c0-6075-4a0d-8429-28412013ab85.hana.prod-ap11.hanacloud.ondemand.com
      - HANA_PORT=443
      - HANA_USER=AINUCLEUS
      - HANA_PASSWORD=hU0*Waf5C&
      - VLLM_URL=http://vllm:8080
      - AICORE_CLIENT_ID=${AICORE_CLIENT_ID}
      - AICORE_CLIENT_SECRET=${AICORE_CLIENT_SECRET}
      - AICORE_AUTH_URL=${AICORE_AUTH_URL}
      - AICORE_BASE_URL=${AICORE_BASE_URL}
    labels:
      sap.ai.tier: "orchestration"
      sap.ai.service: "api-server-hub"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on: [vllm]
    networks: [platform-network]

  # ── Sovereignty & Intelligence Plane ────────────────────────────────────

  vllm:
    build:
      context: ./src/intelligence/vllm-turboquant
      dockerfile: Dockerfile.vllm-l40s-turboquant
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - MODEL_PATH=/app/models
      - VLLM_DEVICE=cpu
      - VLLM_TARGET_DEVICE=cpu
    volumes:
      - model-cache:/app/models
    labels:
      sap.ai.tier: "intelligence"
      sap.ai.service: "turboquant-inference"
    networks: [platform-network]

  model-optimizer:
    build:
      context: ./src/training/nvidia-modelopt
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
    volumes:
      - model-cache:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [platform-network]

  arabic-ocr:
    build:
      context: ./src/intelligence/ocr
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8060:8060"
    networks: [platform-network]

  odata-schema:
    build:
      context: ./src/data/odata-vocabularies-main
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8003:8003"
    volumes:
      - ./src/data/odata-vocabularies-main/vocabularies:/app/vocabularies:ro
    networks: [platform-network]

volumes:
  model-cache:
    driver: local
networks:
  platform-network:
    driver: bridge
