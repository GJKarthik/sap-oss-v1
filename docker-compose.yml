# ════════════════════════════════════════════════════════════════════════════
# SAP AI Experience – Microservice Architecture
# Tiered topology per sap-ai-experience-map.yaml
# ════════════════════════════════════════════════════════════════════════════

services:

  # ── Tier 1 ─ SAP Analytics Cloud : Gen UI Experiences ────────────────────

  world-monitor:
    build:
      context: ./src/generativeUI/world-monitor-main
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - VLLM_URL=http://vllm:8080
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - MANGLE_ROUTER_URL=http://agent-router:8010
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    labels:
      sap.ai.tier: "sap_analytics_cloud"
      sap.ai.service: "world-monitor"
      sap.ai.data_security: "internal/confidential"
    depends_on: [agent-router, elasticsearch, vllm]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [platform-network]

  geni-ui:
    build:
      context: ./src/generativeUI/training-webcomponents-ngx
      dockerfile: apps/angular-shell/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - SAP_API_BASE_URL=http://api-gateway:80
    depends_on: [api-gateway]
    networks: [platform-network]

  data-copilot:
    build:
      context: ./src/generativeUI/training-webcomponents-ngx/packages/api-server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8002:8002"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    environment:
      - PORT=8002
      - MANGLE_ROUTER_URL=http://agent-router:8010
      - ODATA_SERVICE_URL=http://odata-schema:8003
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - AICORE_AUTH_URL=${AICORE_AUTH_URL}
      - AICORE_BASE_URL=${AICORE_BASE_URL}
      - AICORE_CLIENT_ID=${AICORE_CLIENT_ID}
      - AICORE_CLIENT_SECRET=${AICORE_CLIENT_SECRET}
      - AICORE_RESOURCE_GROUP=${AICORE_RESOURCE_GROUP}
    labels:
      sap.ai.tier: "sap_analytics_cloud"
      sap.ai.service: "data-cleaning-copilot"
      sap.ai.data_security: "confidential"
    depends_on: [agent-router, odata-schema, elasticsearch]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [platform-network]

  # ── Tier 3 ─ AI Core ────────────────────────────────────────────────────

  vllm:
    build:
      context: ./src/intelligence/vllm-main
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - MODEL_PATH=/app/models
      - METRICS_BIND=127.0.0.1
    volumes:
      - model-cache:/app/models
    labels:
      sap.ai.tier: "ai_core"
      sap.ai.service: "enterprise-sovereign-llm"
      sap.ai.data_security: "on-premise-only"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [platform-network]

  elasticsearch:
    image: elasticsearch:8.12.0
    restart: unless-stopped
    ports:
      - "9200:9200"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
    labels:
      sap.ai.tier: "ai_core"
      sap.ai.service: "search"
      sap.ai.data_security: "index-based"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks: [platform-network]

  agent-router:
    build:
      context: ./src/data/mangle-query-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8010:8010"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    environment:
      - PORT=8010
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - VLLM_URL=http://vllm:8080
      - ODATA_SERVICE_URL=http://odata-schema:8003
      - HANA_URL=${HANA_URL}
    labels:
      sap.ai.tier: "ai_core"
      sap.ai.service: "agent-router"
      sap.ai.data_security: "governance-hub"
    depends_on: [elasticsearch, vllm, odata-schema]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [platform-network]

  odata-schema:
    build:
      context: ./src/data/odata-vocabularies-main
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8003:8003"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    environment:
      - PORT=8003
    labels:
      sap.ai.tier: "ai_core"
      sap.ai.service: "odata-schema"
      sap.ai.data_security: "public"
    volumes:
      - ./src/data/odata-vocabularies-main/vocabularies:/app/vocabularies:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [platform-network]

  mcp-pal:
    build:
      context: ./src/intelligence/ai-core-pal
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8020:8020"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    environment:
      - PORT=8020
      - HANA_URL=${HANA_URL}
      - VLLM_URL=http://vllm:8080
      - MANGLE_ROUTER_URL=http://agent-router:8010
      - METRICS_BIND=127.0.0.1
    labels:
      sap.ai.tier: "ai_core"
      sap.ai.service: "mcp-pal-deep-learning"
      sap.ai.data_security: "confidential"
    depends_on: [agent-router, vllm]
    networks: [platform-network]

  # ── Tier 3 ─ AI Core ────────────────────────────────────────────────────
    build:
      context: ./src/intelligence/generative-ai-toolkit-for-sap-hana-cloud-main
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8040:8040"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    environment:
      - PORT=8040
      - HANA_URL=${HANA_URL}
      - VLLM_URL=http://vllm:8080
      - MANGLE_ROUTER_URL=http://agent-router:8010
    labels:
      sap.ai.tier: "ai_core"
      sap.ai.service: "ai-prompt-agent"
      sap.ai.data_security: "confidential"
    depends_on: [agent-router, vllm]
    networks: [platform-network]

  embedded-hana:
    build:
      context: ./src/data/langchain-integration-for-sap-hana-cloud-main
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8050:8050"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    environment:
      - PORT=8050
      - HANA_URL=${HANA_URL}
      - VLLM_URL=http://vllm:8080
      - MANGLE_ROUTER_URL=http://agent-router:8010
    labels:
      sap.ai.tier: "ai_core"
      sap.ai.service: "embedded-hana"
      sap.ai.data_security: "confidential"
    depends_on: [agent-router, vllm]
    networks: [platform-network]

  arabic-ocr:
    build:
      context: ./src/intelligence/ocr
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8060:8060"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    environment:
      - PORT=8060
      - OCR_LANGUAGES=ara+eng
      - OCR_DPI=300
      - OCR_MAX_WORKERS=2
      - OCR_MAX_CONCURRENT=4
      - OCR_MAX_UPLOAD_BYTES=104857600
      - OCR_ALLOWED_CALLBACK_HOSTS=${OCR_ALLOWED_CALLBACK_HOSTS:-}
      - OCR_WEBHOOK_SECRET=${OCR_WEBHOOK_SECRET:-}
    labels:
      sap.ai.tier: "ai_core"
      sap.ai.service: "arabic-ocr"
      sap.ai.data_security: "confidential"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8060/ocr/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks: [platform-network]

  # ── Tier 4 ─ FinSight SAP BTP/BDC ──────────────────────────────────────

  model-optimizer:
    build:
      context: ./src/training/nvidia-modelopt
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - LOG_LEVEL=INFO
    labels:
      sap.ai.tier: "finsight_btp_bdc"
      sap.ai.service: "object-store-for-model"
      sap.ai.data_security: "confidential"
    volumes:
      - model-cache:/app/models
      - ./src/training/nvidia-modelopt/outputs:/app/outputs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [platform-network]

  # ── Infrastructure ─────────────────────────────────────────────────────

  api-gateway:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent-router
      - odata-schema
      - vllm
      - elasticsearch
      - arabic-ocr
    networks: [platform-network]

volumes:
  model-cache:
    driver: local
  es-data:
    driver: local
networks:
  platform-network:
    driver: bridge
