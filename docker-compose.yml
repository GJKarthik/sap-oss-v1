# ════════════════════════════════════════════════════════════════════════════
# SAP AI Experience – Microservice Architecture (Production Default)
# ════════════════════════════════════════════════════════════════════════════

services:

  # ── API Gateway & UI ──────────────────────────────────────────────────

  api-gateway:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - angular-shell
      - api-server
      - vllm
    networks: [platform-network]

  angular-shell:
    build:
      context: ./src/generativeUI/training-webcomponents-ngx
      dockerfile: apps/angular-shell/Dockerfile
    restart: unless-stopped
    environment:
      - SAP_API_BASE_URL=http://api-server:8002
    labels:
      sap.ai.tier: "frontend"
      sap.ai.service: "horizon-cinematic-shell"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [platform-network]

  # ── Orchestration Hub ──────────────────────────────────────────────────

  api-server:
    build:
      context: ./src/generativeUI/training-webcomponents-ngx/packages/api-server
      dockerfile: Dockerfile.suite
    restart: unless-stopped
    environment:
      - PORT=8002
      - AUTH_JWT_SECRET=${AUTH_JWT_SECRET:?Set AUTH_JWT_SECRET in root .env}
      - HANA_HOST=${HANA_HOST:?Set HANA_HOST in root .env}
      - HANA_PORT=${HANA_PORT:-443}
      - HANA_USER_FILE=/run/secrets/hana_user
      - HANA_PASSWORD_FILE=/run/secrets/hana_password
      - HANA_SCHEMA=${HANA_SCHEMA:-PAL_STORE}
      - HANA_ENCRYPT=${HANA_ENCRYPT:-true}
      - VLLM_URL=http://vllm:8080
      - AICORE_CLIENT_ID_FILE=/run/secrets/aicore_client_id
      - AICORE_CLIENT_SECRET_FILE=/run/secrets/aicore_client_secret
      - AICORE_AUTH_URL=${AICORE_AUTH_URL:?Set AICORE_AUTH_URL in root .env}
      - AICORE_BASE_URL=${AICORE_BASE_URL:?Set AICORE_BASE_URL in root .env}
      - AICORE_RESOURCE_GROUP=${AICORE_RESOURCE_GROUP:-default}
    secrets:
      - hana_user
      - hana_password
      - aicore_client_id
      - aicore_client_secret
    labels:
      sap.ai.tier: "orchestration"
      sap.ai.service: "api-server-hub"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on: [vllm]
    networks: [platform-network]

  # ── Sovereignty & Intelligence Plane ────────────────────────────────────

  vllm:
    build:
      context: ./src/intelligence/vllm-turboquant
      dockerfile: Dockerfile.vllm-l40s-turboquant
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - MODEL_PATH=/app/models
      - VLLM_DEVICE=cpu
      - VLLM_TARGET_DEVICE=cpu
    volumes:
      - model-cache:/app/models
    labels:
      sap.ai.tier: "intelligence"
      sap.ai.service: "turboquant-inference"
    networks: [platform-network]

  model-optimizer:
    build:
      context: ./src/training/nvidia-modelopt
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
    volumes:
      - model-cache:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [platform-network]

  arabic-ocr:
    build:
      context: ./src/intelligence/ocr
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8060:8060"
    networks: [platform-network]

  odata-schema:
    build:
      context: ./src/data/odata-vocabularies-main
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8003:8003"
    volumes:
      - ./src/data/odata-vocabularies-main/vocabularies:/app/vocabularies:ro
    networks: [platform-network]

volumes:
  model-cache:
    driver: local
networks:
  platform-network:
    driver: bridge

secrets:
  hana_user:
    file: ${HANA_USER_FILE_SOURCE:-./.secrets/hana_user}
  hana_password:
    file: ${HANA_PASSWORD_FILE_SOURCE:-./.secrets/hana_password}
  aicore_client_id:
    file: ${AICORE_CLIENT_ID_FILE_SOURCE:-./.secrets/aicore_client_id}
  aicore_client_secret:
    file: ${AICORE_CLIENT_SECRET_FILE_SOURCE:-./.secrets/aicore_client_secret}
